substitutions:
  version: "26.1.21.1"
  device_description: TEMP_PRO-1 MQTT made by Apollo Automation - version ${version}.

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf
    sdkconfig_options:
      # Disable Bluetooth to save power (not needed for MQTT over Ethernet)
      CONFIG_BT_ENABLED: n

# EXPERIMENTAL: Include custom component for SEN5x particle number concentration
external_components:
  - source:
      type: local
      path: components
  - source: github://ApolloAutomation/esphome-battery-component
    components: [max17048]

globals:
  - id: cycleCounter
    type: int
    restore_value: no
    initial_value: '0'
  - id: button_press_timestamp
    restore_value: no
    type: uint32_t
    initial_value: '0'
  - id: alarm_triggered_on_wake
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: last_temp_update
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: last_humidity_update
    type: uint32_t
    restore_value: no
    initial_value: '0'

mdns:
  disabled: true

i2c:
  sda: GPIO16
  scl: GPIO17
  id: bus_a

web_server:
  port: 80
  version: 3
  include_internal: true

deep_sleep:
  id: deep_sleep_1
  sleep_duration: 30min

one_wire:
  - platform: gpio
    pin: GPIO6

# Buzzer
output:
  - platform: ledc
    pin: GPIO8
    id: buzzer

rtttl:
  id: rtttl_buzzer
  output: buzzer

binary_sensor:
  - platform: status
    name: Online
    id: ink_ha_connected
    internal: true
  - platform: gpio
    pin:
      number: GPIO0
      inverted: true
      mode:
        input: true
        pullup: true
    id: reset_button
    internal: true
    on_multi_click:
      # Triple click - toggle prevent sleep
      - timing:
          - ON for at most 0.5s
          - OFF for at most 0.5s
          - ON for at most 0.5s
          - OFF for at most 0.5s
          - ON for at most 0.5s
          - OFF for at least 0.3s
        then:
          - lambda: |-
              if (id(prevent_sleep).state) {
                id(prevent_sleep).turn_off();
                ESP_LOGW("Apollo", "Prevent Sleep DISABLED via 3x button press");
              } else {
                id(prevent_sleep).turn_on();
                ESP_LOGW("Apollo", "Prevent Sleep ENABLED via 3x button press");
              }
          - if:
              condition:
                switch.is_on: prevent_sleep
              then:
                - light.turn_on:
                    id: rgb_light
                    brightness: 25%
                    red: 100%
                    green: 0%
                    blue: 0%
                - delay: 3s
                - light.turn_off: rgb_light
              else:
                - light.turn_on:
                    id: rgb_light
                    brightness: 25%
                    red: 0%
                    green: 100%
                    blue: 0%
                - delay: 3s
                - light.turn_off: rgb_light
      # Long press (10s) - factory reset
      - timing:
          - ON for at least 10s
        then:
          - lambda: |-
              id(factory_reset_switch).turn_on();
      # Single click - status check
      - timing:
          - ON for at most 0.5s
          - OFF for at least 0.5s
        then:
          - script.execute: statusCheck

  - platform: template
    name: Alarm Temperature Within Range
    id: temp_within_range
    internal: true
    lambda: 'return std::isnan(id(sht_temperature).state) || ((id(sht_temperature).state <= id(max_temp).state) && (id(sht_temperature).state >= id(min_temp).state));'

  - platform: template
    name: Alarm Humidity Within Range
    id: humidity_within_range
    internal: true
    lambda: 'return std::isnan(id(sht_humidity).state) || ((id(sht_humidity).state <= id(max_humidity).state) && (id(sht_humidity).state >= id(min_humidity).state));'

  - platform: template
    name: Alarm Total PM Within Range
    id: total_pm_within_range
    internal: true
    lambda: 'return std::isnan(id(pm_10_0).state) || (id(pm_10_0).state < id(max_total_pm).state);'

  - platform: template
    name: Alarm Total PM Count Within Range
    id: total_pm_count_within_range
    internal: true
    lambda: 'return std::isnan(id(total_pm_count).state) || (id(total_pm_count).state < id(max_total_pm_count).state);'

  - platform: template
    name: Alarm Active
    id: alarm_active
    internal: true
    lambda: 'return (id(alarm_outside_temp_range).state && !id(temp_within_range).state) || (id(alarm_outside_humidity_range).state && !id(humidity_within_range).state) || (id(alarm_outside_total_pm_range).state && !id(total_pm_within_range).state) || (id(alarm_outside_total_pm_count_range).state && !id(total_pm_count_within_range).state);'
    on_release:
      then:
        - light.turn_off: rgb_light
        - if:
            condition:
              switch.is_off: prevent_sleep
            then:
              - lambda: |-
                  ESP_LOGW("Apollo", "Alarm cleared - going back to sleep");
                  id(deep_sleep_1).allow_deep_sleep();
              - switch.turn_off: accessory_power
              - delay: 100ms
              - deep_sleep.enter:
                  id: deep_sleep_1

sensor:
  - platform: internal_temperature
    name: "ESP Temperature"
    id: sys_esp_temperature
    internal: true

  - platform: uptime
    name: Uptime
    id: sys_uptime
    update_interval: 60s
    internal: true

  - platform: sht3xd
    id: sht3xd_sensor
    temperature:
      name: "Temperature Raw"
      id: sht_temperature_raw
      internal: true
    humidity:
      name: "Relative Humidity Raw"
      id: sht_humidity_raw
      internal: true
    update_interval: 10s

  # Template sensors with configurable intervals
  - platform: template
    name: "Temperature"
    id: sht_temperature
    lambda: 'return id(sht_temperature_raw).state;'
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    update_interval: never
    internal: true

  - platform: template
    name: "Relative Humidity"
    id: sht_humidity
    lambda: 'return id(sht_humidity_raw).state;'
    unit_of_measurement: "%"
    device_class: humidity
    state_class: measurement
    accuracy_decimals: 1
    update_interval: never
    internal: true

  - platform: sen5x
    id: sen55
    pm_1_0:
      name: "PM <1µm Weight concentration"
      id: pm_1_0
      internal: true
      accuracy_decimals: 1
    pm_2_5:
      name: "PM <2.5µm Weight concentration"
      id: pm_2_5
      internal: true
      accuracy_decimals: 1
    pm_4_0:
      name: "PM <4µm Weight concentration"
      id: pm_4_0
      internal: true
      accuracy_decimals: 1
    pm_10_0:
      name: "PM <10µm Weight concentration"
      id: pm_10_0
      internal: true
      accuracy_decimals: 1
    nox:
      name: "NOX Index"
      id: sen_nox
      internal: true
      accuracy_decimals: 1
    voc:
      name: "VOC Index"
      id: sen_voc
      internal: true
      algorithm_tuning:
        index_offset: 100
        learning_time_offset_hours: 12
        learning_time_gain_hours: 12
        gating_max_duration_minutes: 180
        std_initial: 50
        gain_factor: 230
    temperature_compensation:
      offset: 0
      normalized_offset_slope: 0
      time_constant: 0
    store_baseline: true
    update_interval: 10s

  - platform: template
    name: "PM 0.3 To 1 µm"
    id: pm0_3_to_1
    internal: true
    lambda: return id(pm_1_0).state;
    unit_of_measurement: "µg/m³"
    state_class: measurement
    icon: mdi:air-filter
    update_interval: 10s

  - platform: template
    name: "PM 1 To 2.5 µm"
    id: pm1_to_2_5
    internal: true
    lambda: return std::max(0.0f, id(pm_2_5).state - id(pm_1_0).state);
    unit_of_measurement: "µg/m³"
    state_class: measurement
    icon: mdi:air-filter
    update_interval: 10s

  - platform: template
    name: "PM 2.5 To 4 µm"
    id: pm2_5_to_4
    internal: true
    lambda: return std::max(0.0f, id(pm_4_0).state - id(pm_2_5).state);
    unit_of_measurement: "µg/m³"
    state_class: measurement
    icon: mdi:air-filter
    update_interval: 10s

  - platform: template
    name: "PM 4 To 10 µm"
    id: pm4_to_10
    internal: true
    lambda: return std::max(0.0f, id(pm_10_0).state - id(pm_4_0).state);
    unit_of_measurement: "µg/m³"
    state_class: measurement
    icon: mdi:air-filter
    update_interval: 10s

  # EXPERIMENTAL: SEN5x Particle Number Concentration Sensors
  # Uses undocumented I2C command 0x0413
  # Reference: Sensirion_SEN5x_Read_Mass_and_Number_Concentrations.pdf
  - platform: sen5x_number
    id: sen5x_number_component
    address: 0x69
    update_interval: 10s
    pm_0_5_number:
      name: "PM <0.5µm Number concentration"
      id: pm_0_5_number
      accuracy_decimals: 0
      internal: true
    pm_1_0_number:
      name: "PM <1µm Number concentration"
      id: pm_1_0_number
      accuracy_decimals: 0
      internal: true
    pm_2_5_number:
      name: "PM <2.5µm Number concentration"
      id: pm_2_5_number
      accuracy_decimals: 0
      internal: true
    pm_4_0_number:
      name: "PM <4µm Number concentration"
      id: pm_4_0_number
      accuracy_decimals: 0
      internal: true
    pm_10_0_number:
      name: "PM <10µm Number concentration"
      id: pm_10_0_number
      accuracy_decimals: 0
      internal: true
    typical_particle_size:
      name: "PM Typical Particle Size"
      id: typical_particle_size
      accuracy_decimals: 2
      internal: true

  # Particle number concentration ranges (EXPERIMENTAL)
  # These are the main sensors published to MQTT
  - platform: template
    name: "PM 0.3 To 0.5 µm Number"
    id: pm0_3_to_0_5_number
    lambda: return id(pm_0_5_number).state;
    unit_of_measurement: "#/m³"
    state_class: measurement
    icon: mdi:air-filter
    update_interval: 10s
    accuracy_decimals: 0
    internal: true

  - platform: template
    name: "PM 0.5 To 1 µm Number"
    id: pm0_5_to_1_number
    lambda: return std::max(0.0f, id(pm_1_0_number).state - id(pm_0_5_number).state);
    unit_of_measurement: "#/m³"
    state_class: measurement
    icon: mdi:air-filter
    update_interval: 10s
    accuracy_decimals: 0
    internal: true

  - platform: template
    name: "PM 1 To 2.5 µm Number"
    id: pm1_to_2_5_number
    lambda: return std::max(0.0f, id(pm_2_5_number).state - id(pm_1_0_number).state);
    unit_of_measurement: "#/m³"
    state_class: measurement
    icon: mdi:air-filter
    update_interval: 10s
    accuracy_decimals: 0
    internal: true

  - platform: template
    name: "PM 2.5 To 4 µm Number"
    id: pm2_5_to_4_number
    lambda: return std::max(0.0f, id(pm_4_0_number).state - id(pm_2_5_number).state);
    unit_of_measurement: "#/m³"
    state_class: measurement
    icon: mdi:air-filter
    update_interval: 10s
    accuracy_decimals: 0
    internal: true

  - platform: template
    name: "PM 4 To 10 µm Number"
    id: pm4_to_10_number
    lambda: return std::max(0.0f, id(pm_10_0_number).state - id(pm_4_0_number).state);
    unit_of_measurement: "#/m³"
    state_class: measurement
    icon: mdi:air-filter
    update_interval: 10s
    accuracy_decimals: 0
    internal: true

  - platform: template
    name: "PM Total Count"
    id: total_pm_count
    lambda: |-
      return id(pm0_3_to_0_5_number).state +
             id(pm0_5_to_1_number).state +
             id(pm1_to_2_5_number).state +
             id(pm2_5_to_4_number).state +
             id(pm4_to_10_number).state;
    unit_of_measurement: "#/m³"
    state_class: measurement
    icon: mdi:air-filter
    update_interval: 10s
    accuracy_decimals: 0
    internal: true

  # Dallas Temperature Probe
  - platform: dallas_temp
    name: "Temperature Probe (Dallas)"
    id: dallas_temp_probe
    update_interval: 60s
    internal: true

  # Battery monitoring
  - platform: max17048
    id: max_17048
    battery_voltage:
      name: Battery voltage
      id: batt_v
      internal: true
    battery_level:
      name: Battery level
      id: batt_pct
      internal: true
      filters:
        - lambda: |
            if (x > 100) return 100;
            else return (x);

light:
  - platform: esp32_rmt_led_strip
    id: rgb_light
    name: "RGB Light"
    pin: GPIO4
    default_transition_length: 0s
    chipset: WS2812
    num_leds: 4
    rgb_order: grb
    internal: true
    effects:
      - pulse:
          name: "Slow Pulse"
          transition_length: 1000ms
          update_interval: 1000ms
          min_brightness: 0%
          max_brightness: 25%
      - pulse:
          name: "Fast Pulse"
          transition_length: 100ms
          update_interval: 100ms
          min_brightness: 10%
          max_brightness: 25%

button:
  - platform: factory_reset
    disabled_by_default: True
    name: "Factory Reset ESP"
    id: factory_reset_all
    internal: true

number:
  - platform: template
    id: min_temp
    name: Min Temperature
    min_value: -60
    max_value: 100
    step: 0.1
    unit_of_measurement: '°C'
    initial_value: -20
    optimistic: true
    update_interval: never
    mode: box
    entity_category: config
    internal: true

  - platform: template
    id: max_temp
    name: Max Temperature
    min_value: -60
    max_value: 100
    step: 0.1
    unit_of_measurement: '°C'
    initial_value: 200
    optimistic: true
    update_interval: never
    mode: box
    entity_category: config
    internal: true

  - platform: template
    id: min_humidity
    name: Min Humidity
    min_value: 0
    max_value: 100
    step: 0.1
    unit_of_measurement: '%'
    initial_value: 0
    optimistic: true
    update_interval: never
    mode: box
    entity_category: config
    internal: true

  - platform: template
    id: max_humidity
    name: Max Humidity
    min_value: 0
    max_value: 100
    step: 0.1
    unit_of_measurement: '%'
    initial_value: 100
    optimistic: true
    update_interval: never
    mode: box
    entity_category: config
    internal: true

  # Configurable temperature and humidity intervals (in minutes)
  - platform: template
    id: temperature_update_interval
    name: "Temperature Update Interval"
    min_value: 1
    max_value: 1000
    step: 1
    unit_of_measurement: 'm'
    initial_value: 1
    optimistic: true
    restore_value: true
    mode: box
    entity_category: config
    internal: true
    on_value:
      then:
        - lambda: |-
            // Force immediate temperature update when interval changes
            id(sht_temperature).publish_state(id(sht_temperature_raw).state);
            id(last_temp_update) = millis();

  - platform: template
    id: humidity_update_interval
    name: "Humidity Update Interval"
    min_value: 1
    max_value: 1000
    step: 1
    unit_of_measurement: 'm'
    initial_value: 1
    optimistic: true
    restore_value: true
    mode: box
    entity_category: config
    internal: true
    on_value:
      then:
        - lambda: |-
            // Force immediate humidity update when interval changes
            id(sht_humidity).publish_state(id(sht_humidity_raw).state);
            id(last_humidity_update) = millis();

  # Total PM min/max settings

  - platform: template
    id: max_total_pm
    name: Max Total PM
    min_value: 0
    max_value: 500
    step: 0.1
    unit_of_measurement: 'µg/m³'
    initial_value: 50
    optimistic: true
    update_interval: never
    mode: box
    entity_category: config
    internal: true

  - platform: template
    id: max_total_pm_count
    name: Max Total PM Count
    min_value: 0
    max_value: 10000000000
    step: 1000000
    unit_of_measurement: '#/m³'
    initial_value: 1000000000
    optimistic: true
    restore_value: true
    update_interval: never
    mode: box
    entity_category: config
    internal: true

  # Deep sleep duration configuration
  - platform: template
    name: "Sleep Duration"
    id: deep_sleep_sleep_duration
    min_value: 0.01
    max_value: 24
    step: 0.01
    mode: box
    update_interval: never
    optimistic: true
    restore_value: false
    initial_value: 0.5
    icon: "mdi:arrow-collapse-right"
    entity_category: CONFIG
    unit_of_measurement: "h"
    internal: true
    on_value:
      then:
        - lambda: |-
            id(deep_sleep_1).set_sleep_duration(x * 60 * 60 * 1000);

switch:
  - platform: factory_reset
    id: factory_reset_switch
    internal: true

  - platform: gpio
    pin: GPIO7
    name: "Accessory Power"
    id: accessory_power
    restore_mode: ALWAYS_ON
    setup_priority: 1100
    internal: true

  - platform: template
    name: "Alarm Outside Temp Range"
    id: alarm_outside_temp_range
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    internal: true

  - platform: template
    name: "Alarm Outside Humidity Range"
    id: alarm_outside_humidity_range
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    internal: true

  - platform: template
    name: "Alarm Outside Total PM Range"
    id: alarm_outside_total_pm_range
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    internal: true

  - platform: template
    name: "Alarm Outside Total PM Count Range"
    id: alarm_outside_total_pm_count_range
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    internal: true

  - platform: template
    name: "Prevent Sleep"
    id: prevent_sleep
    icon: mdi:sleep
    restore_mode: ALWAYS_ON
    optimistic: true
    entity_category: "config"
    internal: true
    on_turn_on:
      then:
        - lambda: |-
            id(deep_sleep_1).prevent_deep_sleep();
    on_turn_off:
      then:
        - lambda: |-
            id(deep_sleep_1).allow_deep_sleep();

interval:
  # Safety net: if prevent_sleep is OFF and device has been awake 30s+, force sleep
  - interval: 5s
    startup_delay: 30s
    then:
      - if:
          condition:
            and:
              - switch.is_off: prevent_sleep
              - lambda: 'return !id(alarm_triggered_on_wake);'
          then:
            - lambda: |-
                ESP_LOGW("Apollo", "Safety net: cutting power and entering sleep");
            - switch.turn_off: accessory_power
            - light.turn_off: rgb_light
            - delay: 100ms
            - deep_sleep.enter:
                id: deep_sleep_1

  - interval: 10s
    startup_delay: 60s
    then:
      - if:
          condition:
            lambda: !lambda |-
              return id(alarm_active).state;
          then:
            - lambda: !lambda |-
                id(rgb_light).turn_on().set_effect("Fast Pulse").perform();
                id(rgb_light).turn_on().set_rgb(1, 0, 0).set_transition_length(0).perform();
                id(rtttl_buzzer).play("siren:d=8,o=5,b=100:d,e,d,e,d,e,d,e;");

  # Publish MQTT data periodically when prevent_sleep is ON
  - interval: 10s
    startup_delay: 30s
    then:
      - if:
          condition:
            switch.is_on: prevent_sleep
          then:
            - script.execute: publish_mqtt_data

  # Temperature and humidity configurable intervals
  - interval: 10s
    then:
      - lambda: |-
          // Temperature update check (min to milliseconds)
          uint32_t temp_interval_ms = id(temperature_update_interval).state * 60 * 1000;
          if (millis() - id(last_temp_update) >= temp_interval_ms) {
            id(sht_temperature).publish_state(id(sht_temperature_raw).state);
            id(last_temp_update) = millis();
          }

          // Humidity update check (min to milliseconds)
          uint32_t humidity_interval_ms = id(humidity_update_interval).state * 60 * 1000;
          if (millis() - id(last_humidity_update) >= humidity_interval_ms) {
            id(sht_humidity).publish_state(id(sht_humidity_raw).state);
            id(last_humidity_update) = millis();
          }

script:
  - id: reportAllValues
    then:
      - component.update: sen55
      - component.update: sht3xd_sensor
      - component.update: dallas_temp_probe
      - component.update: sen5x_number_component
      - component.update: max_17048
      - delay: 2s
      - lambda: |-
          // Publish SHT temperature and humidity values
          id(sht_temperature).publish_state(id(sht_temperature_raw).state);
          id(sht_humidity).publish_state(id(sht_humidity_raw).state);
          id(last_temp_update) = millis();
          id(last_humidity_update) = millis();

          // Publish total PM count using raw sensor values directly
          // pm_0_5_number = 0.3-0.5 range (cumulative <0.5)
          // Ranges: 0.3-0.5, 0.5-1, 1-2.5, 2.5-4, 4-10
          float pm_0_3_to_0_5 = id(pm_0_5_number).state;
          float pm_0_5_to_1 = std::max(0.0f, id(pm_1_0_number).state - id(pm_0_5_number).state);
          float pm_1_to_2_5 = std::max(0.0f, id(pm_2_5_number).state - id(pm_1_0_number).state);
          float pm_2_5_to_4 = std::max(0.0f, id(pm_4_0_number).state - id(pm_2_5_number).state);
          float pm_4_to_10 = std::max(0.0f, id(pm_10_0_number).state - id(pm_4_0_number).state);

          float total_count = pm_0_3_to_0_5 + pm_0_5_to_1 + pm_1_to_2_5 + pm_2_5_to_4 + pm_4_to_10;

          if (!std::isnan(total_count)) {
            id(total_pm_count).publish_state(total_count);
            ESP_LOGI("Apollo", "Total PM Count: %.0f", total_count);
          } else {
            ESP_LOGW("Apollo", "Total PM Count is NaN, skipping publish");
          }

  # Publish all MQTT data once (called from on_connect)
  - id: publish_mqtt_data
    then:
      - lambda: |-
          // Check if mass concentration sensors are ready
          if (std::isnan(id(pm_1_0).state) ||
              std::isnan(id(pm_2_5).state) ||
              std::isnan(id(pm_4_0).state) ||
              std::isnan(id(pm_10_0).state)) {
            ESP_LOGW("Apollo", "PM sensors not ready (NaN), skipping publish");
            return;
          }

          const char* mac = id(device_mac_address).state.c_str();
          const char* name = App.get_name().c_str();

          // Build unique device suffix from last 6 chars of MAC (e.g. "352b94")
          uint8_t raw_mac[6];
          esp_read_mac(raw_mac, ESP_MAC_BASE);
          char mac_suffix[7];
          snprintf(mac_suffix, sizeof(mac_suffix), "%02x%02x%02x", raw_mac[3], raw_mac[4], raw_mac[5]);

          // Priority: Custom text > Dropdown > MAC suffix
          std::string custom = id(custom_column_id).state;
          std::string col = id(column_id).current_option();
          const char* device_suffix;
          if (!custom.empty()) {
            device_suffix = custom.c_str();
          } else if (!col.empty() && col != "Not Set") {
            device_suffix = col.c_str();
          } else {
            device_suffix = mac_suffix;
          }

          // Topic prefix: Apollo/temp-pro-1-{column_id or mac_suffix}
          // Following UNS: {Vendor}/{Station}/sensor/{Tag}
          char prefix[64];
          snprintf(prefix, sizeof(prefix), "Apollo/temp-pro-1-%s", device_suffix);

          // Mass concentration ranges in ug/m3
          float pm_vals[4] = {
            std::max(0.0f, id(pm_1_0).state),
            std::max(0.0f, id(pm_2_5).state - id(pm_1_0).state),
            std::max(0.0f, id(pm_4_0).state - id(pm_2_5).state),
            std::max(0.0f, id(pm_10_0).state - id(pm_4_0).state)
          };
          float total = std::max(0.0f, id(pm_10_0).state);

          // Publish sensor values - topic is the key, payload is the value
          char topic[128];
          char buf[32];
          const char* tags[6] = {
            "pm_0_3_to_1", "pm_1_to_2_5", "pm_2_5_to_4",
            "pm_4_to_10", "pm_total", "battery_level"
          };

          for (int i = 0; i < 4; i++) {
            snprintf(topic, sizeof(topic), "%s/sensor/%s", prefix, tags[i]);
            snprintf(buf, sizeof(buf), "%.1f", pm_vals[i]);
            id(mqtt_client).publish(topic, buf, strlen(buf), 0, true);
          }

          snprintf(topic, sizeof(topic), "%s/sensor/%s", prefix, tags[4]);
          snprintf(buf, sizeof(buf), "%.1f", total);
          id(mqtt_client).publish(topic, buf, strlen(buf), 0, true);

          int batt = std::isnan(id(batt_pct).state) ? -1 : (int)roundf(std::max(0.0f, id(batt_pct).state));
          snprintf(topic, sizeof(topic), "%s/sensor/%s", prefix, tags[5]);
          snprintf(buf, sizeof(buf), "%d", batt);
          id(mqtt_client).publish(topic, buf, strlen(buf), 0, true);

          // Publish metadata (retained)
          const char* ip = id(device_ip_address).state.c_str();

          snprintf(topic, sizeof(topic), "%s/meta/device_id", prefix);
          id(mqtt_client).publish(topic, mac, strlen(mac), 0, true);

          snprintf(topic, sizeof(topic), "%s/meta/device_name", prefix);
          id(mqtt_client).publish(topic, name, strlen(name), 0, true);

          snprintf(topic, sizeof(topic), "%s/meta/ip_address", prefix);
          id(mqtt_client).publish(topic, ip, strlen(ip), 0, true);

          const char* unit_pm = "ug/m3";
          snprintf(topic, sizeof(topic), "%s/meta/unit_pm", prefix);
          id(mqtt_client).publish(topic, unit_pm, strlen(unit_pm), 0, true);

          const char* unit_batt = "%";
          snprintf(topic, sizeof(topic), "%s/meta/unit_battery", prefix);
          id(mqtt_client).publish(topic, unit_batt, strlen(unit_batt), 0, true);

          ESP_LOGW("Apollo", "========================================");
          ESP_LOGW("Apollo", "  IP Address:  %s", ip);
          ESP_LOGW("Apollo", "  Device ID:   %s (%s)", mac, mac_suffix);
          ESP_LOGW("Apollo", "  Column ID:  %s", device_suffix);
          ESP_LOGW("Apollo", "  Device:      %s", name);
          ESP_LOGW("Apollo", "  Battery:     %d%%", batt);
          ESP_LOGW("Apollo", "  PM 0.3-1: %.1f | 1-2.5: %.1f | 2.5-4: %.1f | 4-10: %.1f | Total: %.1f ug/m3",
                   pm_vals[0], pm_vals[1], pm_vals[2], pm_vals[3], total);
          ESP_LOGW("Apollo", "  Topics: %s/sensor/...", prefix);
          ESP_LOGW("Apollo", "========================================");
          ESP_LOGI("Apollo", "All MQTT data published");

select:
  - platform: template
    name: "Column ID"
    id: column_id
    icon: mdi:tag-text
    entity_category: "config"
    optimistic: true
    restore_value: true
    initial_option: "Not Set"
    options:
      - "Not Set"
      - "J8"
      - "J08"
      - "J05"
      - "H08"
      - "E012"
      - "J011"
      - "H05"

text:
  - platform: template
    name: "Custom Column ID"
    id: custom_column_id
    icon: mdi:form-textbox
    entity_category: "config"
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 16
    mode: text

text_sensor:
  - platform: template
    name: "OTA URL"
    id: ota_url
    entity_category: "diagnostic"
    internal: true

  - platform: template
    name: "Device ID"
    id: device_mac_address
    internal: true
    lambda: |-
      uint8_t mac[6];
      esp_read_mac(mac, ESP_MAC_BASE);
      char buf[18];
      snprintf(buf, sizeof(buf), "%02X:%02X:%02X:%02X:%02X:%02X",
               mac[0], mac[1], mac[2], mac[3], mac[4], mac[5]);
      return std::string(buf);

  - platform: template
    name: "Device Name"
    id: device_name_sensor
    internal: true
    lambda: |-
      return App.get_name();

  - platform: template
    name: "IP Address"
    id: device_ip_address
    icon: mdi:ip-network
    entity_category: "diagnostic"
    lambda: |-
      auto ips = esphome::network::get_ip_addresses();
      if (ips.size() > 0 && ips[0].is_set()) {
        return ips[0].str();
      }
      return std::string("No IP");
    update_interval: 10s
