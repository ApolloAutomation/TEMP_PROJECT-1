text_sensor:

  # Why the device woke up this cycle. Set by capture_wake_reason in on_boot.
  # Values: timer, button, cold_boot, other_<N>.
  - platform: template
    name: "Wake Reason"
    id: wake_reason_sensor
    icon: mdi:power-on
    entity_category: diagnostic
    update_interval: 30s
    lambda: 'return id(wake_reason_str);'

  # Single-glance health rollup. Aggregates the major diagnostic signals into
  # one of three states. Subscribe to status/health to inventory fleet status.
  #   CRITICAL → drain alarm tripped this wake OR battery below critical threshold
  #              OR a sensor has failed ≥5 consecutive times
  #   DEGRADED → device has a history of drain trips, OR sensor has failed
  #              between 1-4 times in a row, OR boot loop counter elevated
  #   OK       → none of the above
  - platform: template
    name: "Health Status"
    id: health_status_sensor
    icon: mdi:heart-pulse
    entity_category: diagnostic
    update_interval: 30s
    lambda: |-
      // CRITICAL — fire on any of these
      if (id(drain_protection_triggered)) return std::string("CRITICAL");
      if (id(critical_battery_active)) return std::string("CRITICAL");
      if (id(sen55_fail_count) >= 5) return std::string("CRITICAL");
      if (id(sht_fail_count) >= 5) return std::string("CRITICAL");
      if (id(max17048_fail_count) >= 5) return std::string("CRITICAL");
      if (id(boot_loop_force_sleep)) return std::string("CRITICAL");
      // DEGRADED — historical or partial issues
      if (id(drain_trigger_count) > 0) return std::string("DEGRADED");
      if (id(sen55_fail_count) > 0) return std::string("DEGRADED");
      if (id(sht_fail_count) > 0) return std::string("DEGRADED");
      if (id(max17048_fail_count) > 0) return std::string("DEGRADED");
      if (id(rapid_boot_count) > 0) return std::string("DEGRADED");
      return std::string("OK");

  # Human-readable summary of the most recent drain-alarm trip.
  # "Never" when drain_last_trigger_boot == 0 (fresh device or NVS reset).
  # Otherwise: which boot it tripped on, and how many wakes ago that was.
  - platform: template
    name: "Last Drain Trigger"
    id: last_drain_trigger_text
    icon: mdi:history
    entity_category: diagnostic
    update_interval: 30s
    lambda: |-
      if (id(drain_last_trigger_boot) == 0) {
        return std::string("Never");
      }
      char buf[64];
      uint32_t boots_ago = id(boot_count) - id(drain_last_trigger_boot);
      snprintf(buf, sizeof(buf), "Boot #%u (%u wake%s ago)",
               (unsigned)id(drain_last_trigger_boot),
               (unsigned)boots_ago,
               boots_ago == 1 ? "" : "s");
      return std::string(buf);

  # Human-readable current-session uptime (resets to 0 on each wake from deep sleep).
  # Most useful when Prevent Sleep is ON to watch how long you've been in debug mode.
  - platform: template
    name: "Uptime"
    id: uptime_text
    icon: mdi:timer-outline
    entity_category: "diagnostic"
    update_interval: 10s
    lambda: |-
      uint32_t s = millis() / 1000;
      uint32_t h = s / 3600;
      uint32_t m = (s % 3600) / 60;
      uint32_t ss = s % 60;
      char buf[32];
      if (h > 0) {
        snprintf(buf, sizeof(buf), "%uh %um %us", (unsigned)h, (unsigned)m, (unsigned)ss);
      } else if (m > 0) {
        snprintf(buf, sizeof(buf), "%um %us", (unsigned)m, (unsigned)ss);
      } else {
        snprintf(buf, sizeof(buf), "%us", (unsigned)ss);
      }
      return std::string(buf);

  - platform: template
    name: "Device ID"
    id: device_mac_address
    entity_category: "diagnostic"
    lambda: |-
      uint8_t mac[6];
      esp_read_mac(mac, ESP_MAC_BASE);
      char buf[18];
      snprintf(buf, sizeof(buf), "%02X:%02X:%02X:%02X:%02X:%02X",
               mac[0], mac[1], mac[2], mac[3], mac[4], mac[5]);
      return std::string(buf);


  - platform: template
    name: "IP Address"
    id: device_ip_address
    icon: mdi:ip-network
    entity_category: "diagnostic"
    lambda: |-
      auto ips = esphome::network::get_ip_addresses();
      if (ips.size() > 0 && ips[0].is_set()) {
        char buf[esphome::network::IP_ADDRESS_BUFFER_SIZE];
        ips[0].str_to(buf);
        return std::string(buf);
      }
      return std::string("No IP");
    update_interval: 10s
