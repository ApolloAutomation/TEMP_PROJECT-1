substitutions:
  version: "26.7.12.1"
  device_description: TEMP_PRO-1 MQTT made by Apollo Automation - version ${version}.

# Merged into each variant's esphome: block (packages deep-merge dicts and
# concatenate lists, so this on_boot entry joins the variant's own entries;
# execution order is decided by priority, not file order).
esphome:
  on_boot:
    # Per-device command topics for identity settings. The broadcast topics
    # stay untouched (removing them would break deployed Ignition bindings),
    # but identity MUST also be settable per device: one broadcast column_id
    # would collapse every device's data tree onto a single prefix. Topic
    # form: apollo/temp-pro-1/<mac6>/command/{column_id,custom_column_id,
    # deployment_notes}, where <mac6> is the lowercase last 6 hex digits of
    # the MAC (same suffix used in default data topics). Subscribed once at
    # boot; the client re-subscribes automatically on every reconnect.
    # Priority 600: after NVS restore (~800), before MQTT setup (~250).
    - priority: 600
      then:
        - lambda: |-
            std::string mac_str = esphome::get_mac_address();
            std::string mac6;
            size_t start = mac_str.length() >= 6 ? mac_str.length() - 6 : 0;
            for (size_t i = start; i < mac_str.length(); i++) {
              char c = mac_str[i];
              mac6 += (c >= 'A' && c <= 'Z') ? (char) (c + 32) : c;
            }
            std::string base = "apollo/temp-pro-1/" + mac6 + "/command/";
            id(mqtt_client)->subscribe(base + "column_id",
              [](const std::string &topic, const std::string &payload) {
                if (payload.empty()) return;
                auto call = id(column_id).make_call();
                call.set_option(payload);
                call.perform();
                ESP_LOGI("Apollo", "Column ID set per-device: %s", payload.c_str());
              });
            id(mqtt_client)->subscribe(base + "custom_column_id",
              [](const std::string &topic, const std::string &payload) {
                auto call = id(custom_column_id).make_call();
                call.set_value(payload);
                call.perform();
                ESP_LOGI("Apollo", "Custom Column ID set per-device: '%s'", payload.c_str());
              });
            id(mqtt_client)->subscribe(base + "deployment_notes",
              [](const std::string &topic, const std::string &payload) {
                auto call = id(deployment_notes).make_call();
                call.set_value(payload);
                call.perform();
                ESP_LOGI("Apollo", "Deployment notes set per-device");
              });
            ESP_LOGI("Apollo", "Per-device identity commands active under %scolumn_id|custom_column_id|deployment_notes", base.c_str());

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 8MB
  # Explicit, supported way to pin the clock. ESPHome 2026.4.0 flips the S3
  # default to 240 MHz and emits its own CONFIG_ESP_DEFAULT_CPU_FREQ_MHZ_240,
  # so relying on the raw sdkconfig override below alone would silently
  # double the clock (and the awake power draw) on the first toolchain bump.
  cpu_frequency: 160MHZ
  framework:
    type: esp-idf
    sdkconfig_options:
      # Disable Bluetooth to save power (not needed for MQTT over Ethernet)
      CONFIG_BT_ENABLED: n
      # Lower CPU frequency to save power (160MHz is sufficient for Ethernet + I2C)
      CONFIG_ESP_DEFAULT_CPU_FREQ_MHZ_160: y

external_components:
  - source: github://ApolloAutomation/esphome-battery-component@2f24e89a2a4bb02cda63ab074585904cd58247c4
    components: [max17048]

globals:
  # NOTE: never set true anywhere in the MQTT family — only the non-MQTT
  # Core.yaml alarm logic writes it. Kept so the wake-cap condition below
  # stays structurally identical to Core.yaml. Do NOT port Core.yaml alarm
  # code without re-reviewing the wake cap.
  - id: alarm_triggered_on_wake
    type: bool
    restore_value: no
    initial_value: 'false'
  # Latch so the wake-time-cap interval fires its forced-sleep sequence only
  # once per wake. Without it the 5 s tick re-triggers the whole sequence
  # (duplicate sensor reads + a duplicate ~45-message publish batch) while the
  # first sequence is still draining.
  - id: cap_fired
    type: bool
    restore_value: no
    initial_value: 'false'
  # True while an OTA upload is being received (set by the ota triggers in
  # the variant files). The wake-time cap skips forced sleep during an upload
  # so it cannot cut a web-server OTA off mid-transfer, with a hard 10-minute
  # failsafe past the cap in case an upload wedges.
  - id: ota_in_progress
    type: bool
    restore_value: no
    initial_value: 'false'
  # Boot/wake counter persisted across deep sleep (NVS)
  - id: boot_count
    type: uint32_t
    restore_value: true
    initial_value: '0'
  # SEN55 hardware identification (populated once on first boot)
  - id: sen55_serial
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: sen55_fw
    type: std::string
    restore_value: no
    initial_value: '""'
  # Timestamp of last publish during prevent_sleep mode (for configurable interval)
  - id: last_prevent_sleep_publish_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  # millis() stamp of the most recent MQTT connect (set in each variant's
  # on_connect). The retained-replay guard in apply_power_mode_command
  # measures against this: the broker re-delivers RETAINED command payloads
  # on every subscribe, so a "battery" command arriving within 60s of
  # connect is almost certainly stale, not an operator. 0 = not connected
  # yet this boot.
  - id: mqtt_connected_at_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  # Critical-battery flag (set by check_critical_battery this wake). Drives the
  # CRITICAL bit of the health rollup and the status/critical_battery topic.
  - id: critical_battery_active
    type: bool
    restore_value: no
    initial_value: 'false'
  # Consecutive cold-boot count (NVS). A "cold boot" is wake_reason == cold_boot,
  # which means the device did NOT wake from a normal deep-sleep timer or button
  # press — i.e. it crashed/reset before reaching deep sleep. Cleared whenever
  # we see a normal timer/button wake. ≥3 in a row = boot loop → 30-min cooldown.
  - id: rapid_boot_count
    type: uint32_t
    restore_value: true
    initial_value: '0'
  # Set true by check_boot_loop when cooldown is needed. on_connect checks this
  # at the very start and skips normal flow → straight to prepare_and_sleep.
  - id: boot_loop_force_sleep
    type: bool
    restore_value: no
    initial_value: 'false'
  # One-time flag: set true after the on_boot safety reset has corrected a
  # stale max_wake_time_s NVS value (< 45). Persists across reboots so the
  # auto-correction only runs ONCE per device. After that, operators can
  # tune max_wake_time_s below 45 again via the web server if they want.
  - id: max_wake_time_reset_done
    type: bool
    restore_value: true
    initial_value: 'false'
  # Why the device woke up — captured in on_boot via esp_sleep_get_wakeup_cause()
  # and published as meta/wake_reason. Values: timer, button, cold_boot, other.
  - id: wake_reason_str
    type: std::string
    restore_value: no
    initial_value: '"unknown"'
  # Consecutive sensor read failures (NaN). Cleared on any successful read.
  # Lets operators tell "occasional glitch" from "persistent hardware fault."
  - id: sen55_fail_count
    type: uint32_t
    restore_value: true
    initial_value: '0'
  - id: sht_fail_count
    type: uint32_t
    restore_value: true
    initial_value: '0'
  - id: max17048_fail_count
    type: uint32_t
    restore_value: true
    initial_value: '0'
  # Lifetime min/max battery % seen (NVS). Useful for spotting aging cells —
  # a healthy fleet has min ~50% (right before charge), max ~100%.
  - id: lifetime_min_battery_pct
    type: float
    restore_value: true
    initial_value: '101.0f'
  - id: lifetime_max_battery_pct
    type: float
    restore_value: true
    initial_value: '-1.0f'
  - id: lifetime_min_battery_v
    type: float
    restore_value: true
    initial_value: '99.0f'
  - id: lifetime_max_battery_v
    type: float
    restore_value: true
    initial_value: '-1.0f'
  # Consecutive boots where an MQTT broker override was configured but the
  # device never reached the broker (NVS). Incremented at boot when an
  # override is active, cleared on any successful MQTT connect. After 5
  # strikes the boot-time override hook alternates between the override and
  # the compile-time default so one bad broadcast broker value can no longer
  # permanently orphan a device (reboot_timeout is 0s by design, so nothing
  # else would ever recover it). The override text itself is never erased.
  - id: mqtt_override_fail_count
    type: uint32_t
    restore_value: true
    initial_value: '0'

# mDNS lets field techs reach the device at http://apollo-tmp-pro-1-mqtte-<mac6>.local/
# Only active while the device is awake; no impact on deep sleep power.
mdns:

i2c:
  sda: GPIO16
  scl: GPIO17
  id: bus_a

web_server:
  port: 80
  version: 3
  # Serve the v3 frontend from flash instead of oi.esphome.io. Without this,
  # the browser fetches the UI assets from an external CDN — a blank config
  # page on any restricted or air-gapped network (exactly where these devices
  # are deployed), and an external dependency at odds with local-first
  # operation. The historical bug where local: true forced the v2 frontend
  # was fixed in ESPHome 2024.5.0; 2026.3.1 ships a proper v3 local bundle.
  local: true
  # Hide internal-only entities (e.g. SEN55 cumulative mass values) from the UI.
  # Entities we want visible have `internal: true` removed.
  include_internal: false
  # Grouped layout for the v3 UI — without groups the page is one flat list
  # of ~55 entities. Per-entity assignments live on each entity as
  # web_server: {sorting_group_id, sorting_weight}.
  sorting_groups:
    - id: sg_live
      name: "Live Readings"
      sorting_weight: 10
    - id: sg_calibration
      name: "Calibration"
      sorting_weight: 20
    - id: sg_power
      name: "Sleep and Power"
      sorting_weight: 30
    - id: sg_network
      name: "MQTT and Network"
      sorting_weight: 40
    - id: sg_identity
      name: "Identification"
      sorting_weight: 50
    - id: sg_maintenance
      name: "Maintenance"
      sorting_weight: 60
    - id: sg_diag
      name: "Diagnostics"
      sorting_weight: 70
  # HTTP basic auth. Values live in the gitignored secrets.yaml (see
  # secrets.yaml.example). Do NOT remove this block: the on_boot web-auth
  # override lambdas in the variant files only take effect when compile-time
  # auth exists to override.
  auth:
    username: !secret web_auth_username
    password: !secret web_auth_password

deep_sleep:
  id: deep_sleep_1
  sleep_duration: 30min  # PRODUCTION default (Toyota requirement)
  # Wake on button press (GPIO0 grounded). Adds ~5µA during sleep (negligible).
  # INVERT_WAKEUP handles the edge case of button held at sleep entry.
  wakeup_pin:
    number: GPIO0
    inverted: true
    allow_other_uses: true
    # GPIO0 is a strapping pin (sampled at boot for download-mode select).
    # Safe here because we use only the internal pullup — no external
    # circuitry that could hold it LOW at power-on.
    ignore_strapping_warning: true
    mode:
      input: true
      pullup: true
  wakeup_pin_mode: INVERT_WAKEUP

# Buzzer
output:
  - platform: ledc
    pin: GPIO8
    id: buzzer

rtttl:
  id: rtttl_buzzer
  output: buzzer

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      inverted: true
      allow_other_uses: true  # shared with deep_sleep wakeup_pin
      ignore_strapping_warning: true  # see deep_sleep wakeup_pin for rationale
      mode:
        input: true
        pullup: true
    id: reset_button
    internal: true
    # ESPHome 2026.3.0 lets raw contact bounce reach automations; per the
    # release notes, on_multi_click configs need an explicit debounce filter.
    # Without it, a single bouncy press can generate ms-scale ON/OFF edges
    # that pattern-match the triple-click and flip a wired unit into battery
    # mode. 20 ms is negligible against the 0.3-0.5 s click windows.
    filters:
      - delayed_on_off: 20ms
    on_multi_click:
      # Triple click - toggle power source (battery <-> wired).
      # Solid RED 3s = WIRED (stays awake / "STOP - no sleep")
      # Solid GREEN 3s = BATTERY (will sleep / "GO to sleep")
      # This is the ONLY power-mode toggle on the device — replaces the old
      # separate prevent_sleep + power_source pair.
      - timing:
          - ON for at most 0.5s
          - OFF for at most 0.5s
          - ON for at most 0.5s
          - OFF for at most 0.5s
          - ON for at most 0.5s
          - OFF for at least 0.3s
        then:
          - lambda: |-
              auto call = id(power_source).make_call();
              if (id(power_source).current_option() == "wired") {
                call.set_option("battery");
                ESP_LOGW("Apollo", "Power source set to BATTERY via 3x button press");
              } else {
                call.set_option("wired");
                ESP_LOGW("Apollo", "Power source set to WIRED via 3x button press");
              }
              call.perform();
          - if:
              condition:
                lambda: 'return id(power_source).current_option() == "wired";'
              then:
                - light.turn_on:
                    id: rgb_light
                    brightness: 25%
                    red: 100%
                    green: 0%
                    blue: 0%
                - delay: 3s
                - light.turn_off: rgb_light
              else:
                - light.turn_on:
                    id: rgb_light
                    brightness: 25%
                    red: 0%
                    green: 100%
                    blue: 0%
                - delay: 3s
                - light.turn_off: rgb_light
      # Long press (10s) - factory reset
      - timing:
          - ON for at least 10s
        then:
          - lambda: |-
              id(factory_reset_switch).turn_on();
      # Single click - status check
      - timing:
          - ON for at most 0.5s
          - OFF for at least 0.5s
        then:
          - script.execute: statusCheck

  # Live flag — TRUE during the wake when battery was below the critical threshold.
  - platform: template
    name: "Critical Battery (this wake)"
    id: critical_battery_binary
    web_server:
      sorting_group_id: sg_diag
      sorting_weight: 76
    icon: mdi:battery-alert
    entity_category: diagnostic
    lambda: 'return id(critical_battery_active);'

sensor:
  - platform: sen5x
    id: sen55
    pm_1_0:
      name: "PM <1µm Weight concentration"
      id: pm_1_0
      internal: true
      accuracy_decimals: 1
    pm_2_5:
      name: "PM <2.5µm Weight concentration"
      id: pm_2_5
      internal: true
      accuracy_decimals: 1
    pm_4_0:
      name: "PM <4µm Weight concentration"
      id: pm_4_0
      internal: true
      accuracy_decimals: 1
    pm_10_0:
      name: "PM <10µm Weight concentration"
      id: pm_10_0
      internal: true
      accuracy_decimals: 1
    # VOC/NOx disabled — not published to MQTT and 30s wake window is too short
    # for the learning algorithm to produce meaningful values
    store_baseline: false
    update_interval: 10s

  # SHT3x temperature + humidity sensor (more accurate than SEN55's internal RH/T).
  # Temperature converted from native °C to °F to match ESP Temperature.
  - platform: sht3xd
    id: sht3xd_sensor
    temperature:
      name: "Temperature"
      id: sht_temperature
      web_server:
        sorting_group_id: sg_live
        sorting_weight: 11
      accuracy_decimals: 1
      unit_of_measurement: "°F"
      filters:
        # C-to-F, then the per-unit calibration offset. NaN passes through
        # untouched so failure detection keeps working.
        - lambda: |-
            if (std::isnan(x)) return x;
            return x * 9.0 / 5.0 + 32.0 + id(sht_temp_offset_f).state;
    humidity:
      name: "Relative Humidity"
      id: sht_humidity
      web_server:
        sorting_group_id: sg_live
        sorting_weight: 12
      accuracy_decimals: 1
      filters:
        # Per-unit calibration offset, clamped to the physical 0-100 % range.
        # NaN passes through untouched for failure detection.
        - lambda: |-
            if (std::isnan(x)) return x;
            float v = x + id(sht_hum_offset).state;
            if (v < 0.0f) return 0.0f;
            if (v > 100.0f) return 100.0f;
            return v;
    update_interval: 10s

  # PM mass concentration ranges (what's actually in each size bucket).
  # SEN55 reports cumulative values (<1µm includes all smaller); we subtract
  # to get per-bucket values.
  - platform: template
    name: "PM 0.3 to 1 µm"
    web_server:
      sorting_group_id: sg_live
      sorting_weight: 13
    lambda: |-
      if (std::isnan(id(pm_1_0).state)) return NAN;
      return std::max(0.0f, id(pm_1_0).state);
    unit_of_measurement: "µg/m³"
    device_class: pm1
    state_class: measurement
    accuracy_decimals: 1
    icon: mdi:air-filter
    update_interval: 10s

  - platform: template
    name: "PM 1 to 2.5 µm"
    web_server:
      sorting_group_id: sg_live
      sorting_weight: 14
    lambda: |-
      if (std::isnan(id(pm_1_0).state) || std::isnan(id(pm_2_5).state)) return NAN;
      return std::max(0.0f, id(pm_2_5).state - id(pm_1_0).state);
    unit_of_measurement: "µg/m³"
    device_class: pm25
    state_class: measurement
    accuracy_decimals: 1
    icon: mdi:air-filter
    update_interval: 10s

  - platform: template
    name: "PM 2.5 to 4 µm"
    web_server:
      sorting_group_id: sg_live
      sorting_weight: 15
    lambda: |-
      if (std::isnan(id(pm_2_5).state) || std::isnan(id(pm_4_0).state)) return NAN;
      return std::max(0.0f, id(pm_4_0).state - id(pm_2_5).state);
    unit_of_measurement: "µg/m³"
    state_class: measurement
    accuracy_decimals: 1
    icon: mdi:air-filter
    update_interval: 10s

  - platform: template
    name: "PM 4 to 10 µm"
    web_server:
      sorting_group_id: sg_live
      sorting_weight: 16
    lambda: |-
      if (std::isnan(id(pm_4_0).state) || std::isnan(id(pm_10_0).state)) return NAN;
      return std::max(0.0f, id(pm_10_0).state - id(pm_4_0).state);
    unit_of_measurement: "µg/m³"
    device_class: pm10
    state_class: measurement
    accuracy_decimals: 1
    icon: mdi:air-filter
    update_interval: 10s

  # Total PM mass (cumulative <10 µm — same as raw SEN55 pm_10_0).
  - platform: template
    name: "PM Total"
    web_server:
      sorting_group_id: sg_live
      sorting_weight: 17
    lambda: |-
      if (std::isnan(id(pm_10_0).state)) return NAN;
      return std::max(0.0f, id(pm_10_0).state);
    unit_of_measurement: "µg/m³"
    state_class: measurement
    accuracy_decimals: 1
    icon: mdi:air-filter
    update_interval: 10s

  # ESP32 internal die temperature — health indicator for thermal issues.
  # Converted from the sensor's native °C to °F.
  - platform: internal_temperature
    name: "ESP Temperature"
    id: esp_internal_temp
    web_server:
      sorting_group_id: sg_diag
      sorting_weight: 75
    update_interval: 60s
    entity_category: "diagnostic"
    unit_of_measurement: "°F"
    filters:
      - lambda: 'return x * 9.0 / 5.0 + 32.0;'

  # Battery monitoring
  - platform: max17048
    id: max_17048
    battery_voltage:
      name: Battery voltage
      id: batt_v
      web_server:
        sorting_group_id: sg_live
        sorting_weight: 19
    battery_level:
      name: Battery level
      id: batt_pct
      web_server:
        sorting_group_id: sg_live
        sorting_weight: 18
      filters:
        # Clamp both ends: fuel-gauge glitches can report >100 or negative
        # SOC, and a negative value would permanently pollute the NVS-stored
        # lifetime minimum. NaN passes through for failure detection.
        - lambda: |
            if (x > 100) return 100;
            if (x < 0) return 0;
            return (x);

  # Per-sensor consecutive-failure counters. Reset to 0 on a successful read.
  # Non-zero values indicate a glitch or persistent fault; high values flag
  # hardware that needs replacing.
  - platform: template
    name: "SEN55 Fail Count"
    id: sen55_fail_count_sensor
    web_server:
      sorting_group_id: sg_diag
      sorting_weight: 80
    icon: mdi:alert-circle-outline
    entity_category: diagnostic
    accuracy_decimals: 0
    update_interval: 30s
    lambda: 'return (float)id(sen55_fail_count);'

  - platform: template
    name: "SHT3x Fail Count"
    id: sht_fail_count_sensor
    web_server:
      sorting_group_id: sg_diag
      sorting_weight: 81
    icon: mdi:alert-circle-outline
    entity_category: diagnostic
    accuracy_decimals: 0
    update_interval: 30s
    lambda: 'return (float)id(sht_fail_count);'

  - platform: template
    name: "MAX17048 Fail Count"
    id: max17048_fail_count_sensor
    web_server:
      sorting_group_id: sg_diag
      sorting_weight: 82
    icon: mdi:alert-circle-outline
    entity_category: diagnostic
    accuracy_decimals: 0
    update_interval: 30s
    lambda: 'return (float)id(max17048_fail_count);'

  # Lifetime battery min/max — sentinel-aware (initial values 101 / -1 / 99 / -1
  # mean "never observed yet" → return NaN so the web UI shows "Unknown").
  - platform: template
    name: "Lifetime Min Battery"
    id: lifetime_min_battery_pct_sensor
    web_server:
      sorting_group_id: sg_diag
      sorting_weight: 83
    icon: mdi:battery-low
    entity_category: diagnostic
    accuracy_decimals: 1
    unit_of_measurement: "%"
    update_interval: 60s
    lambda: |-
      float v = id(lifetime_min_battery_pct);
      return (v > 100.0f) ? NAN : v;

  - platform: template
    name: "Lifetime Max Battery"
    id: lifetime_max_battery_pct_sensor
    web_server:
      sorting_group_id: sg_diag
      sorting_weight: 84
    icon: mdi:battery-high
    entity_category: diagnostic
    accuracy_decimals: 1
    unit_of_measurement: "%"
    update_interval: 60s
    lambda: |-
      float v = id(lifetime_max_battery_pct);
      return (v < 0.0f) ? NAN : v;

  - platform: template
    name: "Lifetime Min Battery Voltage"
    id: lifetime_min_battery_v_sensor
    web_server:
      sorting_group_id: sg_diag
      sorting_weight: 85
    icon: mdi:flash-off
    entity_category: diagnostic
    accuracy_decimals: 3
    unit_of_measurement: "V"
    update_interval: 60s
    lambda: |-
      float v = id(lifetime_min_battery_v);
      return (v > 10.0f) ? NAN : v;

  - platform: template
    name: "Lifetime Max Battery Voltage"
    id: lifetime_max_battery_v_sensor
    web_server:
      sorting_group_id: sg_diag
      sorting_weight: 86
    icon: mdi:flash
    entity_category: diagnostic
    accuracy_decimals: 3
    unit_of_measurement: "V"
    update_interval: 60s
    lambda: |-
      float v = id(lifetime_max_battery_v);
      return (v < 0.0f) ? NAN : v;

light:
  - platform: esp32_rmt_led_strip
    id: rgb_light
    web_server:
      sorting_group_id: sg_diag
      sorting_weight: 90
    name: "RGB Light"
    pin: GPIO4
    default_transition_length: 0s
    chipset: WS2812
    num_leds: 4
    rgb_order: grb
    entity_category: "diagnostic"
    effects:
      - pulse:
          name: "Slow Pulse"
          transition_length: 1000ms
          update_interval: 1000ms
          min_brightness: 0%
          max_brightness: 25%
      - pulse:
          name: "Fast Pulse"
          transition_length: 100ms
          update_interval: 100ms
          min_brightness: 10%
          max_brightness: 25%

number:
  # MQTT broker port override (0 = use compile-time !secret port).
  # Takes effect on next reboot.
  - platform: template
    name: "MQTT Port"
    id: mqtt_port_override
    web_server:
      sorting_group_id: sg_network
      sorting_weight: 42
    min_value: 0
    max_value: 65535
    step: 1
    mode: box
    update_interval: never
    optimistic: true
    restore_value: true
    initial_value: 0
    icon: mdi:numeric
    entity_category: CONFIG

  # Max wake time before safety-net forces sleep (seconds from boot).
  # 45s default is comfortable for healthy networks. Bump higher for slow STP or flaky DNS.
  # Max Wake Time — hard cap on per-wake duration before the safety-net
  # interval forces sleep. min_value stays at 30 to keep it tunable for
  # special cases (testing, very-fast networks). A one-time auto-reset in
  # on_boot (in the variant YAMLs) heals any device that's stuck at < 45
  # from older firmware, but only runs ONCE per device — operators can
  # subsequently tune below 45 again via the web server if they have a
  # good reason. Going below 45 risks the safety-net cutting MQTT off
  # mid-publish on slow networks, so know what you're doing.
  - platform: template
    name: "Max Wake Time"
    id: max_wake_time_s
    web_server:
      sorting_group_id: sg_power
      sorting_weight: 33
    min_value: 30
    max_value: 180
    step: 1
    mode: box
    update_interval: never
    optimistic: true
    restore_value: true
    initial_value: 45
    icon: "mdi:timer-alert"
    entity_category: CONFIG
    unit_of_measurement: "s"

  # Critical-battery threshold (%). When battery drops below this on a
  # battery-mode device, the wake still publishes data and the next sleep is
  # extended to critical_battery_sleep_min. Wired devices publish the status
  # flag but are never auto-switched — power_source only changes when an
  # operator changes it. Set 0 to disable.
  - platform: template
    name: "Critical Battery Threshold"
    id: critical_battery_threshold_pct
    web_server:
      sorting_group_id: sg_power
      sorting_weight: 34
    min_value: 0
    max_value: 50
    step: 1
    mode: box
    update_interval: never
    optimistic: true
    restore_value: true
    initial_value: 5
    icon: "mdi:battery-alert-variant-outline"
    entity_category: CONFIG
    unit_of_measurement: "%"

  # Sleep duration used while the critical-battery threshold is tripped.
  # Default 60 min — half the wake frequency, doubling battery life from
  # the moment the threshold triggers until the unit is swapped/recharged.
  - platform: template
    name: "Critical Battery Sleep Duration"
    id: critical_battery_sleep_min
    web_server:
      sorting_group_id: sg_power
      sorting_weight: 35
    min_value: 5
    max_value: 1440
    step: 1
    mode: box
    update_interval: never
    optimistic: true
    restore_value: true
    initial_value: 60
    icon: "mdi:battery-clock"
    entity_category: CONFIG
    unit_of_measurement: "min"

  # How often to publish MQTT data while Prevent Sleep is ON.
  # Default 10s. Increase for reduced chatter or decrease for faster live debugging.
  - platform: template
    name: "Publish Interval"
    id: prevent_sleep_publish_interval_s
    web_server:
      sorting_group_id: sg_power
      sorting_weight: 36
    min_value: 1
    max_value: 3600
    step: 1
    mode: box
    update_interval: never
    optimistic: true
    restore_value: true
    initial_value: 10
    icon: mdi:timer-outline
    entity_category: CONFIG
    unit_of_measurement: "s"

  # Per-unit SHT3x calibration against a reference instrument, applied in the
  # sensor filter chain (temperature offset is in °F, after the C-to-F
  # conversion). 0 = no correction. Survives reboots and power cuts.
  - platform: template
    name: "SHT Temperature Offset"
    id: sht_temp_offset_f
    web_server:
      sorting_group_id: sg_calibration
      sorting_weight: 21
    min_value: -10
    max_value: 10
    step: 0.1
    mode: box
    update_interval: never
    optimistic: true
    restore_value: true
    initial_value: 0
    icon: "mdi:thermometer-plus"
    entity_category: CONFIG
    unit_of_measurement: "°F"

  - platform: template
    name: "SHT Humidity Offset"
    id: sht_hum_offset
    web_server:
      sorting_group_id: sg_calibration
      sorting_weight: 22
    min_value: -20
    max_value: 20
    step: 0.5
    mode: box
    update_interval: never
    optimistic: true
    restore_value: true
    initial_value: 0
    icon: "mdi:water-percent"
    entity_category: CONFIG
    unit_of_measurement: "%"

  # Buzzer loudness (rtttl gain). The NVS-restored value re-fires on_value
  # during setup, so it also applies after reboots and power cuts.
  - platform: template
    name: "Buzzer Volume"
    id: buzzer_volume_pct
    web_server:
      sorting_group_id: sg_maintenance
      sorting_weight: 65
    min_value: 0
    max_value: 100
    step: 5
    mode: box
    update_interval: never
    optimistic: true
    restore_value: true
    initial_value: 60
    icon: "mdi:volume-high"
    entity_category: CONFIG
    unit_of_measurement: "%"
    on_value:
      then:
        - lambda: 'id(rtttl_buzzer).set_gain(x / 100.0f);'

  # Warm-up delay before sampling SEN55 (seconds from boot).
  # 20s is the SEN55 datasheet minimum for valid PM readings — was the
  # pre-May-2 default and ran for months at TMMK with usable data.
  # Saves ~10s per battery wake cycle vs the 30s conservative bump.
  # Note: existing devices with NVS-saved 30 will keep 30 until set via
  # web server (or until the operator wants to manually drop them).
  - platform: template
    name: "Warm-up Delay"
    id: warmup_delay_s
    web_server:
      sorting_group_id: sg_calibration
      sorting_weight: 23
    min_value: 0
    max_value: 60
    step: 1
    mode: box
    update_interval: never
    optimistic: true
    restore_value: true
    initial_value: 20
    icon: "mdi:timer-sand"
    entity_category: CONFIG
    unit_of_measurement: "s"

  # MQTT QoS for all sensor/meta/status publishes from publish_mqtt_data.
  #   0 = fire and forget (lowest overhead, no delivery guarantee)
  #   1 = at-least-once (broker PUBACK required, possible duplicates — fine since
  #       retain=true means the broker overwrites cleanly). DEFAULT.
  #   2 = exactly-once (4-way handshake, overkill for sensor snapshots)
  # Why default 1: at QoS 0 the IDF MQTT client treats publishes as fire-and-
  # forget and discards the TCP outbox at deep_sleep.enter. At QoS 1 the client
  # tracks pending PUBACKs and the publish path is more resilient to the brief
  # wake window. Pairs with the 10-sec post-publish drain delay in on_connect
  # (and the matching drain in the wake-cap safety net).
  - platform: template
    name: "MQTT QoS"
    id: qos_level
    web_server:
      sorting_group_id: sg_network
      sorting_weight: 46
    min_value: 0
    max_value: 2
    step: 1
    mode: box
    update_interval: never
    optimistic: true
    restore_value: true
    initial_value: 1
    icon: "mdi:check-network"
    entity_category: CONFIG

  # Deep sleep duration in MINUTES — configurable via web server text box.
  # restore_value: true persists web UI changes across reboots.
  # PRODUCTION default: 30 min (Toyota requirement).
  - platform: template
    name: "Sleep Duration"
    id: deep_sleep_sleep_duration
    web_server:
      sorting_group_id: sg_power
      sorting_weight: 32
    min_value: 1
    max_value: 1440
    step: 1
    mode: box
    update_interval: never
    optimistic: true
    restore_value: true
    initial_value: 30
    icon: "mdi:arrow-collapse-right"
    entity_category: CONFIG
    unit_of_measurement: "min"
    on_value:
      then:
        - lambda: |-
            id(deep_sleep_1).set_sleep_duration(x * 60 * 1000);
            ESP_LOGW("Apollo", "Sleep duration updated to %.0f min", x);

switch:
  - platform: factory_reset
    id: factory_reset_switch
    internal: true

  - platform: gpio
    pin: GPIO7
    name: "Accessory Power"
    id: accessory_power
    web_server:
      sorting_group_id: sg_diag
      sorting_weight: 99
    restore_mode: ALWAYS_ON
    setup_priority: 1100
    entity_category: "diagnostic"

  # Master buzzer enable. OFF silences the MQTT buzzer command and the Test
  # Buzzer button without needing broker-side changes — a rogue or retained
  # buzzer payload cannot make noise on the floor while this is off.
  - platform: template
    name: "Buzzer Enabled"
    id: buzzer_enabled
    web_server:
      sorting_group_id: sg_maintenance
      sorting_weight: 64
    icon: mdi:bell-ring
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    entity_category: "config"

  # Show battery level LED on every wake (even unattended cycles).
  # Default OFF to save battery; turn ON as an always-on indicator for techs.
  - platform: template
    name: "Battery LED on Wake"
    id: battery_led_on_wake
    web_server:
      sorting_group_id: sg_power
      sorting_weight: 37
    icon: mdi:led-on
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
    entity_category: "config"

  # Enable static IP instead of DHCP.
  # WARNING: misconfiguration can lock out the device. Recover via USB or by accessing
  # the web UI on the same subnet (mDNS still works locally).
  - platform: template
    name: "Use Static IP"
    id: use_static_ip
    web_server:
      sorting_group_id: sg_network
      sorting_weight: 49
    icon: mdi:ip-network
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
    entity_category: "config"
    on_turn_on:
      - lambda: 'ESP_LOGW("Apollo", "Static IP will be applied on next reboot. Reboot now to activate.");'
    on_turn_off:
      - lambda: 'ESP_LOGW("Apollo", "DHCP will be used on next reboot. Reboot now to activate.");'

  # NOTE: the old `prevent_sleep` switch was merged into the `power_source`
  # select (battery=sleeps, wired=stays awake). Both were doing the same job.

  # Verbose logging toggle — flips runtime log level between DEBUG (verbose,
  # default) and WARN (quiet) without re-flashing.
  #
  # ALWAYS_ON intentionally — DEBUG is what techs expect to see (the "blue"
  # [D][sensor:...] lines that show every per-sensor reading). The previous
  # ALWAYS_OFF default fired on_turn_off during setup, silencing DEBUG before
  # any sensor publishes happened, which broke the visible-by-default behavior.
  #
  # Toggle OFF in the web UI to silence DEBUG temporarily for the current run
  # (resets to ON on next reboot — by design, so you can never get permanently
  # locked out of seeing sensor readings if you walk away with it OFF).
  # Battery cost of DEBUG vs WARN is negligible (~µs per log line).
  - platform: template
    name: "Verbose Logging"
    id: verbose_logging
    web_server:
      sorting_group_id: sg_maintenance
      sorting_weight: 68
    icon: mdi:console-line
    restore_mode: ALWAYS_ON
    optimistic: true
    entity_category: "diagnostic"
    on_turn_on:
      - logger.set_level: DEBUG
    on_turn_off:
      - logger.set_level: WARN
      - lambda: 'ESP_LOGW("Apollo", "Verbose logging DISABLED — log level set to WARN until next reboot");'

interval:
  # Battery-device wake-time enforcer. Single rule: if `power_source == battery`
  # and the device has been awake longer than `max_wake_time_s`, force sleep.
  # Runs unconditionally — doesn't matter whether MQTT connected, whether the
  # publish completed, etc. The hard cap is the cap. Wired devices skip this.
  #
  # Why this is enough on its own:
  #   - Healthy wake: on_connect finishes well before max_wake_time_s and calls
  #     prepare_and_sleep itself; this interval never fires.
  #   - MQTT-failed wake: on_connect never reaches the sleep call → this interval
  #     fires at max_wake_time_s and forces sleep.
  #   - Accidentally flipped to wired then back: same as healthy.
  #   - Operator put device in "wired" for diagnostics: skipped, stays awake
  #     until the operator switches it back. power_source never changes itself.
  - interval: 5s
    startup_delay: 10s
    then:
      - if:
          condition:
            and:
              - lambda: 'return id(power_source).current_option() == "battery";'
              - lambda: 'return !id(alarm_triggered_on_wake);'
              - lambda: 'return !id(cap_fired);'
              # Skip forced sleep while an OTA upload is in flight, but never
              # past a hard 10-minute failsafe beyond the cap (a wedged upload
              # must not strand a battery unit awake).
              - lambda: |-
                  return !id(ota_in_progress) ||
                         millis() >= (uint32_t)((id(max_wake_time_s).state + 600.0f) * 1000.0f);
              - lambda: 'return millis() >= (uint32_t)(id(max_wake_time_s).state * 1000);'
          then:
            - lambda: |-
                id(cap_fired) = true;
                ESP_LOGW("Apollo", "Wake-time cap (%us) reached — forcing sensor read + log + sleep",
                         (unsigned)id(max_wake_time_s).state);
            # Force a fresh sensor read so the diagnostic log + queued publishes
            # have current values. Without this, the wake might end before the
            # passive update_interval has fired and the log shows stale data.
            # Each [D][sensor:...] line you see here comes from this update.
            - component.update: sen55
            - component.update: sht3xd_sensor
            - component.update: max_17048
            - delay: 1s
            # Run the same safety scripts the on_connect path does, so
            # offline wakes still maintain sensor health tracking and
            # critical-battery sleep extension.
            - script.execute: track_sensor_health
            - script.execute: check_critical_battery
            # Publish runs even when disconnected — queued publishes fail silently
            # but the boxed diagnostic summary log fires either way.
            - script.execute: publish_mqtt_data
            # Match on_connect's post-publish delay so the safety-net publish
            # path gets the same outbox drain time. 10 s is the empirically
            # confirmed minimum (see the on_connect comment in the variant
            # files: shorter delays lost battery data even without the scrub).
            # This path fires precisely on the slow/flaky-MQTT wakes that are
            # most likely to still have a full outbox, so it must not get a
            # shorter drain than the healthy path. (Was 5 s, contradicting the
            # comment above; originally 200 ms.)
            - delay: 10s
            - script.execute: prepare_and_sleep

  # Periodic MQTT publish for wired devices (which never sleep).
  # Battery devices publish exactly once per wake from on_connect; this loop is
  # only meaningful when the device stays awake long enough to publish more
  # than once. Interval is configurable via "Publish Interval" number.
  - interval: 1s
    startup_delay: 30s
    then:
      - if:
          condition:
            and:
              # Skip while disconnected: publish() cannot queue, so firing the
              # script during a broker outage just dropped ~40 messages and
              # logged success every interval. Reconnect triggers a fresh
              # publish via on_connect anyway.
              - mqtt.connected:
              - lambda: 'return id(power_source).current_option() == "wired";'
              - lambda: |-
                  uint32_t need_ms = (uint32_t)(id(prevent_sleep_publish_interval_s).state * 1000);
                  return (millis() - id(last_prevent_sleep_publish_ms)) >= need_ms;
          then:
            - lambda: 'id(last_prevent_sleep_publish_ms) = millis();'
            - script.execute: publish_mqtt_data

  # Periodic sensor-health tracking for wired devices. Battery devices run
  # this every wake via on_connect; wired devices need this interval because
  # their on_connect runs only once per boot. Keeps the per-sensor failure
  # counters and lifetime battery min/max fresh.
  - interval: 5min
    startup_delay: 1min
    then:
      - if:
          condition:
            lambda: 'return id(power_source).current_option() == "wired";'
          then:
            - component.update: max_17048
            - component.update: sen55
            - component.update: sht3xd_sensor
            - delay: 1s
            - script.execute: track_sensor_health

script:
  # Publish all MQTT data once (called from on_connect)
  - id: publish_mqtt_data
    then:
      - lambda: |-
          // Per-sensor validity check. We NEVER bail entirely — operator
          // visibility on battery/meta/partial-sensor data is always better
          // than total silence. If a sensor block is invalid (NaN), we skip
          // publishing those specific topics and advertise the skip list via
          // /status/sensors_skipped so subscribers/operators can detect it.
          //
          // SHT3x and MAX17048 already publish -1 sentinels for NaN below
          // (so subscribers see fresh data with an obvious failure signal).
          // PM is all-or-nothing within its block (4 ranges + total need to
          // be coherent), so for PM we skip the whole block when any is NaN
          // rather than publish meaningless partial ranges.
          bool pm_valid = !std::isnan(id(pm_1_0).state) &&
                          !std::isnan(id(pm_2_5).state) &&
                          !std::isnan(id(pm_4_0).state) &&
                          !std::isnan(id(pm_10_0).state);
          bool sht_valid = !std::isnan(id(sht_temperature).state) &&
                           !std::isnan(id(sht_humidity).state);
          bool batt_valid = !std::isnan(id(batt_pct).state);

          // Build CSV skip list for the status topic + log line.
          char sensors_skipped[32] = "";
          if (!pm_valid)   strncat(sensors_skipped, "pm,",   sizeof(sensors_skipped) - strlen(sensors_skipped) - 1);
          if (!sht_valid)  strncat(sensors_skipped, "sht,",  sizeof(sensors_skipped) - strlen(sensors_skipped) - 1);
          if (!batt_valid) strncat(sensors_skipped, "batt,", sizeof(sensors_skipped) - strlen(sensors_skipped) - 1);
          size_t slen = strlen(sensors_skipped);
          if (slen > 0 && sensors_skipped[slen - 1] == ',') sensors_skipped[slen - 1] = '\0';
          if (sensors_skipped[0] != '\0') {
            ESP_LOGW("Apollo", "Partial publish — skipped/sentineled: %s", sensors_skipped);
          }

          const char* mac = id(device_mac_address).state.c_str();
          const char* name = App.get_name().c_str();

          // Build unique device suffix from last 6 chars of MAC (e.g. "352b94").
          // Using ESPHome's portable get_mac_address() (returns "9C139EEDE290"
          // uppercase, no separators) — works on both ETH and WiFi variants.
          // base MAC == STA MAC on this chip, so the suffix matches what other
          // ESPHome MAC helpers produce.
          std::string mac_str = esphome::get_mac_address();
          char mac_suffix[7];
          // Take last 6 chars, lowercase them so topics are consistent with
          // the previous behavior.
          for (int i = 0; i < 6; i++) {
            char c = mac_str.length() >= 6 ? mac_str[mac_str.length() - 6 + i] : '0';
            mac_suffix[i] = (c >= 'A' && c <= 'Z') ? (c + 32) : c;
          }
          mac_suffix[6] = '\0';

          // Priority: Custom text > Dropdown > MAC suffix
          std::string custom = id(custom_column_id).state;
          std::string col = id(column_id).current_option();
          std::string suffix_str;
          if (!custom.empty()) {
            suffix_str = custom;
          } else if (!col.empty() && col != "Not Set") {
            suffix_str = col;
          } else {
            suffix_str = mac_suffix;
          }

          // Topic prefix: <root>-<column_id or mac_suffix>
          // Default root is "Apollo/temp-pro-1" (UNS convention: {Vendor}/{Station}).
          // Operator can override via web server "MQTT Topic Prefix" to nest under
          // a site path (e.g. "TMMK/Powertrain/Apollo/temp-pro-1") or change case.
          // Empty override = use default. No reboot needed — picks up next wake.
          std::string prefix_root = id(mqtt_topic_prefix_override).state;
          if (prefix_root.empty()) {
            prefix_root = "Apollo/temp-pro-1";
          }

          // MQTT forbids '+' and '#' in PUBLISH topics; whitespace or control
          // characters silently break subscriptions; the suffix must stay a
          // single topic level so '/' is replaced there too. One bad
          // character (a typo like 'J#8' in Custom Column ID) would otherwise
          // make a compliant broker drop the connection on EVERY publish — on
          // battery units that means burned wakes forever. Clean values pass
          // through byte-identical, so deployed topics never change.
          auto sanitize_topic = [](std::string s, bool allow_slash) {
            for (auto &c : s) {
              if (c == '+' || c == '#' || (unsigned char) c <= ' ' ||
                  (unsigned char) c == 0x7F || (!allow_slash && c == '/')) {
                c = '_';
              }
            }
            return s;
          };
          std::string suffix_clean = sanitize_topic(suffix_str, false);
          std::string prefix_clean = sanitize_topic(prefix_root, true);
          if (suffix_clean != suffix_str || prefix_clean != prefix_root) {
            ESP_LOGW("Apollo", "Topic prefix/suffix contained MQTT-illegal characters — sanitized to '%s'-'%s'",
                     prefix_clean.c_str(), suffix_clean.c_str());
          }
          const char* device_suffix = suffix_clean.c_str();
          char prefix[128];
          snprintf(prefix, sizeof(prefix), "%s-%s", prefix_clean.c_str(), device_suffix);

          // Configurable QoS for all publishes below. Clamped to [0, 2].
          uint8_t qos = (uint8_t)std::min(2.0f, std::max(0.0f, id(qos_level).state));

          // Publish wrapper: publish() returns false when the client is
          // disconnected (nothing queues). Count failures so an offline batch
          // is loudly logged instead of the old unconditional success line.
          int pub_total = 0, pub_fail = 0;
          auto PUB = [&](const char *t, const char *p, size_t len, uint8_t q, bool retain) {
            pub_total++;
            if (!id(mqtt_client).publish(t, p, len, q, retain)) pub_fail++;
          };

          // Tombstone the retained values at the PREVIOUS prefix when the
          // column ID / custom ID / prefix override changed. Otherwise the
          // broker keeps a ghost device with plausible, frozen readings at
          // the old prefix forever — the worst kind of silent failure for a
          // SCADA consumer. Runs once per change, only while connected
          // (offline tombstones would be silently dropped and the change
          // marker must not advance until they actually went out).
          if (id(mqtt_client).is_connected()) {
            std::string old_prefix = id(last_published_prefix).state;
            if (old_prefix != std::string(prefix)) {
              if (!old_prefix.empty()) {
                static const char *const TOPIC_SUFFIXES[] = {
                  "sensor/pm_0_3_to_1", "sensor/pm_1_to_2_5", "sensor/pm_2_5_to_4",
                  "sensor/pm_4_to_10", "sensor/pm_total", "sensor/battery_level",
                  "sensor/temperature", "sensor/humidity",
                  "meta/device_id", "meta/device_name", "meta/ip_address",
                  "meta/unit_pm", "meta/unit_battery", "meta/unit_temperature",
                  "meta/unit_humidity", "meta/sleep_mode", "meta/power_source",
                  "meta/wake_reason", "meta/sen55_fail_count", "meta/sht_fail_count",
                  "meta/max17048_fail_count", "meta/lifetime_min_battery_pct",
                  "meta/lifetime_max_battery_pct", "meta/lifetime_min_battery_v",
                  "meta/lifetime_max_battery_v", "meta/config_sleep_duration_min",
                  "meta/config_max_wake_time_s", "meta/config_critical_battery_threshold_pct",
                  "meta/config_critical_battery_sleep_min", "meta/config_warmup_delay_s",
                  "meta/config_publish_interval_s", "meta/firmware_version",
                  "meta/boot_count", "meta/wake_duration_s", "meta/battery_voltage",
                  "meta/free_heap_kb", "meta/deployment_notes", "meta/sen55_serial",
                  "meta/sen55_firmware", "status/sensors_skipped",
                  "status/critical_battery", "status/health", "status/sen55_errors",
                };
                char old_topic[192];
                for (auto *sfx : TOPIC_SUFFIXES) {
                  snprintf(old_topic, sizeof(old_topic), "%s/%s", old_prefix.c_str(), sfx);
                  id(mqtt_client).publish(old_topic, "", 0, 0, true);
                }
                ESP_LOGW("Apollo", "Prefix changed '%s' -> '%s' — tombstoned %d retained topics at the old prefix",
                         old_prefix.c_str(), prefix,
                         (int) (sizeof(TOPIC_SUFFIXES) / sizeof(TOPIC_SUFFIXES[0])));
              }
              auto call = id(last_published_prefix).make_call();
              call.set_value(prefix);
              call.perform();
            }
          }

          // Publish sensor values - topic is the key, payload is the value
          char topic[128];
          char buf[32];
          const char* tags[6] = {
            "pm_0_3_to_1", "pm_1_to_2_5", "pm_2_5_to_4",
            "pm_4_to_10", "pm_total", "battery_level"
          };

          // Mass concentration ranges in ug/m3. Computed unconditionally
          // (std::max with 0 turns NaN into 0 on most implementations, and
          // we only publish/log them when pm_valid below) so the diagnostic
          // summary log later in this lambda can reference them safely.
          float pm_vals[4] = {
            std::max(0.0f, id(pm_1_0).state),
            std::max(0.0f, id(pm_2_5).state - id(pm_1_0).state),
            std::max(0.0f, id(pm_4_0).state - id(pm_2_5).state),
            std::max(0.0f, id(pm_10_0).state - id(pm_4_0).state)
          };
          float total = std::max(0.0f, id(pm_10_0).state);

          // PM block — only publish when all 4 ranges are valid. Skipping
          // here leaves the broker's last retained PM values in place; the
          // /status/sensors_skipped topic advertises the skip so operators
          // know the displayed PM is stale.
          if (pm_valid) {
            for (int i = 0; i < 4; i++) {
              snprintf(topic, sizeof(topic), "%s/sensor/%s", prefix, tags[i]);
              snprintf(buf, sizeof(buf), "%.1f", pm_vals[i]);
              PUB(topic,buf, strlen(buf), qos, true);
            }

            snprintf(topic, sizeof(topic), "%s/sensor/%s", prefix, tags[4]);
            snprintf(buf, sizeof(buf), "%.1f", total);
            PUB(topic,buf, strlen(buf), qos, true);
          }

          // Battery — always publish. -1 sentinel when NaN so subscribers
          // see a fresh failure signal rather than stale retained value.
          int batt = batt_valid ? (int)roundf(std::max(0.0f, id(batt_pct).state)) : -1;
          snprintf(topic, sizeof(topic), "%s/sensor/%s", prefix, tags[5]);
          snprintf(buf, sizeof(buf), "%d", batt);
          PUB(topic,buf, strlen(buf), qos, true);

          // SHT3x temperature (°F) and humidity (%) — always publish, like PM/battery.
          // NaN → -1 sentinel so subscribers can detect a sensor failure.
          float temp_f = std::isnan(id(sht_temperature).state) ? -1.0f : id(sht_temperature).state;
          float rh_pct = std::isnan(id(sht_humidity).state) ? -1.0f : id(sht_humidity).state;

          snprintf(topic, sizeof(topic), "%s/sensor/temperature", prefix);
          snprintf(buf, sizeof(buf), "%.1f", temp_f);
          PUB(topic,buf, strlen(buf), qos, true);

          snprintf(topic, sizeof(topic), "%s/sensor/humidity", prefix);
          snprintf(buf, sizeof(buf), "%.1f", rh_pct);
          PUB(topic,buf, strlen(buf), qos, true);

          // Publish metadata (retained)
          const char* ip = id(device_ip_address).state.c_str();

          snprintf(topic, sizeof(topic), "%s/meta/device_id", prefix);
          PUB(topic,mac, strlen(mac), qos, true);

          snprintf(topic, sizeof(topic), "%s/meta/device_name", prefix);
          PUB(topic,name, strlen(name), qos, true);

          snprintf(topic, sizeof(topic), "%s/meta/ip_address", prefix);
          PUB(topic,ip, strlen(ip), qos, true);

          const char* unit_pm = "ug/m3";
          snprintf(topic, sizeof(topic), "%s/meta/unit_pm", prefix);
          PUB(topic,unit_pm, strlen(unit_pm), qos, true);

          const char* unit_batt = "%";
          snprintf(topic, sizeof(topic), "%s/meta/unit_battery", prefix);
          PUB(topic,unit_batt, strlen(unit_batt), qos, true);

          const char* unit_temp = "F";
          snprintf(topic, sizeof(topic), "%s/meta/unit_temperature", prefix);
          PUB(topic,unit_temp, strlen(unit_temp), qos, true);

          const char* unit_rh = "%";
          snprintf(topic, sizeof(topic), "%s/meta/unit_humidity", prefix);
          PUB(topic,unit_rh, strlen(unit_rh), qos, true);

          // sleep_mode is derived from power_source for backward compatibility
          // with subscribers that watch this topic. battery → "ON" (will sleep),
          // wired → "OFF" (won't sleep). New deployments should subscribe to
          // meta/power_source instead.
          const char* sleep_mode = (id(power_source).current_option() == "wired") ? "OFF" : "ON";
          snprintf(topic, sizeof(topic), "%s/meta/sleep_mode", prefix);
          PUB(topic,sleep_mode, strlen(sleep_mode), qos, true);

          // Power source — "battery" or "wired". The single source of truth
          // for sleep behavior; replaced the old separate prevent_sleep switch.
          std::string power_src = id(power_source).current_option();
          snprintf(topic, sizeof(topic), "%s/meta/power_source", prefix);
          PUB(topic,power_src.c_str(), power_src.length(), qos, true);

          // Sensors-skipped diagnostic — empty string when this wake's
          // publish was complete, or CSV of sensor blocks that were skipped
          // (pm) or sent as -1 sentinels (sht, batt). Operators watching
          // this topic see exactly which sensor is failing on which device
          // without having to compare against last-known-good values.
          snprintf(topic, sizeof(topic), "%s/status/sensors_skipped", prefix);
          PUB(topic,sensors_skipped, strlen(sensors_skipped), qos, true);

          // Critical-battery status — TRIGGERED if pct < threshold this wake.
          const char* crit = id(critical_battery_active) ? "TRIGGERED" : "OK";
          snprintf(topic, sizeof(topic), "%s/status/critical_battery", prefix);
          PUB(topic,crit, strlen(crit), qos, true);

          // Wake reason — what caused this wake (timer/button/cold_boot/other).
          {
            std::string wr = id(wake_reason_str);
            snprintf(topic, sizeof(topic), "%s/meta/wake_reason", prefix);
            PUB(topic,wr.c_str(), wr.length(), qos, true);
          }

          // Per-sensor failure counters (consecutive). Cleared on success.
          char fail_buf[16];
          snprintf(fail_buf, sizeof(fail_buf), "%u", (unsigned)id(sen55_fail_count));
          snprintf(topic, sizeof(topic), "%s/meta/sen55_fail_count", prefix);
          PUB(topic,fail_buf, strlen(fail_buf), qos, true);

          snprintf(fail_buf, sizeof(fail_buf), "%u", (unsigned)id(sht_fail_count));
          snprintf(topic, sizeof(topic), "%s/meta/sht_fail_count", prefix);
          PUB(topic,fail_buf, strlen(fail_buf), qos, true);

          snprintf(fail_buf, sizeof(fail_buf), "%u", (unsigned)id(max17048_fail_count));
          snprintf(topic, sizeof(topic), "%s/meta/max17048_fail_count", prefix);
          PUB(topic,fail_buf, strlen(fail_buf), qos, true);

          // Lifetime battery min/max (publish only when initialized — sentinels
          // mean "never observed yet", in which case we skip the publish).
          if (id(lifetime_min_battery_pct) <= 100.0f) {
            char buf[16];
            snprintf(buf, sizeof(buf), "%.1f", id(lifetime_min_battery_pct));
            snprintf(topic, sizeof(topic), "%s/meta/lifetime_min_battery_pct", prefix);
            PUB(topic,buf, strlen(buf), qos, true);
          }
          if (id(lifetime_max_battery_pct) >= 0.0f) {
            char buf[16];
            snprintf(buf, sizeof(buf), "%.1f", id(lifetime_max_battery_pct));
            snprintf(topic, sizeof(topic), "%s/meta/lifetime_max_battery_pct", prefix);
            PUB(topic,buf, strlen(buf), qos, true);
          }
          if (id(lifetime_min_battery_v) <= 10.0f) {
            char buf[16];
            snprintf(buf, sizeof(buf), "%.3f", id(lifetime_min_battery_v));
            snprintf(topic, sizeof(topic), "%s/meta/lifetime_min_battery_v", prefix);
            PUB(topic,buf, strlen(buf), qos, true);
          }
          if (id(lifetime_max_battery_v) >= 0.0f) {
            char buf[16];
            snprintf(buf, sizeof(buf), "%.3f", id(lifetime_max_battery_v));
            snprintf(topic, sizeof(topic), "%s/meta/lifetime_max_battery_v", prefix);
            PUB(topic,buf, strlen(buf), qos, true);
          }

          // Health rollup — single OK/DEGRADED/CRITICAL field for dashboards.
          // Reflects CURRENT state only — a recovered device returns to OK.
          const char* health = "OK";
          if (id(critical_battery_active) ||
              id(sen55_fail_count) >= 5 || id(sht_fail_count) >= 5 ||
              id(max17048_fail_count) >= 5 || id(boot_loop_force_sleep)) {
            health = "CRITICAL";
          } else if (id(sen55_fail_count) > 0 || id(sht_fail_count) > 0 ||
                     id(max17048_fail_count) > 0 || id(rapid_boot_count) > 0) {
            // Currently failing sensor(s) or recent rapid reboots only.
            // These counters auto-clear on healthy reads / normal wakes.
            health = "DEGRADED";
          }
          snprintf(topic, sizeof(topic), "%s/status/health", prefix);
          PUB(topic,health, strlen(health), qos, true);

          // ---- Configured values (meta/config_*) ----
          // Mirrored to MQTT so operators can audit fleet config without
          // hitting each device's web page.
          char cfg_buf[24];
          snprintf(cfg_buf, sizeof(cfg_buf), "%.0f", id(deep_sleep_sleep_duration).state);
          snprintf(topic, sizeof(topic), "%s/meta/config_sleep_duration_min", prefix);
          PUB(topic,cfg_buf, strlen(cfg_buf), qos, true);

          snprintf(cfg_buf, sizeof(cfg_buf), "%.0f", id(max_wake_time_s).state);
          snprintf(topic, sizeof(topic), "%s/meta/config_max_wake_time_s", prefix);
          PUB(topic,cfg_buf, strlen(cfg_buf), qos, true);

          snprintf(cfg_buf, sizeof(cfg_buf), "%.0f", id(critical_battery_threshold_pct).state);
          snprintf(topic, sizeof(topic), "%s/meta/config_critical_battery_threshold_pct", prefix);
          PUB(topic,cfg_buf, strlen(cfg_buf), qos, true);

          snprintf(cfg_buf, sizeof(cfg_buf), "%.0f", id(critical_battery_sleep_min).state);
          snprintf(topic, sizeof(topic), "%s/meta/config_critical_battery_sleep_min", prefix);
          PUB(topic,cfg_buf, strlen(cfg_buf), qos, true);

          snprintf(cfg_buf, sizeof(cfg_buf), "%.0f", id(warmup_delay_s).state);
          snprintf(topic, sizeof(topic), "%s/meta/config_warmup_delay_s", prefix);
          PUB(topic,cfg_buf, strlen(cfg_buf), qos, true);

          snprintf(cfg_buf, sizeof(cfg_buf), "%.0f", id(prevent_sleep_publish_interval_s).state);
          snprintf(topic, sizeof(topic), "%s/meta/config_publish_interval_s", prefix);
          PUB(topic,cfg_buf, strlen(cfg_buf), qos, true);

          // --- Diagnostic metadata (firmware, counters, health) ---
          const char* fw_ver = "${version}";
          snprintf(topic, sizeof(topic), "%s/meta/firmware_version", prefix);
          PUB(topic,fw_ver, strlen(fw_ver), qos, true);

          char num_buf[24];
          snprintf(num_buf, sizeof(num_buf), "%u", (unsigned)id(boot_count));
          snprintf(topic, sizeof(topic), "%s/meta/boot_count", prefix);
          PUB(topic,num_buf, strlen(num_buf), qos, true);

          float wake_sec = millis() / 1000.0f;
          snprintf(num_buf, sizeof(num_buf), "%.1f", wake_sec);
          snprintf(topic, sizeof(topic), "%s/meta/wake_duration_s", prefix);
          PUB(topic,num_buf, strlen(num_buf), qos, true);

          float batt_v_val = id(batt_v).state;
          if (!std::isnan(batt_v_val)) {
            snprintf(num_buf, sizeof(num_buf), "%.3f", batt_v_val);
            snprintf(topic, sizeof(topic), "%s/meta/battery_voltage", prefix);
            PUB(topic,num_buf, strlen(num_buf), qos, true);
          }

          uint32_t free_heap_kb = esp_get_free_heap_size() / 1024;
          snprintf(num_buf, sizeof(num_buf), "%u", (unsigned)free_heap_kb);
          snprintf(topic, sizeof(topic), "%s/meta/free_heap_kb", prefix);
          PUB(topic,num_buf, strlen(num_buf), qos, true);

          const char* notes = id(deployment_notes).state.c_str();
          snprintf(topic, sizeof(topic), "%s/meta/deployment_notes", prefix);
          PUB(topic,notes, strlen(notes), qos, true);

          // --- SEN55 hardware identification (cached from boot-time I2C read) ---
          const char* sen55_ser = id(sen55_serial).c_str();
          snprintf(topic, sizeof(topic), "%s/meta/sen55_serial", prefix);
          PUB(topic,sen55_ser, strlen(sen55_ser), qos, true);

          const char* sen55_fwver = id(sen55_fw).c_str();
          snprintf(topic, sizeof(topic), "%s/meta/sen55_firmware", prefix);
          PUB(topic,sen55_fwver, strlen(sen55_fwver), qos, true);

          // --- SEN55 device status register (0xD206): 0 = healthy, non-zero = error flags ---
          uint16_t status_words[2];
          uint32_t sen55_status = 0;
          bool status_ok = false;
          if (id(sen55)->get_register((uint16_t)0xD206, status_words, 2, 20)) {
            sen55_status = ((uint32_t)status_words[0] << 16) | status_words[1];
            status_ok = true;
            char status_buf[16];
            snprintf(status_buf, sizeof(status_buf), "0x%08X", (unsigned int)sen55_status);
            snprintf(topic, sizeof(topic), "%s/status/sen55_errors", prefix);
            PUB(topic,status_buf, strlen(status_buf), qos, true);
            if (sen55_status != 0) {
              ESP_LOGW("Apollo", "SEN55 Status non-zero: %s (check fan/laser/gas/PM bits)", status_buf);
            }
          }

          ESP_LOGW("Apollo", "========================================");
          ESP_LOGW("Apollo", "  IP Address:  %s", ip);
          ESP_LOGW("Apollo", "  Device ID:   %s (%s)", mac, mac_suffix);
          ESP_LOGW("Apollo", "  Column ID:   %s", suffix_clean.c_str());
          ESP_LOGW("Apollo", "  Device:      %s", name);
          ESP_LOGW("Apollo", "  Power Src:   %s", id(power_source).current_option().c_str());
          ESP_LOGW("Apollo", "  Firmware:    %s", fw_ver);
          ESP_LOGW("Apollo", "  Boot Count:  %u", (unsigned)id(boot_count));
          ESP_LOGW("Apollo", "  Wake Time:   %.1f s", wake_sec);
          if (!std::isnan(batt_v_val)) {
            ESP_LOGW("Apollo", "  Battery:     %d%% (%.3f V)", batt, batt_v_val);
          } else {
            ESP_LOGW("Apollo", "  Battery:     %d%% (voltage N/A)", batt);
          }
          ESP_LOGW("Apollo", "  Free Heap:   %u KB", (unsigned)free_heap_kb);
          // ESP32 internal die temperature — flags thermal issues during
          // long wake cycles or in hot environments.
          if (!std::isnan(id(esp_internal_temp).state)) {
            ESP_LOGW("Apollo", "  ESP Temp:    %.1f °F", id(esp_internal_temp).state);
          }
          // Lifetime battery min/max — only logged if a real value has been
          // recorded (sentinels mean "never observed").
          if (id(lifetime_min_battery_pct) <= 100.0f && id(lifetime_max_battery_pct) >= 0.0f) {
            ESP_LOGW("Apollo", "  Batt Range:  %.1f%% .. %.1f%% (lifetime)",
                     id(lifetime_min_battery_pct), id(lifetime_max_battery_pct));
          }
          ESP_LOGW("Apollo", "  SEN55:       Serial %s, FW %s", sen55_ser, sen55_fwver);
          if (status_ok) {
            ESP_LOGW("Apollo", "  SEN55 Stat:  0x%08X %s", (unsigned int)sen55_status,
                     sen55_status == 0 ? "(healthy)" : "(non-zero — check errors)");
          }
          if (id(deployment_notes).state.length() > 0) {
            ESP_LOGW("Apollo", "  Notes:       %s", notes);
          }
          ESP_LOGW("Apollo", "  PM 0.3-1: %.1f | 1-2.5: %.1f | 2.5-4: %.1f | 4-10: %.1f | Total: %.1f ug/m3",
                   pm_vals[0], pm_vals[1], pm_vals[2], pm_vals[3], total);
          // Key the failure tag on sht_valid, not on the values: -1.0 °F is a
          // legitimate cold-environment reading, only the NaN check is truth.
          ESP_LOGW("Apollo", "  Temp/RH:     %.1f °F / %.1f %% %s",
                   temp_f, rh_pct,
                   sht_valid ? "" : "[SHT3x failing]");
          ESP_LOGW("Apollo", "  Topics: %s/sensor/...", prefix);
          ESP_LOGW("Apollo", "  Wake Reason: %s", id(wake_reason_str).c_str());
          ESP_LOGW("Apollo", "  Health:      %s", health);
          if (id(critical_battery_active)) {
            ESP_LOGE("Apollo", "  Critical Battery: TRIGGERED — extending sleep to %.0f min",
                     id(critical_battery_sleep_min).state);
          }
          if (id(sen55_fail_count) > 0 || id(sht_fail_count) > 0 || id(max17048_fail_count) > 0) {
            ESP_LOGW("Apollo", "  Sensor Fails: SEN55=%u SHT3x=%u MAX17048=%u (consecutive)",
                     (unsigned)id(sen55_fail_count),
                     (unsigned)id(sht_fail_count),
                     (unsigned)id(max17048_fail_count));
          }
          ESP_LOGW("Apollo", "========================================");
          if (pub_fail > 0) {
            ESP_LOGE("Apollo", "%d of %d MQTT publishes DROPPED (client disconnected?)",
                     pub_fail, pub_total);
          } else {
            ESP_LOGI("Apollo", "All %d MQTT publishes accepted by the client", pub_total);
          }

  # Read SEN55 serial number and firmware version via raw I2C.
  # Called once at boot — results cached in globals for use in MQTT metadata + logs.
  - id: read_sen55_info
    then:
      - lambda: |-
          // Read serial number (command 0xD033, returns 16 words = 32 chars)
          uint16_t serial_words[16];
          if (id(sen55)->get_register((uint16_t)0xD033, serial_words, 16, 20)) {
            char serial[33];
            for (int i = 0; i < 16; i++) {
              serial[i*2]   = (serial_words[i] >> 8) & 0xFF;
              serial[i*2+1] = serial_words[i] & 0xFF;
            }
            serial[32] = '\0';
            // Trim trailing null/space padding
            for (int i = 31; i >= 0; i--) {
              if (serial[i] == '\0' || serial[i] == ' ') serial[i] = '\0';
              else break;
            }
            id(sen55_serial) = std::string(serial);
          } else {
            ESP_LOGW("Apollo", "SEN55: failed to read serial number");
          }

          // Read firmware version (command 0xD100, 1 word: major.minor)
          uint16_t fw_word;
          if (id(sen55)->get_register((uint16_t)0xD100, fw_word, 20)) {
            uint8_t fw_major = (fw_word >> 8) & 0xFF;
            uint8_t fw_minor = fw_word & 0xFF;
            char fw_buf[8];
            snprintf(fw_buf, sizeof(fw_buf), "%u.%u", fw_major, fw_minor);
            id(sen55_fw) = std::string(fw_buf);
          } else {
            ESP_LOGW("Apollo", "SEN55: failed to read firmware version");
          }

          ESP_LOGW("Apollo", "SEN55 Serial: %s | Firmware: %s",
                   id(sen55_serial).c_str(), id(sen55_fw).c_str());

  # ---------------------------------------------------------------------
  # Capture wake reason via ESP-IDF API. Called from on_boot at high priority
  # before anything else, so the value is available throughout the wake cycle.
  # ---------------------------------------------------------------------
  - id: capture_wake_reason
    then:
      - lambda: |-
          esp_sleep_wakeup_cause_t cause = esp_sleep_get_wakeup_cause();
          switch (cause) {
            case ESP_SLEEP_WAKEUP_TIMER:
              id(wake_reason_str) = "timer"; break;
            case ESP_SLEEP_WAKEUP_GPIO:
            case ESP_SLEEP_WAKEUP_EXT0:
            case ESP_SLEEP_WAKEUP_EXT1:
              id(wake_reason_str) = "button"; break;
            case ESP_SLEEP_WAKEUP_UNDEFINED:
              id(wake_reason_str) = "cold_boot"; break;
            default: {
              char buf[16];
              snprintf(buf, sizeof(buf), "other_%d", (int)cause);
              id(wake_reason_str) = buf;
              break;
            }
          }
          ESP_LOGW("Apollo", "Wake reason: %s", id(wake_reason_str).c_str());

  # ---------------------------------------------------------------------
  # Boot-loop detector. Runs at high-priority on_boot, after capture_wake_reason.
  # A "cold boot" wake reason means the device did NOT come out of normal deep
  # sleep — it hard-reset or crashed before reaching deep_sleep.enter. Three
  # cold boots in a row indicates a boot loop; force a 30-min cooldown so the
  # underlying issue (transient I2C bus, panic during init, etc) has a chance
  # to clear before another retry.
  #
  # Counter is cleared on any normal timer/button wake — a single successful
  # cycle resets the safety. Timer/button wakes ARE "OK" — they prove the
  # device made it to deep sleep last cycle.
  # ---------------------------------------------------------------------
  - id: check_boot_loop
    then:
      - lambda: |-
          if (id(wake_reason_str) == "cold_boot") {
            // Commanded software restarts (OTA completion, ESP Reboot button,
            // command/restart, safe-mode exit) are ESP_RST_SW. They are not
            // crashes: an OTA push plus a verify reboot plus a config reboot
            // within minutes must not trip the 30-min cooldown. The published
            // meta/wake_reason payload stays "cold_boot" — only the internal
            // loop counter treats SW resets as benign. Genuine crash loops
            // (PANIC, watchdog, brownout, power-on) still count.
            if (esp_reset_reason() == ESP_RST_SW) {
              ESP_LOGI("Apollo", "Software-commanded restart — not counted toward boot-loop detection");
            } else {
              id(rapid_boot_count) += 1;
              ESP_LOGW("Apollo", "Cold-boot detected (consecutive: %u)", (unsigned)id(rapid_boot_count));
            }
          } else {
            if (id(rapid_boot_count) > 0) {
              ESP_LOGI("Apollo", "Normal wake (%s) — clearing cold-boot count (was %u)",
                       id(wake_reason_str).c_str(), (unsigned)id(rapid_boot_count));
            }
            id(rapid_boot_count) = 0;
          }

          if (id(rapid_boot_count) >= 3) {
            // Cooldown only applies to battery devices — wired mode calls
            // prevent_deep_sleep() so the cooldown sleep can't take effect.
            // We deliberately do NOT flip wired devices to battery mode:
            // power_source only changes when an operator changes it. A wired
            // boot-looping device stays awake/visible and is flagged via the
            // DEGRADED/CRITICAL health rollup instead.
            if (id(power_source).current_option() == "battery") {
              ESP_LOGE("Apollo", "BOOT LOOP detected (%u consecutive cold boots) — forcing 30-min cooldown",
                       (unsigned)id(rapid_boot_count));
              id(deep_sleep_1).set_sleep_duration(30ULL * 60ULL * 1000ULL);
              id(boot_loop_force_sleep) = true;
            } else {
              ESP_LOGE("Apollo", "BOOT LOOP detected (%u consecutive cold boots) on wired device — staying awake in wired mode",
                       (unsigned)id(rapid_boot_count));
            }
          }

  # ---------------------------------------------------------------------
  # Shared handler for the power_source command topics (all three flavors,
  # called from the device YAMLs' mqtt: on_message blocks).
  #
  # Stale-retained-message guard: the broker re-delivers RETAINED command
  # payloads on every (re)subscribe. Before this guard, a months-old
  # retained "battery"/"OFF" sat on a command topic and flipped wired
  # devices into battery mode the moment they (re)connected — they'd then
  # vanish into deep sleep. Any "battery" arriving within 60s of MQTT
  # connect is therefore rejected AND the retained message is cleared at
  # the broker (retained-empty publish) so it can't bite again.
  #
  # "wired" is always accepted immediately — it never harms a device.
  # To intentionally switch devices to battery via MQTT: publish
  # NON-retained; devices connected longer than 60s apply it normally.
  # ---------------------------------------------------------------------
  - id: apply_power_mode_command
    parameters:
      payload: string
      cmd_topic: string
    then:
      - lambda: |-
          std::string mode;
          if (payload == "wired" || payload == "ON" || payload == "on" ||
              payload == "1" || payload == "true") {
            mode = "wired";
          } else if (payload == "battery" || payload == "OFF" || payload == "off" ||
                     payload == "0" || payload == "false") {
            mode = "battery";
          } else {
            ESP_LOGW("Apollo", "Unknown power-mode payload on %s: '%s'",
                     cmd_topic.c_str(), payload.c_str());
            return;
          }

          if (mode == "battery") {
            uint32_t since_ms = millis() - id(mqtt_connected_at_ms);
            if (id(mqtt_connected_at_ms) == 0 || since_ms < 60000) {
              ESP_LOGE("Apollo", "REJECTED 'battery' on %s %.1fs after MQTT connect — stale retained message replayed by broker. Clearing the retained value. If intentional, resend NON-retained once the device has been connected >60s.",
                       cmd_topic.c_str(), since_ms / 1000.0f);
              id(mqtt_client).publish(cmd_topic, "", 0, 0, true);
              return;
            }
          }

          if (id(power_source).current_option() != mode) {
            ESP_LOGW("Apollo", "Power mode set to '%s' via %s",
                     mode.c_str(), cmd_topic.c_str());
            auto call = id(power_source).make_call();
            call.set_option(mode);
            call.perform();
          }

  # ---------------------------------------------------------------------
  # Critical-battery handler. Sets the status flag on every device, but only
  # battery-mode devices get their next sleep extended. Wired devices are
  # NEVER auto-switched to battery mode — a false fuel-gauge reading on a
  # wired device must not make it disappear into deep sleep. Operators see
  # the CRITICAL health rollup + status/critical_battery topic instead.
  # ---------------------------------------------------------------------
  - id: check_critical_battery
    then:
      - lambda: |-
          id(critical_battery_active) = false;
          if (id(critical_battery_threshold_pct).state <= 0.0f) return;
          float pct = id(batt_pct).state;
          if (std::isnan(pct)) return;

          if (pct < id(critical_battery_threshold_pct).state) {
            id(critical_battery_active) = true;
            if (id(power_source).current_option() == "battery") {
              // Extend next sleep so each wake costs less while charge is critical.
              uint64_t crit_sleep_ms = (uint64_t)(id(critical_battery_sleep_min).state) * 60ULL * 1000ULL;
              id(deep_sleep_1).set_sleep_duration(crit_sleep_ms);
              ESP_LOGE("Apollo", "CRITICAL BATTERY: %.1f%% < %.1f%% — extending sleep to %.0f min",
                       pct, id(critical_battery_threshold_pct).state, id(critical_battery_sleep_min).state);
            } else {
              ESP_LOGE("Apollo", "CRITICAL BATTERY reading (%.1f%%) on wired device — staying in wired mode (flag published)",
                       pct);
            }
          }

  # ---------------------------------------------------------------------
  # Sensor health tracker. Called from on_connect right after the wait_until
  # block. Increments per-sensor failure counters when the corresponding
  # reading is NaN; clears them on successful read. Also updates lifetime
  # battery min/max for cell-aging diagnostics.
  # ---------------------------------------------------------------------
  - id: track_sensor_health
    then:
      - lambda: |-
          // SEN55 (PM mass) — any NaN counts as a failure for this sensor.
          if (std::isnan(id(pm_1_0).state) || std::isnan(id(pm_2_5).state) ||
              std::isnan(id(pm_4_0).state) || std::isnan(id(pm_10_0).state)) {
            id(sen55_fail_count) += 1;
            ESP_LOGW("Apollo", "SEN55 read failure (consecutive: %u)", (unsigned)id(sen55_fail_count));
          } else {
            id(sen55_fail_count) = 0;
          }

          // SHT3x temp/RH
          if (std::isnan(id(sht_temperature).state) || std::isnan(id(sht_humidity).state)) {
            id(sht_fail_count) += 1;
            ESP_LOGW("Apollo", "SHT3x read failure (consecutive: %u)", (unsigned)id(sht_fail_count));
          } else {
            id(sht_fail_count) = 0;
          }

          // MAX17048 battery
          if (std::isnan(id(batt_pct).state)) {
            id(max17048_fail_count) += 1;
            ESP_LOGW("Apollo", "MAX17048 read failure (consecutive: %u)", (unsigned)id(max17048_fail_count));
          } else {
            id(max17048_fail_count) = 0;

            // Update lifetime battery min/max while we have a valid reading.
            float pct = id(batt_pct).state;
            if (pct < id(lifetime_min_battery_pct)) id(lifetime_min_battery_pct) = pct;
            if (pct > id(lifetime_max_battery_pct)) id(lifetime_max_battery_pct) = pct;

            float v = id(batt_v).state;
            if (!std::isnan(v)) {
              if (v < id(lifetime_min_battery_v)) id(lifetime_min_battery_v) = v;
              if (v > id(lifetime_max_battery_v)) id(lifetime_max_battery_v) = v;
            }
          }

          // If we got here with all sensors reporting cleanly, the device is
          // healthy regardless of how this wake started. Clear the boot-loop
          // counter — a healthy successful read is a stronger signal than the
          // "did we wake from timer or cold boot" heuristic, and it lets user
          // initiated resets during testing not accumulate on wired devices
          // that never get a "normal" timer wake to clear the counter.
          if (id(rapid_boot_count) > 0 &&
              id(sen55_fail_count) == 0 &&
              id(sht_fail_count) == 0 &&
              id(max17048_fail_count) == 0) {
            ESP_LOGI("Apollo", "All sensors healthy this wake — clearing rapid_boot_count (was %u)",
                     (unsigned)id(rapid_boot_count));
            id(rapid_boot_count) = 0;
          }

  # Minimal publish for the boot-loop cooldown path. on_connect skips
  # publish_mqtt_data entirely on a cooldown wake, which previously made the
  # fleet's sickest device the only SILENT one — operators saw stale
  # healthy-looking retained values for 30+ minutes. Publishes exactly two
  # topics (health=CRITICAL and the wake reason), retained at QoS 1. Two
  # messages cost far less than the 20-publish scrub that broke the wake
  # budget in the 2026-05-14 incident. Prefix logic mirrors publish_mqtt_data.
  - id: publish_boot_loop_alert
    then:
      - lambda: |-
          std::string mac_str = esphome::get_mac_address();
          char mac_suffix[7];
          for (int i = 0; i < 6; i++) {
            char c = mac_str.length() >= 6 ? mac_str[mac_str.length() - 6 + i] : '0';
            mac_suffix[i] = (c >= 'A' && c <= 'Z') ? (c + 32) : c;
          }
          mac_suffix[6] = '\0';
          std::string custom = id(custom_column_id).state;
          std::string col = id(column_id).current_option();
          std::string suffix = !custom.empty() ? custom
                             : (!col.empty() && col != "Not Set") ? col
                             : std::string(mac_suffix);
          std::string root = id(mqtt_topic_prefix_override).state;
          if (root.empty()) root = "Apollo/temp-pro-1";
          auto sanitize = [](std::string s, bool allow_slash) {
            for (auto &c : s) {
              if (c == '+' || c == '#' || (unsigned char) c <= ' ' ||
                  (unsigned char) c == 0x7F || (!allow_slash && c == '/')) c = '_';
            }
            return s;
          };
          suffix = sanitize(suffix, false);
          root = sanitize(root, true);
          char topic[128];
          snprintf(topic, sizeof(topic), "%s-%s/status/health", root.c_str(), suffix.c_str());
          id(mqtt_client).publish(topic, "CRITICAL", 8, 1, true);
          snprintf(topic, sizeof(topic), "%s-%s/meta/wake_reason", root.c_str(), suffix.c_str());
          std::string wr = id(wake_reason_str);
          id(mqtt_client).publish(topic, wr.c_str(), wr.length(), 1, true);
          ESP_LOGE("Apollo", "Boot-loop alert published (health=CRITICAL, wake_reason=%s)", wr.c_str());

  # Consolidated sleep entry — all sleep paths call this script.
  # NOTE: accessory_power off + GPIO7 hold live in on_shutdown (device file),
  # NOT here. Cutting power to the W5500 before ethernet has cleanly torn down
  # causes an intermittent hang that triggers the task watchdog. Letting ESPHome
  # shut ethernet down first (while W5500 still has power) avoids that race.
  - id: prepare_and_sleep
    then:
      - lambda: |-
          ESP_LOGW("Apollo", "Preparing for deep sleep (awake for %.1f s)...", millis() / 1000.0f);
          // Re-assert safety sleep extensions at the last possible moment.
          // check_critical_battery / check_boot_loop set the duration directly
          // on the deep_sleep component, but a later sleep_duration write (web
          // UI, or a retained command replayed AFTER on_boot) also writes it
          // and would silently revert the extension. Last writer must be the
          // safety logic.
          if (id(boot_loop_force_sleep)) {
            id(deep_sleep_1).set_sleep_duration(30ULL * 60ULL * 1000ULL);
            ESP_LOGW("Apollo", "Boot-loop cooldown re-asserted: 30 min sleep");
          } else if (id(critical_battery_active) &&
                     id(power_source).current_option() == "battery") {
            id(deep_sleep_1).set_sleep_duration(
                (uint64_t) id(critical_battery_sleep_min).state * 60ULL * 1000ULL);
            ESP_LOGW("Apollo", "Critical-battery sleep re-asserted: %.0f min",
                     id(critical_battery_sleep_min).state);
          }
          // Stop SEN55 measurement before teardown
          id(sen55)->write_command((uint16_t)0x0104);
      # Final 1 sec window for ESPHome's MQTT on_shutdown callbacks to run.
      # ESPHome should send MQTT DISCONNECT and flush remaining TCP frames
      # before deep_sleep.enter — but it has to happen before the W5500 PHY
      # gets powered down by the priority-300 on_shutdown handler. This extra
      # delay ensures the component shutdown sequence has time to complete.
      - delay: 1s
      - light.turn_off: rgb_light
      - rtttl.stop:
          id: rtttl_buzzer
      - deep_sleep.enter:
          id: deep_sleep_1

# Maintenance buttons shared by both variants (previously ETH-only; the WiFi
# units have the same SEN55, buzzer, and LED hardware). Names are identical
# to the old ETH definitions, so fielded ETH units keep their entity IDs.
button:
  # Maintenance: trigger SEN55 forced fan cleaning (~10s of fan boost to clear dust).
  # Recommended monthly/yearly depending on environment. Safe to run anytime.
  - platform: template
    name: "Clean SEN55 Fan"
    id: button_clean_sen55
    web_server:
      sorting_group_id: sg_maintenance
      sorting_weight: 63
    icon: mdi:fan-clock
    entity_category: "diagnostic"
    on_press:
      - lambda: |-
          ESP_LOGW("Apollo", "SEN55 fan cleaning triggered via web UI (~10s boost)");
          id(sen55)->write_command((uint16_t)0x5607);

  # Buzzer test — plays a short success melody to verify hardware works during install.
  - platform: template
    name: "Test Buzzer"
    id: button_test_buzzer
    web_server:
      sorting_group_id: sg_maintenance
      sorting_weight: 66
    icon: mdi:volume-high
    entity_category: "diagnostic"
    on_press:
      - if:
          condition:
            switch.is_on: buzzer_enabled
          then:
            - lambda: 'ESP_LOGW("Apollo", "Buzzer test triggered via web UI");'
            - rtttl.play:
                rtttl: "success:d=4,o=5,b=100:c,e,g"
          else:
            - lambda: 'ESP_LOGW("Apollo", "Buzzer test ignored — Buzzer Enabled is OFF");'

  # Stop any currently playing buzzer tone.
  - platform: template
    name: "Stop Buzzer"
    id: button_stop_buzzer
    web_server:
      sorting_group_id: sg_maintenance
      sorting_weight: 67
    icon: mdi:volume-off
    entity_category: "diagnostic"
    on_press:
      - rtttl.stop:
          id: rtttl_buzzer

  # Recover a wedged SEN55 without rebooting the device.
  # Sends stop + start measurement I2C commands.
  - platform: template
    name: "Restart SEN55"
    id: button_restart_sen55
    web_server:
      sorting_group_id: sg_maintenance
      sorting_weight: 69
    icon: mdi:restart
    entity_category: "diagnostic"
    on_press:
      - lambda: |-
          ESP_LOGW("Apollo", "Restarting SEN55 measurement");
          if (!id(sen55)->write_command((uint16_t) 0x0104)) {  // stop
            ESP_LOGW("Apollo", "SEN55 stop command NACKed — continuing to start");
          }
      # SEN5x datasheet: Stop Measurement needs 200 ms execution time before
      # the next command is accepted. The old 50 ms left the sensor STOPPED
      # on a NACK (dead PM readings until reboot) — the opposite of what a
      # recovery button should do.
      - delay: 250ms
      - lambda: |-
          if (!id(sen55)->write_command((uint16_t) 0x0021)) {  // start
            ESP_LOGE("Apollo", "SEN55 start command NACKed — retrying once");
            delay(250);
            if (!id(sen55)->write_command((uint16_t) 0x0021)) {
              ESP_LOGE("Apollo", "SEN55 restart FAILED — sensor left stopped; reboot the device to recover");
              return;
            }
          }
          ESP_LOGW("Apollo", "SEN55 restart complete");

  # Cycle R/G/B on the LED strip to verify hardware during install.
  - platform: template
    name: "Test LED"
    id: button_test_led
    web_server:
      sorting_group_id: sg_maintenance
      sorting_weight: 71
    icon: mdi:led-variant-outline
    entity_category: "diagnostic"
    on_press:
      - lambda: 'ESP_LOGW("Apollo", "LED test triggered via web UI");'
      - light.turn_on:
          id: rgb_light
          brightness: 25%
          red: 100%
          green: 0%
          blue: 0%
      - delay: 1s
      - light.turn_on:
          id: rgb_light
          brightness: 25%
          red: 0%
          green: 100%
          blue: 0%
      - delay: 1s
      - light.turn_on:
          id: rgb_light
          brightness: 25%
          red: 0%
          green: 0%
          blue: 100%
      - delay: 1s
      - light.turn_off: rgb_light

select:
  # The single source of truth for sleep behavior. Replaces the old separate
  # `prevent_sleep` switch — they were doing the same job under two names.
  #
  #   battery → device sleeps. Wakes on schedule (sleep_duration), connects,
  #             publishes, sleeps again. If MQTT/sensors take too long, the
  #             safety-net interval forces sleep at max_wake_time_s.
  #   wired   → device never sleeps. Calls prevent_deep_sleep() so the
  #             deep_sleep component stays inactive. Use this for USB/PoE
  #             units, or temporarily for live diagnostics on a battery unit.
  #
  # Toggle via web UI, MQTT, or the 3x boot-button press.
  - platform: template
    name: "Power Source"
    id: power_source
    web_server:
      sorting_group_id: sg_power
      sorting_weight: 31
    icon: mdi:power-plug
    entity_category: "config"
    optimistic: true
    restore_value: true
    initial_option: "battery"
    options:
      - "battery"
      - "wired"
    on_value:
      - lambda: |-
          if (x == "wired") {
            id(deep_sleep_1).prevent_deep_sleep();
            ESP_LOGW("Apollo", "Power source = WIRED — deep sleep prevented, device will stay awake");
          } else {
            id(deep_sleep_1).allow_deep_sleep();
            ESP_LOGW("Apollo", "Power source = BATTERY — deep sleep enabled, will sleep within max_wake_time_s");
          }

