text:
  - platform: template
    name: "Custom Column ID"
    id: custom_column_id
    web_server:
      sorting_group_id: sg_identity
      sorting_weight: 52
    icon: mdi:form-textbox
    entity_category: "config"
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 16
    mode: text

  # MQTT broker override — empty means use compile-time !secret value.
  # Takes effect on next reboot. WARNING: stored in NVS as plaintext.
  - platform: template
    name: "MQTT Broker"
    id: mqtt_broker_override
    web_server:
      sorting_group_id: sg_network
      sorting_weight: 41
    icon: mdi:server-network
    entity_category: "config"
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 64
    mode: text

  # MQTT topic prefix override. Empty = default "Apollo/temp-pro-1" (current
  # production tree). Set to e.g. "TMMK/Powertrain/Apollo/temp-pro-1" to nest
  # the device tree under a site prefix, or "apollo/temp-pro-1" for lowercase.
  # The device suffix (column_id or MAC) is appended with a "-" separator:
  #   <prefix>-<suffix>/sensor/...   /meta/...   /status/...
  # Takes effect immediately on next publish — no reboot needed.
  # NOTE: changing this orphans any retained values at the old prefix. Operator
  # should clear those from the broker manually if needed.
  - platform: template
    name: "MQTT Topic Prefix"
    id: mqtt_topic_prefix_override
    web_server:
      sorting_group_id: sg_network
      sorting_weight: 45
    icon: mdi:tag-text
    entity_category: "config"
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 64
    mode: text

  - platform: template
    name: "MQTT Username"
    id: mqtt_username_override
    web_server:
      sorting_group_id: sg_network
      sorting_weight: 43
    icon: mdi:account
    entity_category: "config"
    optimistic: true
