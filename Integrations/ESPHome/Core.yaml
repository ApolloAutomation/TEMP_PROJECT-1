substitutions:
  version: "26.1.21.1"
  device_description: TEMP_PRO-1 made by Apollo Automation - version ${version}.

esphome:
  name: temp-pro-1
  on_boot:
    - priority: -100
      then:
        - delay: 2s
        - lambda: |-
            id(deep_sleep_1).set_sleep_duration(id(deep_sleep_sleep_duration).state * 60 * 60 * 1000);
        - if:
            condition:
              or:
                - binary_sensor.is_on: ota_mode
                - switch.is_on: prevent_sleep
            then:
              - lambda: |-
                  ESP_LOGW("Apollo", "Preventing Deep Sleep Due To OTA Or Switch On Boot");
                  id(deep_sleep_1).prevent_deep_sleep();
        - lambda: |-
            // Force initial updates on boot
            id(sht_temperature).publish_state(id(sht_temperature_raw).state);
            id(sht_humidity).publish_state(id(sht_humidity_raw).state);
            id(last_temp_update) = millis();
            id(last_humidity_update) = millis();

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf

# EXPERIMENTAL: Include custom component for SEN5x particle number concentration
external_components:
  - source:
      type: local
      path: local_components
  - source: github://ApolloAutomation/esphome-battery-component
    components: [max17048]

api:
  services:
    - service: play_buzzer
      variables:
        song_str: string
      then:
        - rtttl.play:
            rtttl: !lambda 'return song_str;'
  reboot_timeout: 0s
  on_client_connected:
    then:
      - if:
          condition:
            or:
              - binary_sensor.is_on: ota_mode
              - switch.is_on: prevent_sleep
          then:
            - lambda: |-
                ESP_LOGW("Apollo", "Preventing Deep Sleep Due To OTA Or Switch");
          else:
            - switch.turn_on: accessory_power
            - delay: 5s
            - lambda: |-
                id(reportAllValues).execute();
            - delay: 5s
            - lambda: |-
                // Check alarm conditions directly
                id(alarm_triggered_on_wake) = false;

                // Check temperature alarm (only if value is valid)
                if (id(alarm_outside_temp_range).state &&
                    !std::isnan(id(sht_temperature).state) &&
                    (id(sht_temperature).state > id(max_temp).state || id(sht_temperature).state < id(min_temp).state)) {
                  id(alarm_triggered_on_wake) = true;
                  ESP_LOGW("Apollo", "Temperature alarm triggered");
                }

                // Check humidity alarm (only if value is valid)
                if (id(alarm_outside_humidity_range).state &&
                    !std::isnan(id(sht_humidity).state) &&
                    (id(sht_humidity).state > id(max_humidity).state || id(sht_humidity).state < id(min_humidity).state)) {
                  id(alarm_triggered_on_wake) = true;
                  ESP_LOGW("Apollo", "Humidity alarm triggered");
                }

                // Check PM mass alarm (only if value is valid)
                if (id(alarm_outside_total_pm_range).state &&
                    !std::isnan(id(pm_10_0).state) &&
                    id(pm_10_0).state >= id(max_total_pm).state) {
                  id(alarm_triggered_on_wake) = true;
                  ESP_LOGW("Apollo", "PM mass alarm triggered");
                }

                // Check PM count alarm (only if value is valid)
                if (id(alarm_outside_total_pm_count_range).state &&
                    !std::isnan(id(total_pm_count).state) &&
                    id(total_pm_count).state >= id(max_total_pm_count).state) {
                  id(alarm_triggered_on_wake) = true;
                  ESP_LOGW("Apollo", "PM count alarm triggered: %.0f >= %.0f", id(total_pm_count).state, id(max_total_pm_count).state);
                }

                if (id(alarm_triggered_on_wake)) {
                  ESP_LOGW("Apollo", "Alarm Active - Staying Awake");
                  id(deep_sleep_1).prevent_deep_sleep();
                  // Trigger alarm sound and light
                  id(rgb_light).turn_on().set_effect("Fast Pulse").perform();
                  id(rgb_light).turn_on().set_rgb(1, 0, 0).set_transition_length(0).perform();
                  id(rtttl_buzzer).play("siren:d=8,o=5,b=100:d,e,d,e,d,e,d,e;");
                }
            - if:
                condition:
                  and:
                    - lambda: 'return !id(alarm_triggered_on_wake);'
                    - switch.is_off: prevent_sleep
                    - binary_sensor.is_off: ota_mode
                then:
                  - deep_sleep.enter:
                      id: deep_sleep_1

globals:
  - id: cycleCounter
    type: int
    restore_value: no
    initial_value: '0'
  - id: button_press_timestamp
    restore_value: no
    type: uint32_t
    initial_value: '0'
  - id: alarm_triggered_on_wake
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: last_temp_update
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: last_humidity_update
    type: uint32_t
    restore_value: no
    initial_value: '0'

i2c:
  sda: GPIO16
  scl: GPIO17
  id: bus_a

web_server:
  port: 80

deep_sleep:
  id: deep_sleep_1
  sleep_duration: 1h
  run_duration: 90s

one_wire:
  - platform: gpio
    pin: GPIO6

uart:
  - id: uart_ld2412
    tx_pin: GPIO39
    rx_pin: GPIO40
    baud_rate: 115200
    parity: NONE
    stop_bits: 1

ld2412:
  id: ld2412_radar
  uart_id: uart_ld2412

# Buzzer
output:
  - platform: ledc
    pin: GPIO8
    id: buzzer

rtttl:
  id: rtttl_buzzer
  output: buzzer

binary_sensor:
  - platform: status
    name: Online
    id: ink_ha_connected
    disabled_by_default: true
  - platform: gpio
    pin:
      number: GPIO0
      inverted: true
      ignore_strapping_warning: true
      mode:
        input: true
        pullup: true
    id: reset_button
    on_press:
      then:
        - lambda: |-
            id(button_press_timestamp) = millis();    
    on_release:
      then:
        - lambda: |-
            if (millis() - id(button_press_timestamp) >= 10000) {
              // Remove Wifi
              id(factory_reset_switch).turn_on();
            }
            else {
              // StatusCheck
              id(statusCheck).execute();
            }

  - platform: ld2412
    dynamic_background_correction_status:
      name: "LD2412 Dynamic Background Correction Status"
      id: ld2412_dynamic_background_correction_status
      disabled_by_default: true
    has_target:
      name: "LD2412 Presence"
      id: ld2412_presence
    has_moving_target:
      name: "LD2412 Moving Target"
      id: ld2412_moving_target
    has_still_target:
      name: "LD2412 Still Target"
      id: ld2412_still_target

  - platform: template
    name: Alarm Temperature Within Range
    id: temp_within_range
    disabled_by_default: true
    lambda: 'return std::isnan(id(sht_temperature).state) || ((id(sht_temperature).state <= id(max_temp).state) && (id(sht_temperature).state >= id(min_temp).state));'

  - platform: template
    name: Alarm Humidity Within Range
    id: humidity_within_range
    disabled_by_default: true
    lambda: 'return std::isnan(id(sht_humidity).state) || ((id(sht_humidity).state <= id(max_humidity).state) && (id(sht_humidity).state >= id(min_humidity).state));'

  - platform: template
    name: Alarm Total PM Within Range
    id: total_pm_within_range
    disabled_by_default: true
    lambda: 'return std::isnan(id(pm_10_0).state) || (id(pm_10_0).state < id(max_total_pm).state);'

  - platform: template
    name: Alarm Total PM Count Within Range
    id: total_pm_count_within_range
    disabled_by_default: true
    lambda: 'return std::isnan(id(total_pm_count).state) || (id(total_pm_count).state < id(max_total_pm_count).state);'

  - platform: template
    name: Alarm Active
    id: alarm_active
    disabled_by_default: true
    lambda: 'return (id(alarm_outside_temp_range).state && !id(temp_within_range).state) || (id(alarm_outside_humidity_range).state && !id(humidity_within_range).state) || (id(alarm_outside_total_pm_range).state && !id(total_pm_within_range).state) || (id(alarm_outside_total_pm_count_range).state && !id(total_pm_count_within_range).state);'
    on_release:
      then:
        - light.turn_off: rgb_light
        - if:
            condition:
              and:
                - switch.is_off: prevent_sleep
                - binary_sensor.is_off: ota_mode
            then:
              - lambda: |-
                  ESP_LOGW("Apollo", "Alarm cleared - going back to sleep");
                  id(deep_sleep_1).allow_deep_sleep();
              - delay: 2s
              - deep_sleep.enter:
                  id: deep_sleep_1

  - platform: homeassistant
    name: "OTA Mode"
    id: ota_mode
    entity_id: input_boolean.apollo_ota_mode
    disabled_by_default: true
    on_press:
      then:
        - lambda: |-
            id(deep_sleep_1).prevent_deep_sleep();
    on_release:
      then:
        - if:
            condition:
              switch.is_off: prevent_sleep
            then:
              - lambda: |-
                  id(deep_sleep_1).allow_deep_sleep();

sensor:
  - platform: internal_temperature
    name: "ESP Temperature"
    id: sys_esp_temperature
    disabled_by_default: true

  - platform: uptime
    name: Uptime
    id: sys_uptime
    update_interval: 60s
    disabled_by_default: true

  - platform: sht3xd
    id: sht3xd_sensor
    temperature:
      name: "Temperature Raw"
      id: sht_temperature_raw
      internal: true
    humidity:
      name: "Relative Humidity Raw"
      id: sht_humidity_raw
      internal: true
    update_interval: 10s

  # Template sensors with configurable intervals
  - platform: template
    name: "Temperature"
    id: sht_temperature
    lambda: 'return id(sht_temperature_raw).state;'
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    update_interval: never
    disabled_by_default: true

  - platform: template
    name: "Relative Humidity"
    id: sht_humidity
    lambda: 'return id(sht_humidity_raw).state;'
    unit_of_measurement: "%"
    device_class: humidity
    state_class: measurement
    accuracy_decimals: 1
    update_interval: never
    disabled_by_default: true

  - platform: sen5x
    id: sen55
    pm_1_0:
      name: "PM <1µm Weight concentration"
      id: pm_1_0
      disabled_by_default: true
      accuracy_decimals: 1
      filters:
        - sliding_window_moving_average:
            window_size: 9
            send_every: 1
    pm_2_5:
      name: "PM <2.5µm Weight concentration"
      id: pm_2_5
      disabled_by_default: true
      accuracy_decimals: 1
      filters:
        - sliding_window_moving_average:
            window_size: 9
            send_every: 1
    pm_4_0:
      name: "PM <4µm Weight concentration"
      id: pm_4_0
      disabled_by_default: true
      accuracy_decimals: 1
    pm_10_0:
      name: "PM <10µm Weight concentration"
      id: pm_10_0
      accuracy_decimals: 1
    nox:
      name: "NOX Index"
      id: sen_nox
      disabled_by_default: true
      accuracy_decimals: 1
    voc:
      name: "VOC Index"
      id: sen_voc
      disabled_by_default: true
      algorithm_tuning:
        index_offset: 100
        learning_time_offset_hours: 12
        learning_time_gain_hours: 12
        gating_max_duration_minutes: 180
        std_initial: 50
        gain_factor: 230
      filters:
        - sliding_window_moving_average:
            window_size: 9
            send_every: 1
    temperature_compensation:
      offset: 0
      normalized_offset_slope: 0
      time_constant: 0
    store_baseline: true
    update_interval: 10s

  - platform: template
    name: "PM 0.3 To 1 µm"
    id: pm0_3_to_1
    disabled_by_default: true
    lambda: return id(pm_1_0).state;
    unit_of_measurement: "µg/m³"
    state_class: measurement
    icon: mdi:air-filter
    update_interval: 10s
    
  - platform: template
    name: "PM 1 To 2.5 µm"
    id: pm1_to_2_5
    disabled_by_default: true
    lambda: return std::max(0.0f, id(pm_2_5).state - id(pm_1_0).state);
    unit_of_measurement: "µg/m³"
    state_class: measurement
    icon: mdi:air-filter
    update_interval: 10s
  
  - platform: template
    name: "PM 2.5 To 4 µm"
    id: pm2_5_to_4
    disabled_by_default: true
    lambda: return std::max(0.0f, id(pm_4_0).state - id(pm_2_5).state);
    unit_of_measurement: "µg/m³"
    state_class: measurement
    icon: mdi:air-filter
    update_interval: 10s

  - platform: template
    name: "PM 4 To 10 µm"
    id: pm4_to_10
    disabled_by_default: true
    lambda: return std::max(0.0f, id(pm_10_0).state - id(pm_4_0).state);
    unit_of_measurement: "µg/m³"
    state_class: measurement
    icon: mdi:air-filter
    update_interval: 10s

  # EXPERIMENTAL: SEN5x Particle Number Concentration Sensors
  # Uses undocumented I2C command 0x0413
  # Reference: Sensirion_SEN5x_Read_Mass_and_Number_Concentrations.pdf
  - platform: sen5x_number
    id: sen5x_number_component
    address: 0x69
    update_interval: 10s
    pm_0_5_number:
      name: "PM <0.5µm Number concentration"
      id: pm_0_5_number
      accuracy_decimals: 0
      disabled_by_default: true
    pm_1_0_number:
      name: "PM <1µm Number concentration"
      id: pm_1_0_number
      accuracy_decimals: 0
      disabled_by_default: true
    pm_2_5_number:
      name: "PM <2.5µm Number concentration"
      id: pm_2_5_number
      accuracy_decimals: 0
      disabled_by_default: true
    pm_4_0_number:
      name: "PM <4µm Number concentration"
      id: pm_4_0_number
      accuracy_decimals: 0
      disabled_by_default: true
    pm_10_0_number:
      name: "PM <10µm Number concentration"
      id: pm_10_0_number
      accuracy_decimals: 0
      disabled_by_default: true
    typical_particle_size:
      name: "PM Typical Particle Size"
      id: typical_particle_size
      accuracy_decimals: 2
      disabled_by_default: true

  # Particle number concentration ranges (EXPERIMENTAL)
  - platform: template
    name: "PM 0.3 To 0.5 µm Number"
    id: pm0_3_to_0_5_number
    disabled_by_default: true
    lambda: return id(pm_0_5_number).state;
    unit_of_measurement: "#/m³"
    state_class: measurement
    icon: mdi:air-filter
    update_interval: 10s
    accuracy_decimals: 0

  - platform: template
    name: "PM 0.5 To 1 µm Number"
    id: pm0_5_to_1_number
    disabled_by_default: true
    lambda: return std::max(0.0f, id(pm_1_0_number).state - id(pm_0_5_number).state);
    unit_of_measurement: "#/m³"
    state_class: measurement
    icon: mdi:air-filter
    update_interval: 10s
    accuracy_decimals: 0

  - platform: template
    name: "PM 1 To 2.5 µm Number"
    id: pm1_to_2_5_number
    disabled_by_default: true
    lambda: return std::max(0.0f, id(pm_2_5_number).state - id(pm_1_0_number).state);
    unit_of_measurement: "#/m³"
    state_class: measurement
    icon: mdi:air-filter
    update_interval: 10s
    accuracy_decimals: 0

  - platform: template
    name: "PM 2.5 To 4 µm Number"
    id: pm2_5_to_4_number
    disabled_by_default: true
    lambda: return std::max(0.0f, id(pm_4_0_number).state - id(pm_2_5_number).state);
    unit_of_measurement: "#/m³"
    state_class: measurement
    icon: mdi:air-filter
    update_interval: 10s
    accuracy_decimals: 0

  - platform: template
    name: "PM 4 To 10 µm Number"
    id: pm4_to_10_number
    disabled_by_default: true
    lambda: return std::max(0.0f, id(pm_10_0_number).state - id(pm_4_0_number).state);
    unit_of_measurement: "#/m³"
    state_class: measurement
    icon: mdi:air-filter
    update_interval: 10s
    accuracy_decimals: 0

  - platform: template
    name: "PM Total Count"
    id: total_pm_count
    disabled_by_default: true
    lambda: |-
      return id(pm0_3_to_0_5_number).state +
             id(pm0_5_to_1_number).state +
             id(pm1_to_2_5_number).state +
             id(pm2_5_to_4_number).state +
             id(pm4_to_10_number).state;
    unit_of_measurement: "#/m³"
    state_class: measurement
    icon: mdi:air-filter
    update_interval: 10s
    accuracy_decimals: 0

  # Dallas Temperature Probe
  - platform: dallas_temp
    name: "Temperature Probe (Dallas)"
    id: dallas_temp_probe
    update_interval: 60s

  - platform: ld2412
    light:
      name: LD2412 Light
      id: ld2412_light
      disabled_by_default: true
    moving_distance:
      name: LD2412 Moving Distance
      id: ld2412_moving_distance
      disabled_by_default: true
      filters:
          - throttle: 500ms
    still_distance:
      name: LD2412 Still Distance
      id: ld2412_still_distance
      disabled_by_default: true
      filters:
        - throttle: 500ms
    moving_energy:
      name: LD2412 Move Energy
      id: ld2412_move_energy
      disabled_by_default: true
      filters:
        - throttle: 500ms
    still_energy:
      name: LD2412 Still Energy
      id: ld2412_still_energy
      disabled_by_default: true
      filters:
        - throttle: 500ms
    detection_distance:
      name: LD2412 Detection Distance
      id: ld2412_detection_distance
      disabled_by_default: true
      filters:
        - throttle: 500ms
    gate_0:
      move_energy:
        name: LD2412 g00 move energy
        id: ld2412_g00_move_energy
        disabled_by_default: true
        filters:
          - throttle: 500ms
      still_energy:
        name: LD2412 g00 still energy
        id: ld2412_g00_still_energy
        disabled_by_default: true
        filters:
          - throttle: 500ms
    gate_1:
      move_energy:
        name: LD2412 g01 move energy
        id: ld2412_g01_move_energy
        disabled_by_default: true
