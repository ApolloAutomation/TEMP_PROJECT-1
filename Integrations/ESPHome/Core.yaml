          - throttle: 500ms
      still_energy:
        name: LD2412 g02 still energy
        id: ld2412_g02_still_energy
        disabled_by_default: true
        filters:
          - throttle: 500ms
    gate_3:
      move_energy:
        name: LD2412 g03 move energy
        id: ld2412_g03_move_energy
        disabled_by_default: true
        filters:
          - throttle: 500ms
      still_energy:
        name: LD2412 g03 still energy
