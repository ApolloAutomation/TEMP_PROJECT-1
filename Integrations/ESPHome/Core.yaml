        name: LD2412 g13 still energy
        id: ld2412_g13_still_energy
        disabled_by_default: true
        filters:
          - throttle: 500ms

  # Battery monitoring
  - platform: max17048
    id: max_17048
    battery_voltage:
      name: Battery voltage
      id: batt_v
      disabled_by_default: true
    battery_level:
      name: Battery level
      id: batt_pct
      disabled_by_default: true
      filters:
        - lambda: |
            if (x > 100) return 100;
            else return (x);

light:
  - platform: esp32_rmt_led_strip
    id: rgb_light
    name: "RGB Light"
    pin: GPIO4
    default_transition_length: 0s
    chipset: WS2812
    num_leds: 4
    rgb_order: grb
    effects:
      - pulse:
          name: "Slow Pulse"
          transition_length: 1000ms
