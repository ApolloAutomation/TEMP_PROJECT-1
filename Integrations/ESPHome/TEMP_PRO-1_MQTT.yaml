esphome:
  name: "apollo-temp-pro-1-mqtt"
  friendly_name: Apollo TEMP_PRO-1 MQTT
  comment: Apollo TEMP_PRO-1 MQTT
  name_add_mac_suffix: true
  platformio_options:
    board_build.flash_mode: dio

  project:
    name: "ApolloAutomation.TEMP_PRO-1-MQTT"
    version: "${version}"

  min_version: 2025.2.0

  on_boot:
    # Priority 1200 — runs very early, before most components init.
    # Releases the GPIO7 deep-sleep hold and logs the wake cause for forensics.
    - priority: 1200
      then:
        - lambda: |-
            // Release GPIO7 hold from deep sleep (no-op on first boot)
            gpio_hold_dis(GPIO_NUM_7);
            esp_sleep_wakeup_cause_t wc = esp_sleep_get_wakeup_cause();
            const char *cause;
            if (wc == ESP_SLEEP_WAKEUP_TIMER) {
              cause = "deep sleep timer";
            } else if (wc == ESP_SLEEP_WAKEUP_EXT0) {
              cause = "button press";
            } else {
              esp_reset_reason_t rr = esp_reset_reason();
              if (rr == ESP_RST_POWERON)      cause = "power-on";
              else if (rr == ESP_RST_SW)      cause = "software restart";
              else if (rr == ESP_RST_DEEPSLEEP) cause = "deep sleep (unknown source)";
              else                             cause = "other";
            }
            ESP_LOGW("Apollo", "Wake cause: %s — GPIO7 hold released", cause);

    # Priority 700 — runs before the MQTT client connects (priority ~250).
    # Applies user-configurable broker/credential/web-auth overrides so they
    # take effect before the client uses the compile-time !secret defaults.
    - priority: 700
      then:
        - lambda: |-
            // ----- MQTT credentials -----
            if (!id(mqtt_broker_override).state.empty()) {
              id(mqtt_client)->set_broker_address(id(mqtt_broker_override).state);
              ESP_LOGW("Apollo", "MQTT broker override: %s", id(mqtt_broker_override).state.c_str());
            }
            if (id(mqtt_port_override).state > 0) {
              uint16_t p = (uint16_t)id(mqtt_port_override).state;
              id(mqtt_client)->set_broker_port(p);
              ESP_LOGW("Apollo", "MQTT port override: %u", p);
            }
            if (!id(mqtt_username_override).state.empty()) {
              id(mqtt_client)->set_username(id(mqtt_username_override).state);
              ESP_LOGW("Apollo", "MQTT username override applied");
            }
            if (!id(mqtt_password_override).state.empty()) {
              id(mqtt_client)->set_password(id(mqtt_password_override).state);
              ESP_LOGW("Apollo", "MQTT password override applied");
            }

            // ----- Web server auth -----
            if (web_server_base::global_web_server_base) {
              if (!id(web_auth_username_override).state.empty()) {
                web_server_base::global_web_server_base->set_auth_username(
                  id(web_auth_username_override).state);
                ESP_LOGW("Apollo", "Web auth username override applied");
              }
              if (!id(web_auth_password_override).state.empty()) {
                web_server_base::global_web_server_base->set_auth_password(
                  id(web_auth_password_override).state);
                ESP_LOGW("Apollo", "Web auth password override applied");
              }
            }

    # Priority -100 — runs after components init but before the main loop.
    # Increments boot count, sets the sleep duration, captures the wake reason,
    # checks for boot loops, and applies the wired-mode latch.
    - priority: -100
      then:
        - lambda: |-
            // Track wake count across deep sleep (persisted in NVS)
            id(boot_count) += 1;
            ESP_LOGW("Apollo", "Boot count: %u", (unsigned)id(boot_count));
            // Sleep duration number is in MINUTES (matches Core_MQTT.yaml unit)
            id(deep_sleep_1).set_sleep_duration(id(deep_sleep_sleep_duration).state * 60 * 1000);
            // ONE-TIME safety reset for max_wake_time_s — see ETH variant.
            ESP_LOGW("Apollo", "max_wake_time check: flag=%s, current=%.0f s",
                     id(max_wake_time_reset_done) ? "true" : "false",
                     id(max_wake_time_s).state);
            if (!id(max_wake_time_reset_done)) {
              if (id(max_wake_time_s).state < 45.0f) {
                ESP_LOGW("Apollo", "Max Wake Time was %.0f s — auto-correcting to 45 s (one-time)",
                         id(max_wake_time_s).state);
                id(max_wake_time_s).publish_state(45.0f);
              }
              id(max_wake_time_reset_done) = true;
              ESP_LOGW("Apollo", "max_wake_time_reset_done flag set to true (one-time check complete)");
            }
        # Capture WHY this wake happened (timer/button/cold_boot) — published
        # as meta/wake_reason and shown in the diagnostic summary log.
        - script.execute: capture_wake_reason
        # Detect rapid-boot loops (≥3 consecutive cold boots). If detected,
        # the script flips to battery and forces 30-min cooldown sleep.
        - script.execute: check_boot_loop
        # Wired-mode latch: if power_source is wired, prevent deep sleep so
        # the device stays awake continuously.
        - if:
            condition:
              lambda: 'return id(power_source).current_option() == "wired";'
            then:
              - lambda: |-
                  ESP_LOGW("Apollo", "Wired mode on boot — deep sleep prevented");
                  id(deep_sleep_1).prevent_deep_sleep();
        # Battery sensor always updated (needed for MQTT publish + diagnostics)
        - component.update: max_17048
        # Read SEN55 serial + firmware once per wake (cached in globals)
        - script.execute: read_sen55_info

  # ESPHome runs on_shutdown handlers in priority-descending order. We cut
  # accessory power AFTER MQTT teardown (priority ~250) but BEFORE deep sleep
  # entry. Cutting power earlier hangs SPI shutdown on the W5500. (Same
  # rationale as the ETH variant — it's the same hardware.)
  on_shutdown:
    - priority: 300
      then:
        - lambda: |-
            gpio_set_direction(GPIO_NUM_7, GPIO_MODE_OUTPUT);
            gpio_set_level(GPIO_NUM_7, 0);
            gpio_hold_en(GPIO_NUM_7);
            gpio_deep_sleep_hold_en();
            ESP_LOGW("Apollo", "on_shutdown: accessory power OFF, GPIO7 held LOW");

ota:
  - platform: esphome
    id: ota_esphome
  - platform: web_server

safe_mode:

logger:

wifi:
  ap:
    ssid: "Apollo TEMP_PRO-1 MQTT Hotspot"
  # Default 15-min auto-reboot on WiFi connection loss is bad for offline-
  # capable devices — would cause endless reboot loops on outages. Disable.
  reboot_timeout: 0s

captive_portal:

# MQTT Configuration
mqtt:
  id: mqtt_client
  broker: !secret mqtt_broker
  port: !secret mqtt_port
  username: !secret mqtt_username
  password: !secret mqtt_password

  # Disable ALL automatic MQTT publishing - we manually publish only what we want
  topic_prefix: null
  discovery: false

  # Default 15-min MQTT auto-reboot is dangerous for offline-capable devices —
  # broker outages would otherwise cause endless reboot loops. Disable.
  reboot_timeout: 0s

  on_connect:
    then:
      - logger.log: "Connected to MQTT broker"
      # Stamp connect time — apply_power_mode_command (Core_MQTT.yaml) uses
      # this to reject stale retained "battery" commands replayed by the
      # broker right after subscribe.
      - lambda: 'id(mqtt_connected_at_ms) = millis() ? millis() : 1;'
      # ---------------------------------------------------------------------
      # SELF-HEAL SCRUB DISABLED (2026-05-14)
      # See TEMP_PRO-1_MQTT_ETH.yaml for the full reasoning. tl;dr — the 20
      # extra QoS-0 publishes per wake were eating the battery-mode wake
      # budget and causing publish_mqtt_data data to be lost on deep_sleep.
      # The drain detector that replaced it was removed 2026-06-11 — the
      # fleet is fully hard-wired and it falsely flipped wired devices to
      # battery mode. power_source is operator-controlled only now.
      # ---------------------------------------------------------------------
      # - lambda: |-
      #     auto clear = [](const char* topic) {
      #       id(mqtt_client).publish(topic, "", 0, 0, true);
      #     };
      #     // Broadcast command topics
      #     clear("apollo/temp-pro-1/command/prevent_sleep");
      #     clear("apollo/temp-pro-1/command/sleep_duration");
      #     clear("apollo/temp-pro-1/command/restart");
      #     clear("apollo/temp-pro-1/command/light/on");
      #     clear("apollo/temp-pro-1/command/light/off");
      #     clear("apollo/temp-pro-1/command/light/red");
      #     clear("apollo/temp-pro-1/command/light/green");
      #     clear("apollo/temp-pro-1/command/light/blue");
      #     clear("apollo/temp-pro-1/command/light/rgb");
      #     clear("apollo/temp-pro-1/command/light/effect");
      #     clear("apollo/temp-pro-1/command/buzzer");
      #     clear("apollo/temp-pro-1/command/buzzer/stop");
      #     // Class-scoped command topics
      #     clear("apollo/temp-pro-1/battery/command/prevent_sleep");
      #     clear("apollo/temp-pro-1/battery/command/sleep_duration");
      #     clear("apollo/temp-pro-1/battery/command/power_source");
      #     clear("apollo/temp-pro-1/wired/command/prevent_sleep");
      #     clear("apollo/temp-pro-1/wired/command/sleep_duration");
      #     clear("apollo/temp-pro-1/wired/command/power_source");
      #     // New canonical power_source command
      #     clear("apollo/temp-pro-1/command/power_source");
      #     ESP_LOGI("Apollo", "Cleared retained command topics at broker");
      # Boot-loop cooldown: if check_boot_loop set this flag in on_boot, skip
      # everything and go straight to sleep so whatever caused the loop has a
      # chance to clear before another attempt.
      - if:
          condition:
            lambda: 'return id(boot_loop_force_sleep);'
          then:
            - lambda: 'ESP_LOGE("Apollo", "Boot loop active — sleeping 30 min for cooldown");'
            - delay: 1s
            - script.execute: prepare_and_sleep
      # Wait for SEN55 to stabilize — duration configurable via "Warm-up Delay".
      # Self-adjusts via millis(): if MQTT took longer than warmup to connect,
      # the wait_until exits immediately.
      - wait_until:
          condition:
            lambda: 'return millis() > (uint32_t)(id(warmup_delay_s).state * 1000);'
          timeout: 60s
      # Trigger stabilized sensor reads
      - component.update: sen55
      - component.update: sht3xd_sensor
      - component.update: max_17048
      # Safety check: ensure sensors actually returned valid (non-NaN) data
      - wait_until:
          condition:
            lambda: |-
              return !std::isnan(id(pm_1_0).state) &&
                     !std::isnan(id(pm_2_5).state) &&
                     !std::isnan(id(pm_4_0).state) &&
                     !std::isnan(id(pm_10_0).state) &&
                     !std::isnan(id(sht_temperature).state) &&
                     !std::isnan(id(sht_humidity).state) &&
                     !std::isnan(id(batt_pct).state) &&
                     !id(device_mac_address).state.empty();
          timeout: 10s
      # Sensor health tracking — increments per-sensor consecutive-failure
      # counters on NaN, clears them on success. Also updates lifetime
      # battery min/max for cell-aging diagnostics.
      - script.execute: track_sensor_health
      # Critical-battery check — extends next sleep if battery is low.
      - script.execute: check_critical_battery
      # Publish all MQTT data once
      - script.execute: publish_mqtt_data
      # Self-heal scrub disabled — see TEMP_PRO-1_MQTT_ETH.yaml for reasoning.
      # Wait for the esp-idf MQTT outbox to drain before sleeping.
      # 10s was the empirically-confirmed working value.
      - delay: 10s
      # Battery devices sleep here. Wired devices skip — they stay awake and
      # rely on the periodic publish-while-wired interval for ongoing data.
      - if:
          condition:
            lambda: 'return id(power_source).current_option() == "battery";'
          then:
            - script.execute: prepare_and_sleep

  on_message:
    # Restart command
    - topic: apollo/temp-pro-1/command/restart
      then:
        - logger.log: "Restart command received via MQTT"
        - button.press: esp_reboot

    # ============================================================
    # Power-mode commands. Payloads: "battery"/"wired" (canonical) or
    # "ON" (= wired) / "OFF" (= battery) (legacy values, still accepted).
    #
    # Three topic flavors for fleet targeting:
    #   • apollo/temp-pro-1/command/power_source         → all devices
    #   • apollo/temp-pro-1/battery/command/power_source → battery devices only
    #   • apollo/temp-pro-1/wired/command/power_source   → wired devices only
    #
    # All three route through apply_power_mode_command (Core_MQTT.yaml),
    # which rejects any "battery" payload arriving within 60s of MQTT
    # connect — that's a stale RETAINED message replayed by the broker at
    # subscribe time, which was falsely flipping wired devices into
    # battery mode. The guard also clears the offending retained message
    # at the broker so it can't replay again.
    #
    # The legacy `command/prevent_sleep` topic subscriptions were REMOVED
    # (2026-06-11): a stale retained "OFF" on them silently put wired
    # devices to sleep. Use command/power_source instead.
    # ============================================================
    - topic: apollo/temp-pro-1/command/power_source
      then:
        - script.execute:
            id: apply_power_mode_command
            payload: !lambda 'return x;'
            cmd_topic: "apollo/temp-pro-1/command/power_source"

    - topic: apollo/temp-pro-1/battery/command/power_source
      then:
        - if:
            condition:
              lambda: 'return id(power_source).current_option() == "battery";'
            then:
              - script.execute:
                  id: apply_power_mode_command
                  payload: !lambda 'return x;'
                  cmd_topic: "apollo/temp-pro-1/battery/command/power_source"

    - topic: apollo/temp-pro-1/wired/command/power_source
      then:
        - if:
            condition:
              lambda: 'return id(power_source).current_option() == "wired";'
            then:
              - script.execute:
                  id: apply_power_mode_command
                  payload: !lambda 'return x;'
                  cmd_topic: "apollo/temp-pro-1/wired/command/power_source"

    # RGB Light controls
    - topic: apollo/temp-pro-1/command/light/on
      then:
        - light.turn_on:
            id: rgb_light
            brightness: 25%
            red: 100%
            green: 100%
            blue: 100%

    - topic: apollo/temp-pro-1/command/light/off
      then:
        - light.turn_off: rgb_light

    - topic: apollo/temp-pro-1/command/light/red
      then:
        - light.turn_on:
            id: rgb_light
            brightness: 25%
            red: 100%
            green: 0%
            blue: 0%

    - topic: apollo/temp-pro-1/command/light/green
      then:
        - light.turn_on:
            id: rgb_light
            brightness: 25%
            red: 0%
            green: 100%
            blue: 0%

    - topic: apollo/temp-pro-1/command/light/blue
      then:
        - light.turn_on:
            id: rgb_light
            brightness: 25%
            red: 0%
            green: 0%
            blue: 100%

    # RGB Light custom color - payload format: "r,g,b" (0-255)
    - topic: apollo/temp-pro-1/command/light/rgb
      then:
        - lambda: |-
            int r = 0, g = 0, b = 0;
            if (sscanf(x.c_str(), "%d,%d,%d", &r, &g, &b) == 3) {
              auto call = id(rgb_light).turn_on();
              call.set_rgb(r / 255.0f, g / 255.0f, b / 255.0f);
              call.set_brightness(0.25f);
              call.perform();
              ESP_LOGI("Apollo", "Light set to RGB(%d,%d,%d)", r, g, b);
            }

    # RGB Light effect - payload: "Slow Pulse", "Fast Pulse", or "none"
    - topic: apollo/temp-pro-1/command/light/effect
      then:
        - lambda: |-
            std::string effect = x;
            auto call = id(rgb_light).turn_on();
            if (effect == "none" || effect == "None" || effect == "off") {
              call.set_effect("none");
            } else {
              call.set_effect(effect.c_str());
            }
            call.perform();
            ESP_LOGI("Apollo", "Light effect set to: %s", effect.c_str());

    # Sleep duration control — payload: minutes (e.g., "30", "60").
    # Three class-scoped flavors (broadcast / battery / wired).
    - topic: apollo/temp-pro-1/command/sleep_duration
      then:
        - lambda: |-
            float minutes = atof(x.c_str());
            if (minutes >= 1 && minutes <= 1440) {
              id(deep_sleep_sleep_duration).publish_state(minutes);
              ESP_LOGI("Apollo", "Sleep duration set to %.0f minutes", minutes);
            } else {
              ESP_LOGW("Apollo", "Invalid sleep duration: %.2f (must be 1-1440 minutes)", minutes);
            }

    - topic: apollo/temp-pro-1/battery/command/sleep_duration
      then:
        - if:
            condition:
              lambda: 'return id(power_source).current_option() == "battery";'
            then:
              - lambda: |-
                  float minutes = atof(x.c_str());
                  if (minutes >= 1 && minutes <= 1440) {
                    id(deep_sleep_sleep_duration).publish_state(minutes);
                    ESP_LOGI("Apollo", "battery-class sleep_duration: %.0f min", minutes);
                  }

    - topic: apollo/temp-pro-1/wired/command/sleep_duration
      then:
        - if:
            condition:
              lambda: 'return id(power_source).current_option() == "wired";'
            then:
              - lambda: |-
                  float minutes = atof(x.c_str());
                  if (minutes >= 1 && minutes <= 1440) {
                    id(deep_sleep_sleep_duration).publish_state(minutes);
                    ESP_LOGI("Apollo", "wired-class sleep_duration: %.0f min", minutes);
                  }

    # Buzzer test - payload: RTTTL string or preset name (beep, siren, success, error)
    - topic: apollo/temp-pro-1/command/buzzer
      then:
        - lambda: |-
            std::string sound = x;
            if (sound == "beep") {
              id(rtttl_buzzer).play("beep:d=4,o=5,b=100:c");
            } else if (sound == "siren") {
              id(rtttl_buzzer).play("siren:d=8,o=5,b=100:d,e,d,e,d,e,d,e");
            } else if (sound == "success") {
              id(rtttl_buzzer).play("success:d=4,o=5,b=100:c,e,g");
            } else if (sound == "error") {
              id(rtttl_buzzer).play("error:d=4,o=5,b=100:g,c");
            } else {
              // Assume it's a custom RTTTL string
              id(rtttl_buzzer).play(sound.c_str());
            }
            ESP_LOGI("Apollo", "Buzzer playing: %s", sound.c_str());

    # Buzzer stop
    - topic: apollo/temp-pro-1/command/buzzer/stop
      then:
        - rtttl.stop:
            id: rtttl_buzzer

script:
  # Single-click status indicator for the boot button. Referenced from
  # Core_MQTT.yaml's reset_button on_multi_click handler.
  # WiFi variant uses three colors (vs the ETH variant's two) since WiFi
  # connectivity can fail independently of MQTT.
  - id: statusCheck
    then:
      - if:
          condition:
            - mqtt.connected
          then:
            - logger.log: "Apollo Automation: Connected To MQTT"
            - light.turn_on:
                id: rgb_light
                brightness: 25%
                red: 0%
                green: 0%
                blue: 100%
          else:
            - if:
                condition:
                  - wifi.connected
                then:
                  - logger.log: "Apollo Automation: Connected To WiFi (no MQTT)"
                  - light.turn_on:
                      id: rgb_light
                      brightness: 25%
                      red: 0%
                      green: 100%
                      blue: 0%
                else:
                  - logger.log: "Apollo Automation: Not Connected To WiFi"
                  - light.turn_on:
                      id: rgb_light
                      brightness: 25%
                      red: 100%
                      green: 100%
                      blue: 0%
      - delay: 5s
      - light.turn_off: rgb_light

button:
  - platform: restart
    icon: mdi:power-cycle
    name: "ESP Reboot"
    id: esp_reboot

  # Diagnostic: end the current wake immediately and enter deep sleep.
  # Flips power_source to "battery" first so wired devices honor it too.
  - platform: template
    name: "Force Sleep"
    id: button_force_sleep
    icon: mdi:power-sleep
    entity_category: "diagnostic"
    on_press:
      - lambda: |-
          ESP_LOGW("Apollo", "Force Sleep triggered via web UI");
          if (id(power_source).current_option() != "battery") {
            auto call = id(power_source).make_call();
            call.set_option("battery");
            call.perform();
          }
      - script.execute: prepare_and_sleep

  # Trigger an immediate publish_mqtt_data run from the web UI
  - platform: template
    name: "Publish Now"
    id: button_publish_now
    icon: mdi:publish
    entity_category: "diagnostic"
    on_press:
      - lambda: 'ESP_LOGW("Apollo", "Publish Now triggered via web UI");'
      - script.execute: publish_mqtt_data

packages:
  core: !include Core_MQTT.yaml
