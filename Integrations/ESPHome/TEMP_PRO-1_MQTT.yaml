esphome:
  name: "apollo-temp-pro-1-mqtt"
  friendly_name: Apollo TEMP_PRO-1 MQTT
  comment: Apollo TEMP_PRO-1 MQTT
  name_add_mac_suffix: true
  platformio_options:
    board_build.flash_mode: dio

  project:
    name: "ApolloAutomation.TEMP_PRO-1-MQTT"
    version: "${version}"

  min_version: 2026.1.0

  on_boot:
    # Priority 1200 — runs very early, before most components init.
    # Releases the GPIO7 deep-sleep hold and logs the wake cause for forensics.
    - priority: 1200
      then:
        - lambda: |-
            // Release GPIO7 hold from deep sleep (no-op on first boot)
            gpio_hold_dis(GPIO_NUM_7);
            esp_sleep_wakeup_cause_t wc = esp_sleep_get_wakeup_cause();
            const char *cause;
            if (wc == ESP_SLEEP_WAKEUP_TIMER) {
              cause = "deep sleep timer";
            } else if (wc == ESP_SLEEP_WAKEUP_EXT0) {
              cause = "button press";
            } else {
              esp_reset_reason_t rr = esp_reset_reason();
              if (rr == ESP_RST_POWERON)      cause = "power-on";
              else if (rr == ESP_RST_SW)      cause = "software restart";
              else if (rr == ESP_RST_DEEPSLEEP) cause = "deep sleep (unknown source)";
              else                             cause = "other";
            }
            ESP_LOGW("Apollo", "Wake cause: %s — GPIO7 hold released", cause);

    # Priority 700 — runs before the MQTT client connects (priority ~250).
    # Applies user-configurable broker/credential/web-auth overrides so they
    # take effect before the client uses the compile-time !secret defaults.
    - priority: 700
      then:
        - lambda: |-
            // ----- MQTT broker override (with N-strikes fallback) -----
            // Strike counter: incremented here when a broker/port override is
            // active, cleared on any successful MQTT connect. After 5
            // consecutive override-active boots without a connect, alternate
            // boots fall back to the compile-time !secret broker so one bad
            // (possibly fleet-broadcast) value can no longer permanently
            // orphan a device — reboot_timeout is 0s by design, so nothing
            // else would ever recover it. The override text is never erased.
            bool have_broker_override = !id(mqtt_broker_override).state.empty() ||
                                        id(mqtt_port_override).state > 0;
            bool use_broker_override = have_broker_override;
            if (have_broker_override) {
              id(mqtt_override_fail_count) += 1;
              if (id(mqtt_override_fail_count) > 5 &&
                  (id(mqtt_override_fail_count) % 2 == 0)) {
                use_broker_override = false;
                ESP_LOGE("Apollo", "MQTT override unconnected for %u consecutive boots — using compile-time broker THIS boot (override kept)",
                         (unsigned) (id(mqtt_override_fail_count) - 1));
              }
            }
            if (use_broker_override) {
              if (!id(mqtt_broker_override).state.empty()) {
                id(mqtt_client)->set_broker_address(id(mqtt_broker_override).state);
                ESP_LOGW("Apollo", "MQTT broker override: %s", id(mqtt_broker_override).state.c_str());
              }
              if (id(mqtt_port_override).state > 0) {
                uint16_t p = (uint16_t) id(mqtt_port_override).state;
                id(mqtt_client)->set_broker_port(p);
                ESP_LOGW("Apollo", "MQTT port override: %u", p);
              }
            }
            if (!id(mqtt_username_override).state.empty()) {
              id(mqtt_client)->set_username(id(mqtt_username_override).state);
              ESP_LOGW("Apollo", "MQTT username override applied");
            }
            if (!id(mqtt_password_override).state.empty()) {
              id(mqtt_client)->set_password(id(mqtt_password_override).state);
              ESP_LOGW("Apollo", "MQTT password override applied");
            }

            // ----- Web server auth -----
            if (web_server_base::global_web_server_base) {
              if (!id(web_auth_username_override).state.empty()) {
                web_server_base::global_web_server_base->set_auth_username(
                  id(web_auth_username_override).state);
                ESP_LOGW("Apollo", "Web auth username override applied");
              }
              if (!id(web_auth_password_override).state.empty()) {
                web_server_base::global_web_server_base->set_auth_password(
                  id(web_auth_password_override).state);
                ESP_LOGW("Apollo", "Web auth password override applied");
              }
            }

    # After the WiFi netif is created (priority ~250) but before the app loop,
    # apply static IP if the user has enabled it via the web UI. Previously
    # this block existed only on the ETH variant: the Use Static IP switch and
    # the Static * fields rendered here, persisted, logged "will be applied on
    # next reboot" — and did nothing. Same validation and DHCP fallback as
    # ETH, with the WiFi station interface key.
    - priority: 200
      then:
        - if:
            condition:
              and:
                - switch.is_on: use_static_ip
                - lambda: 'return !id(static_ip).state.empty() && !id(static_gateway).state.empty();'
            then:
              - lambda: |-
                  esp_netif_t *netif = esp_netif_get_handle_from_ifkey("WIFI_STA_DEF");
                  if (!netif) {
                    ESP_LOGW("Apollo", "Static IP: WiFi netif not found yet, skipping");
                    return;
                  }

                  esp_netif_ip_info_t ip_info = {};
                  ip_info.ip.addr      = ipaddr_addr(id(static_ip).state.c_str());
                  ip_info.gw.addr      = ipaddr_addr(id(static_gateway).state.c_str());
                  ip_info.netmask.addr = ipaddr_addr(id(static_subnet).state.c_str());

                  if (ip_info.ip.addr == IPADDR_NONE || ip_info.gw.addr == IPADDR_NONE ||
                      ip_info.netmask.addr == IPADDR_NONE) {
                    ESP_LOGW("Apollo", "Static IP: invalid address format, falling back to DHCP");
                    return;
                  }

                  // Stop DHCP client (may already be running). Safe to fail.
                  esp_netif_dhcpc_stop(netif);

                  esp_err_t err = esp_netif_set_ip_info(netif, &ip_info);
                  if (err != ESP_OK) {
                    ESP_LOGW("Apollo", "Static IP set_ip_info failed: %s", esp_err_to_name(err));
                    return;
                  }

                  if (!id(static_dns1).state.empty()) {
                    esp_netif_dns_info_t dns = {};
                    dns.ip.type = ESP_IPADDR_TYPE_V4;
                    dns.ip.u_addr.ip4.addr = ipaddr_addr(id(static_dns1).state.c_str());
                    if (dns.ip.u_addr.ip4.addr != IPADDR_NONE) {
                      esp_netif_set_dns_info(netif, ESP_NETIF_DNS_MAIN, &dns);
                    }
                  }
                  if (!id(static_dns2).state.empty()) {
                    esp_netif_dns_info_t dns = {};
                    dns.ip.type = ESP_IPADDR_TYPE_V4;
                    dns.ip.u_addr.ip4.addr = ipaddr_addr(id(static_dns2).state.c_str());
                    if (dns.ip.u_addr.ip4.addr != IPADDR_NONE) {
                      esp_netif_set_dns_info(netif, ESP_NETIF_DNS_BACKUP, &dns);
                    }
                  }

                  ESP_LOGW("Apollo", "Static IP applied: %s / gw %s / mask %s",
                           id(static_ip).state.c_str(),
                           id(static_gateway).state.c_str(),
                           id(static_subnet).state.c_str());

                  if (id(static_dns1).state.empty() && id(static_dns2).state.empty()) {
                    ESP_LOGE("Apollo", "Static IP has NO DNS servers configured — a hostname broker will NOT resolve. Set the site's DNS servers, or set the MQTT Broker override to an IP literal.");
                  } else if (id(static_dns1).state == "8.8.8.8" || id(static_dns2).state == "8.8.4.4") {
                    ESP_LOGW("Apollo", "Static DNS is public Google DNS — usually firewalled on restricted networks, and it cannot resolve internal broker FQDNs.");
                  }

    # Priority -100 — runs after components init but before the main loop.
    # Increments boot count, sets the sleep duration, captures the wake reason,
    # checks for boot loops, and applies the wired-mode latch.
    - priority: -100
      then:
        - lambda: |-
            // Track wake count across deep sleep (persisted in NVS)
            id(boot_count) += 1;
            ESP_LOGW("Apollo", "Boot count: %u", (unsigned)id(boot_count));
            // Sleep duration number is in MINUTES (matches Core_MQTT.yaml unit)
            id(deep_sleep_1).set_sleep_duration(id(deep_sleep_sleep_duration).state * 60 * 1000);
            // ONE-TIME safety reset for max_wake_time_s — see ETH variant.
            ESP_LOGW("Apollo", "max_wake_time check: flag=%s, current=%.0f s",
                     id(max_wake_time_reset_done) ? "true" : "false",
                     id(max_wake_time_s).state);
            if (!id(max_wake_time_reset_done)) {
              if (id(max_wake_time_s).state < 45.0f) {
                ESP_LOGW("Apollo", "Max Wake Time was %.0f s — auto-correcting to 45 s (one-time)",
                         id(max_wake_time_s).state);
                // make_call persists to NVS; publish_state alone was RAM-only
                // and the correction was lost on the next boot.
                auto call = id(max_wake_time_s).make_call();
                call.set_value(45.0f);
                call.perform();
              }
              id(max_wake_time_reset_done) = true;
              ESP_LOGW("Apollo", "max_wake_time_reset_done flag set to true (one-time check complete)");
            }
        # Capture WHY this wake happened (timer/button/cold_boot) — published
        # as meta/wake_reason and shown in the diagnostic summary log.
        - script.execute: capture_wake_reason
        # Detect rapid-boot loops (≥3 consecutive cold boots). Battery devices
        # get a 30-min cooldown sleep; wired devices stay awake and are
        # flagged via the health rollup. power_source is never auto-flipped.
        - script.execute: check_boot_loop
        # Wired-mode latch: if power_source is wired, prevent deep sleep so
        # the device stays awake continuously.
        - if:
            condition:
              lambda: 'return id(power_source).current_option() == "wired";'
            then:
              - lambda: |-
                  ESP_LOGW("Apollo", "Wired mode on boot — deep sleep prevented");
                  id(deep_sleep_1).prevent_deep_sleep();
        # Battery sensor always updated (needed for MQTT publish + diagnostics)
        - component.update: max_17048
        # Read SEN55 serial + firmware once per wake (cached in globals)
        - script.execute: read_sen55_info
        # Battery LED indicator — shown when the device is wired (always-on,
        # so the tech wants visual confirmation) or when "Battery LED on
        # Wake" is enabled. Previously the switch existed on this variant but
        # nothing consumed it — a tech enabling it saw no LED and concluded
        # the device was dead. Mirrors the ETH variant.
        - if:
            condition:
              or:
                - lambda: 'return id(power_source).current_option() == "wired";'
                - switch.is_on: battery_led_on_wake
            then:
              - delay: 500ms
              - lambda: |-
                  float batt = id(batt_pct).state;
                  if (std::isnan(batt)) return;
                  auto call = id(rgb_light).turn_on();
                  call.set_brightness(0.25f);
                  call.set_transition_length(0);
                  if (batt >= 95.0f) {
                    call.set_rgb(0.0f, 1.0f, 0.0f);  // Green
                  } else if (batt >= 50.0f) {
                    call.set_rgb(1.0f, 1.0f, 0.0f);  // Yellow
                  } else {
                    call.set_rgb(1.0f, 0.0f, 0.0f);  // Red
                  }
                  call.perform();
                  ESP_LOGW("Apollo", "Battery: %.0f%% - %s", batt, batt >= 95 ? "GREEN (ready)" : batt >= 50 ? "YELLOW (charging)" : "RED (low)");
              - delay: 2s
              - light.turn_off: rgb_light

  # ESPHome runs shutdown hooks in REVERSE of the setup-priority-sorted
  # component list, i.e. ascending priority — so this priority-300 handler
  # runs AFTER WiFi/MQTT teardown (~250) and BEFORE deep sleep entry. Cutting
  # the accessory rail after network teardown mirrors the ETH variant, where
  # cutting W5500 power mid-teardown hung SPI shutdown; on this WiFi variant
  # it keeps the SHT3x/MAX17048 powered until their I2C traffic is done.
  on_shutdown:
    - priority: 300
      then:
        - lambda: |-
            gpio_set_direction(GPIO_NUM_7, GPIO_MODE_OUTPUT);
            gpio_set_level(GPIO_NUM_7, 0);
            gpio_hold_en(GPIO_NUM_7);
            gpio_deep_sleep_hold_en();
            ESP_LOGW("Apollo", "on_shutdown: accessory power OFF, GPIO7 held LOW");

ota:
  - platform: esphome
    id: ota_esphome
    on_begin:
      then:
        - lambda: |-
            id(ota_in_progress) = true;
            ESP_LOGW("Apollo", "OTA started — wake-time cap suspended (10 min failsafe)");
    on_end:
      then:
        - lambda: 'id(ota_in_progress) = false;'
    on_error:
      then:
        - lambda: |-
            id(ota_in_progress) = false;
            ESP_LOGE("Apollo", "OTA failed (error %d) — wake-time cap re-armed", x);
  # Web upload runs in the httpd task while the main loop keeps ticking, so
  # the wake-time cap could previously deep-sleep a battery unit mid-upload —
  # the ota_in_progress flag prevents that.
  - platform: web_server
    id: ota_web
    on_begin:
      then:
        - lambda: |-
            id(ota_in_progress) = true;
            ESP_LOGW("Apollo", "Web OTA started — wake-time cap suspended (10 min failsafe)");
    on_end:
      then:
        - lambda: 'id(ota_in_progress) = false;'
    on_error:
      then:
        - lambda: |-
            id(ota_in_progress) = false;
            ESP_LOGE("Apollo", "Web OTA failed (error %d) — wake-time cap re-armed", x);

safe_mode:
  id: safe_mode_1

logger:

wifi:
  ap:
    ssid: "Apollo TEMP_PRO-1 MQTT Hotspot"
    # Default 90 s could NEVER activate on a battery unit: the wake-time cap
    # force-sleeps at 45 s, so a device with stale WiFi credentials cycled
    # forever with no re-onboarding path. 25 s leaves ~20 s of hotspot inside
    # the wake window. AP+STA only engages while the connection is failing,
    # so healthy wakes pay nothing.
    ap_timeout: 25s
  # Default 15-min auto-reboot on WiFi connection loss is bad for offline-
  # capable devices — would cause endless reboot loops on outages. Disable.
  reboot_timeout: 0s

captive_portal:

# MQTT Configuration
mqtt:
  id: mqtt_client
  broker: !secret mqtt_broker
  port: !secret mqtt_port
  username: !secret mqtt_username
  password: !secret mqtt_password

  # Disable ALL automatic MQTT publishing - we manually publish only what we want
  topic_prefix: null
  discovery: false

  # Default 15-min MQTT auto-reboot is dangerous for offline-capable devices —
  # broker outages would otherwise cause endless reboot loops. Disable.
  reboot_timeout: 0s

  on_connect:
    then:
      - logger.log: "Connected to MQTT broker"
      # Stamp connect time — apply_power_mode_command (Core_MQTT.yaml) uses
      # this to reject stale retained "battery" commands replayed by the
      # broker right after subscribe.
      - lambda: |-
          id(mqtt_connected_at_ms) = millis() ? millis() : 1;
          // Broker reached — clear the broker-override strike counter.
          if (id(mqtt_override_fail_count) != 0) id(mqtt_override_fail_count) = 0;
      # ---------------------------------------------------------------------
      # SELF-HEAL SCRUB DISABLED (2026-05-14)
      # See TEMP_PRO-1_MQTT_ETH.yaml for the full reasoning. tl;dr — the 20
      # extra QoS-0 publishes per wake were eating the battery-mode wake
      # budget and causing publish_mqtt_data data to be lost on deep_sleep.
      # The drain detector that replaced it was removed 2026-06-11 — the
      # fleet is fully hard-wired and it falsely flipped wired devices to
      # battery mode. power_source is operator-controlled only now.
      # ---------------------------------------------------------------------
      # - lambda: |-
      #     auto clear = [](const char* topic) {
      #       id(mqtt_client).publish(topic, "", 0, 0, true);
      #     };
      #     // Broadcast command topics
      #     clear("apollo/temp-pro-1/command/prevent_sleep");
      #     clear("apollo/temp-pro-1/command/sleep_duration");
      #     clear("apollo/temp-pro-1/command/restart");
      #     clear("apollo/temp-pro-1/command/light/on");
      #     clear("apollo/temp-pro-1/command/light/off");
      #     clear("apollo/temp-pro-1/command/light/red");
      #     clear("apollo/temp-pro-1/command/light/green");
      #     clear("apollo/temp-pro-1/command/light/blue");
      #     clear("apollo/temp-pro-1/command/light/rgb");
      #     clear("apollo/temp-pro-1/command/light/effect");
      #     clear("apollo/temp-pro-1/command/buzzer");
      #     clear("apollo/temp-pro-1/command/buzzer/stop");
      #     // Class-scoped command topics
      #     clear("apollo/temp-pro-1/battery/command/prevent_sleep");
      #     clear("apollo/temp-pro-1/battery/command/sleep_duration");
      #     clear("apollo/temp-pro-1/battery/command/power_source");
      #     clear("apollo/temp-pro-1/wired/command/prevent_sleep");
      #     clear("apollo/temp-pro-1/wired/command/sleep_duration");
      #     clear("apollo/temp-pro-1/wired/command/power_source");
      #     // New canonical power_source command
      #     clear("apollo/temp-pro-1/command/power_source");
      #     ESP_LOGI("Apollo", "Cleared retained command topics at broker");
      # Boot-loop cooldown: if check_boot_loop set this flag in on_boot, skip
      # everything and go straight to sleep so whatever caused the loop has a
      # chance to clear before another attempt.
      - if:
          condition:
            lambda: 'return id(boot_loop_force_sleep);'
          then:
            - lambda: 'ESP_LOGE("Apollo", "Boot loop active — sleeping 30 min for cooldown");'
            # Tell the operator WHY the device is about to go silent —
            # health=CRITICAL + wake_reason, retained (2 publishes, QoS 1).
            - script.execute: publish_boot_loop_alert
            - delay: 3s  # drain the two alert publishes + flush logs
            - script.execute: prepare_and_sleep
      # Wait for SEN55 to stabilize — duration configurable via "Warm-up Delay".
      # Self-adjusts via millis(): if MQTT took longer than warmup to connect,
      # the wait_until exits immediately.
      - wait_until:
          condition:
            lambda: 'return millis() > (uint32_t)(id(warmup_delay_s).state * 1000);'
          timeout: 60s
      # Trigger stabilized sensor reads
      - component.update: sen55
      - component.update: sht3xd_sensor
      - component.update: max_17048
      # Safety check: ensure sensors actually returned valid (non-NaN) data
      - wait_until:
          condition:
            lambda: |-
              return !std::isnan(id(pm_1_0).state) &&
                     !std::isnan(id(pm_2_5).state) &&
                     !std::isnan(id(pm_4_0).state) &&
                     !std::isnan(id(pm_10_0).state) &&
                     !std::isnan(id(sht_temperature).state) &&
                     !std::isnan(id(sht_humidity).state) &&
                     !std::isnan(id(batt_pct).state) &&
                     !id(device_mac_address).state.empty();
          timeout: 10s
      # Force IP address refresh before publishing (mirrors ETH; the template
      # text_sensor polls every 10 s, this removes the race on slow wakes)
      - component.update: device_ip_address
      # Sensor health tracking — increments per-sensor consecutive-failure
      # counters on NaN, clears them on success. Also updates lifetime
      # battery min/max for cell-aging diagnostics.
      - script.execute: track_sensor_health
      # Critical-battery check — extends next sleep if battery is low.
      - script.execute: check_critical_battery
      # Publish all MQTT data once
      - script.execute: publish_mqtt_data
      # Self-heal scrub disabled — see TEMP_PRO-1_MQTT_ETH.yaml for reasoning.
      # Wait for the esp-idf MQTT outbox to drain before sleeping.
      # 10s was the empirically-confirmed working value.
      - delay: 10s
      # Connected to the broker and drained a full publish batch — this boot
      # is good. With OTA rollback active (ota + safe_mode on ESP-IDF), the
      # image must be marked valid before the next reset or the bootloader
      # reverts it. Battery wakes end before safe_mode's 60 s auto-mark, so
      # without this an OTA'd battery unit ran the new image for exactly one
      # wake and silently rolled back. Marking only after a successful publish
      # keeps real rollback protection for images that cannot reach the broker.
      - lambda: 'id(safe_mode_1).mark_successful();'
      # Battery devices sleep here. Wired devices skip — they stay awake and
      # rely on the periodic publish-while-wired interval for ongoing data.
      - if:
          condition:
            lambda: 'return id(power_source).current_option() == "battery";'
          then:
            - script.execute: prepare_and_sleep

  on_message:
    # Restart command. Guarded like power_source: empty payloads are
    # retained-clear replays; any payload arriving <60s after MQTT connect is
    # almost certainly a stale RETAINED message replayed by the broker at
    # subscribe time — one retained restart would otherwise reboot-loop every
    # device on every connect. Rejected replays are cleared at the broker.
    # Send restarts NON-retained to devices connected >60s (wired units).
    # Battery units reboot on every wake anyway, so nothing is lost there.
    - topic: apollo/temp-pro-1/command/restart
      then:
        - lambda: |-
            if (x.empty()) return;
            uint32_t since_ms = millis() - id(mqtt_connected_at_ms);
            if (id(mqtt_connected_at_ms) == 0 || since_ms < 60000) {
              ESP_LOGE("Apollo", "REJECTED restart %.1fs after MQTT connect — stale retained replay. Clearing retained value; resend NON-retained once connected >60s.",
                       since_ms / 1000.0f);
              id(mqtt_client).publish("apollo/temp-pro-1/command/restart", "", 0, 0, true);
              return;
            }
            ESP_LOGW("Apollo", "Restart command received via MQTT");
            id(esp_reboot).press();

    # ============================================================
    # Power-mode commands. Payloads: "battery"/"wired" (canonical) or
    # "ON" (= wired) / "OFF" (= battery) (legacy values, still accepted).
    #
    # Three topic flavors for fleet targeting:
    #   • apollo/temp-pro-1/command/power_source         → all devices
    #   • apollo/temp-pro-1/battery/command/power_source → battery devices only
    #   • apollo/temp-pro-1/wired/command/power_source   → wired devices only
    #
    # All three route through apply_power_mode_command (Core_MQTT.yaml),
    # which rejects any "battery" payload arriving within 60s of MQTT
    # connect — that's a stale RETAINED message replayed by the broker at
    # subscribe time, which was falsely flipping wired devices into
    # battery mode. The guard also clears the offending retained message
    # at the broker so it can't replay again.
    #
    # The legacy `command/prevent_sleep` topic subscriptions were REMOVED
    # (2026-06-11): a stale retained "OFF" on them silently put wired
    # devices to sleep. Use command/power_source instead.
    # ============================================================
    - topic: apollo/temp-pro-1/command/power_source
      then:
        - script.execute:
            id: apply_power_mode_command
            payload: !lambda 'return x;'
            cmd_topic: "apollo/temp-pro-1/command/power_source"

    - topic: apollo/temp-pro-1/battery/command/power_source
      then:
        - if:
            condition:
              lambda: 'return id(power_source).current_option() == "battery";'
            then:
              - script.execute:
                  id: apply_power_mode_command
                  payload: !lambda 'return x;'
                  cmd_topic: "apollo/temp-pro-1/battery/command/power_source"

    - topic: apollo/temp-pro-1/wired/command/power_source
      then:
        - if:
            condition:
              lambda: 'return id(power_source).current_option() == "wired";'
            then:
              - script.execute:
                  id: apply_power_mode_command
                  payload: !lambda 'return x;'
                  cmd_topic: "apollo/temp-pro-1/wired/command/power_source"

    # RGB Light controls
    - topic: apollo/temp-pro-1/command/light/on
      then:
        - light.turn_on:
            id: rgb_light
            brightness: 25%
            red: 100%
            green: 100%
            blue: 100%

    - topic: apollo/temp-pro-1/command/light/off
      then:
        - light.turn_off: rgb_light

    - topic: apollo/temp-pro-1/command/light/red
      then:
        - light.turn_on:
            id: rgb_light
            brightness: 25%
            red: 100%
            green: 0%
            blue: 0%

    - topic: apollo/temp-pro-1/command/light/green
      then:
        - light.turn_on:
            id: rgb_light
            brightness: 25%
            red: 0%
            green: 100%
            blue: 0%

    - topic: apollo/temp-pro-1/command/light/blue
      then:
        - light.turn_on:
            id: rgb_light
            brightness: 25%
            red: 0%
            green: 0%
            blue: 100%

    # RGB Light custom color - payload format: "r,g,b" (0-255)
    - topic: apollo/temp-pro-1/command/light/rgb
      then:
        - lambda: |-
            int r = 0, g = 0, b = 0;
            if (sscanf(x.c_str(), "%d,%d,%d", &r, &g, &b) == 3) {
              auto call = id(rgb_light).turn_on();
              call.set_rgb(r / 255.0f, g / 255.0f, b / 255.0f);
              call.set_brightness(0.25f);
              call.perform();
              ESP_LOGI("Apollo", "Light set to RGB(%d,%d,%d)", r, g, b);
            }

    # RGB Light effect - payload: "Slow Pulse", "Fast Pulse", or "none"
    - topic: apollo/temp-pro-1/command/light/effect
      then:
        - lambda: |-
            std::string effect = x;
            auto call = id(rgb_light).turn_on();
            if (effect == "none" || effect == "None" || effect == "off") {
              call.set_effect("none");
            } else {
              call.set_effect(effect.c_str());
            }
            call.perform();
            ESP_LOGI("Apollo", "Light effect set to: %s", effect.c_str());

    # Sleep duration control — payload: minutes (e.g., "30", "60").
    # Three class-scoped flavors (broadcast / battery / wired).
    - topic: apollo/temp-pro-1/command/sleep_duration
      then:
        - lambda: |-
            char *end = nullptr;
            float minutes = strtof(x.c_str(), &end);
            if (end == x.c_str() || x.empty()) {
              ESP_LOGW("Apollo", "Ignoring non-numeric sleep_duration payload: '%s'", x.c_str());
            } else if (minutes >= 1 && minutes <= 1440) {
              // make_call persists to NVS; publish_state alone reverted on reboot
              auto call = id(deep_sleep_sleep_duration).make_call();
              call.set_value(minutes);
              call.perform();
              ESP_LOGI("Apollo", "Sleep duration set to %.0f minutes", minutes);
            } else {
              ESP_LOGW("Apollo", "Invalid sleep duration: %.2f (must be 1-1440 minutes)", minutes);
            }

    - topic: apollo/temp-pro-1/battery/command/sleep_duration
      then:
        - if:
            condition:
              lambda: 'return id(power_source).current_option() == "battery";'
            then:
              - lambda: |-
                  char *end = nullptr;
                  float minutes = strtof(x.c_str(), &end);
                  if (end == x.c_str() || x.empty()) {
                    ESP_LOGW("Apollo", "Ignoring non-numeric battery-class sleep_duration: '%s'", x.c_str());
                  } else if (minutes >= 1 && minutes <= 1440) {
                    auto call = id(deep_sleep_sleep_duration).make_call();
                    call.set_value(minutes);
                    call.perform();
                    ESP_LOGI("Apollo", "battery-class sleep_duration: %.0f min", minutes);
                  } else {
                    ESP_LOGW("Apollo", "Invalid battery-class sleep_duration: %.2f (1-1440)", minutes);
                  }

    - topic: apollo/temp-pro-1/wired/command/sleep_duration
      then:
        - if:
            condition:
              lambda: 'return id(power_source).current_option() == "wired";'
            then:
              - lambda: |-
                  char *end = nullptr;
                  float minutes = strtof(x.c_str(), &end);
                  if (end == x.c_str() || x.empty()) {
                    ESP_LOGW("Apollo", "Ignoring non-numeric wired-class sleep_duration: '%s'", x.c_str());
                  } else if (minutes >= 1 && minutes <= 1440) {
                    auto call = id(deep_sleep_sleep_duration).make_call();
                    call.set_value(minutes);
                    call.perform();
                    ESP_LOGI("Apollo", "wired-class sleep_duration: %.0f min", minutes);
                  } else {
                    ESP_LOGW("Apollo", "Invalid wired-class sleep_duration: %.2f (1-1440)", minutes);
                  }

    # Buzzer test - payload: RTTTL string or preset name (beep, siren, success, error)
    - topic: apollo/temp-pro-1/command/buzzer
      then:
        - lambda: |-
            if (x.empty()) return;
            if (!id(buzzer_enabled).state) {
              ESP_LOGW("Apollo", "Buzzer command ignored — Buzzer Enabled is OFF");
              return;
            }
            std::string sound = x;
            if (sound == "beep") {
              id(rtttl_buzzer).play("beep:d=4,o=5,b=100:c");
            } else if (sound == "siren") {
              id(rtttl_buzzer).play("siren:d=8,o=5,b=100:d,e,d,e,d,e,d,e");
            } else if (sound == "success") {
              id(rtttl_buzzer).play("success:d=4,o=5,b=100:c,e,g");
            } else if (sound == "error") {
              id(rtttl_buzzer).play("error:d=4,o=5,b=100:g,c");
            } else {
              // Assume it's a custom RTTTL string
              id(rtttl_buzzer).play(sound.c_str());
            }
            ESP_LOGI("Apollo", "Buzzer playing: %s", sound.c_str());

    # Buzzer stop
    - topic: apollo/temp-pro-1/command/buzzer/stop
      then:
        - rtttl.stop:
            id: rtttl_buzzer

    # ============================================================
    # Command parity with the ETH variant (previously ETH-only).
    # The battery units running THIS firmware are exactly the devices that
    # cannot be reached on demand (FACT: a sleeping device only receives
    # retained commands, replayed at connect), so remote flag-based config
    # matters most here. Topic names and payload grammars are identical to
    # the ETH variant so fleet commands behave uniformly.
    # ============================================================

    # Column ID dropdown - payload: column identifier (e.g., "J8", "H08")
    - topic: apollo/temp-pro-1/command/column_id
      then:
        - lambda: |-
            auto call = id(column_id).make_call();
            call.set_option(x.c_str());
            call.perform();
            ESP_LOGI("Apollo", "Column ID set to: %s", x.c_str());

    # Custom Column ID - payload: any string (overrides dropdown when non-empty)
    - topic: apollo/temp-pro-1/command/custom_column_id
      then:
        - lambda: |-
            auto call = id(custom_column_id).make_call();
            call.set_value(x.c_str());
            call.perform();
            ESP_LOGI("Apollo", "Custom Column ID set to: %s", x.c_str());

    # Deployment Notes - any free-form string
    - topic: apollo/temp-pro-1/command/deployment_notes
      then:
        - lambda: |-
            auto call = id(deployment_notes).make_call();
            call.set_value(x.c_str());
            call.perform();
            ESP_LOGI("Apollo", "Deployment notes set via MQTT: %s", x.c_str());

    # Warm-up Delay in seconds (0-60)
    - topic: apollo/temp-pro-1/command/warmup_delay
      then:
        - lambda: |-
            char *end = nullptr;
            float v = strtof(x.c_str(), &end);
            if (end == x.c_str() || x.empty()) {
              ESP_LOGW("Apollo", "Ignoring non-numeric warmup_delay payload: '%s'", x.c_str());
            } else if (v >= 0 && v <= 60) {
              auto call = id(warmup_delay_s).make_call();
              call.set_value(v);
              call.perform();
              ESP_LOGI("Apollo", "Warm-up delay set to %.0f s", v);
            } else {
              ESP_LOGW("Apollo", "Invalid warmup_delay: %.2f (must be 0-60 s)", v);
            }

    # Max Wake Time in seconds (30-180)
    - topic: apollo/temp-pro-1/command/max_wake_time
      then:
        - lambda: |-
            char *end = nullptr;
            float v = strtof(x.c_str(), &end);
            if (end == x.c_str() || x.empty()) {
              ESP_LOGW("Apollo", "Ignoring non-numeric max_wake_time payload: '%s'", x.c_str());
            } else if (v >= 30 && v <= 180) {
              auto call = id(max_wake_time_s).make_call();
              call.set_value(v);
              call.perform();
              ESP_LOGI("Apollo", "Max wake time set to %.0f s", v);
            } else {
              ESP_LOGW("Apollo", "Invalid max_wake_time: %.2f (must be 30-180 s)", v);
            }

    # Battery LED on Wake toggle - "ON"/"OFF". Empty payloads (retained-clear
    # replays) are ignored rather than treated as OFF.
    - topic: apollo/temp-pro-1/command/battery_led_on_wake
      then:
        - lambda: |-
            if (x.empty()) return;
            if (x == "ON" || x == "on" || x == "1" || x == "true") {
              id(battery_led_on_wake).turn_on();
              ESP_LOGI("Apollo", "Battery LED on Wake: ON");
            } else {
              id(battery_led_on_wake).turn_off();
              ESP_LOGI("Apollo", "Battery LED on Wake: OFF");
            }

    # Publish Interval in seconds (1-3600) — applies when power source is wired
    - topic: apollo/temp-pro-1/command/publish_interval
      then:
        - lambda: |-
            char *end = nullptr;
            float v = strtof(x.c_str(), &end);
            if (end == x.c_str() || x.empty()) {
              ESP_LOGW("Apollo", "Ignoring non-numeric publish_interval payload: '%s'", x.c_str());
            } else if (v >= 1 && v <= 3600) {
              auto call = id(prevent_sleep_publish_interval_s).make_call();
              call.set_value(v);
              call.perform();
              ESP_LOGI("Apollo", "Publish interval set to %.0f s", v);
            } else {
              ESP_LOGW("Apollo", "Invalid publish_interval: %.2f (must be 1-3600 s)", v);
            }

    # MQTT broker hostname or IP (takes effect on next reboot)
    - topic: apollo/temp-pro-1/command/mqtt_broker
      then:
        - lambda: |-
            auto call = id(mqtt_broker_override).make_call();
            call.set_value(x.c_str());
            call.perform();
            ESP_LOGI("Apollo", "MQTT broker set via MQTT (reboot to apply): %s", x.c_str());

    # MQTT broker port (0 = use compile-time default)
    - topic: apollo/temp-pro-1/command/mqtt_port
      then:
        - lambda: |-
            char *end = nullptr;
            float p = strtof(x.c_str(), &end);
            if (end == x.c_str() || x.empty()) {
              ESP_LOGW("Apollo", "Ignoring non-numeric mqtt_port payload: '%s'", x.c_str());
            } else if (p >= 0 && p <= 65535) {
              auto call = id(mqtt_port_override).make_call();
              call.set_value(p);
              call.perform();
              ESP_LOGI("Apollo", "MQTT port set via MQTT (persisted; reboot to apply): %.0f", p);
            } else {
              ESP_LOGW("Apollo", "Invalid mqtt_port: %.2f", p);
            }

    # MQTT username (takes effect on next reboot)
    - topic: apollo/temp-pro-1/command/mqtt_username
      then:
        - lambda: |-
            auto call = id(mqtt_username_override).make_call();
            call.set_value(x.c_str());
            call.perform();
            ESP_LOGI("Apollo", "MQTT username set via MQTT (reboot to apply)");

    # MQTT password (takes effect on next reboot) — careful, sensitive
    - topic: apollo/temp-pro-1/command/mqtt_password
      then:
        - lambda: |-
            auto call = id(mqtt_password_override).make_call();
            call.set_value(x.c_str());
            call.perform();
            ESP_LOGI("Apollo", "MQTT password set via MQTT (reboot to apply)");

    # Web UI auth username (takes effect on next reboot)
    - topic: apollo/temp-pro-1/command/web_auth_username
      then:
        - lambda: |-
            auto call = id(web_auth_username_override).make_call();
            call.set_value(x.c_str());
            call.perform();
            ESP_LOGI("Apollo", "Web auth username set via MQTT (reboot to apply)");

    # Web UI auth password (takes effect on next reboot) — be careful, lockout risk
    - topic: apollo/temp-pro-1/command/web_auth_password
      then:
        - lambda: |-
            auto call = id(web_auth_password_override).make_call();
            call.set_value(x.c_str());
            call.perform();
            ESP_LOGW("Apollo", "Web auth password set via MQTT (reboot to apply) — verify before reboot to avoid lockout");

    # Critical-battery tuning (validated numeric; persisted to NVS)
    - topic: apollo/temp-pro-1/command/critical_battery_threshold
      then:
        - lambda: |-
            char *end = nullptr;
            float v = strtof(x.c_str(), &end);
            if (end == x.c_str() || x.empty()) {
              ESP_LOGW("Apollo", "Ignoring non-numeric critical_battery_threshold: '%s'", x.c_str());
            } else if (v >= 0 && v <= 50) {
              auto call = id(critical_battery_threshold_pct).make_call();
              call.set_value(v);
              call.perform();
              ESP_LOGI("Apollo", "Critical battery threshold set to %.0f %%", v);
            } else {
              ESP_LOGW("Apollo", "Invalid critical_battery_threshold: %.2f (must be 0-50)", v);
            }

    - topic: apollo/temp-pro-1/command/critical_battery_sleep
      then:
        - lambda: |-
            char *end = nullptr;
            float v = strtof(x.c_str(), &end);
            if (end == x.c_str() || x.empty()) {
              ESP_LOGW("Apollo", "Ignoring non-numeric critical_battery_sleep: '%s'", x.c_str());
            } else if (v >= 5 && v <= 1440) {
              auto call = id(critical_battery_sleep_min).make_call();
              call.set_value(v);
              call.perform();
              ESP_LOGI("Apollo", "Critical battery sleep set to %.0f min", v);
            } else {
              ESP_LOGW("Apollo", "Invalid critical_battery_sleep: %.2f (must be 5-1440)", v);
            }

    # Immediate publish for wired devices. Battery devices publish every wake
    # anyway, and honoring a retained replay would double-publish every wake
    # (the 2026-05-14 wake-budget incident class), so battery mode ignores it.
    - topic: apollo/temp-pro-1/command/publish_now
      then:
        - if:
            condition:
              and:
                - lambda: 'return !x.empty();'
                - lambda: 'return id(power_source).current_option() == "wired";'
            then:
              - lambda: 'ESP_LOGW("Apollo", "Publish Now triggered via MQTT");'
              - script.execute: publish_mqtt_data

script:
  # Single-click status indicator for the boot button. Referenced from
  # Core_MQTT.yaml's reset_button on_multi_click handler.
  # WiFi variant uses three colors (vs the ETH variant's two) since WiFi
  # connectivity can fail independently of MQTT.
  - id: statusCheck
    then:
      - if:
          condition:
            - mqtt.connected
          then:
            - logger.log: "Apollo Automation: Connected To MQTT"
            - light.turn_on:
                id: rgb_light
                brightness: 25%
                red: 0%
                green: 0%
                blue: 100%
          else:
            - if:
                condition:
                  - wifi.connected
                then:
                  - logger.log: "Apollo Automation: Connected To WiFi (no MQTT)"
                  - light.turn_on:
                      id: rgb_light
                      brightness: 25%
                      red: 0%
                      green: 100%
                      blue: 0%
                else:
                  - logger.log: "Apollo Automation: Not Connected To WiFi"
                  - light.turn_on:
                      id: rgb_light
                      brightness: 25%
                      red: 100%
                      green: 100%
                      blue: 0%
      - delay: 5s
      - light.turn_off: rgb_light

button:
  - platform: restart
    icon: mdi:power-cycle
    name: "ESP Reboot"
    id: esp_reboot
    web_server:
      sorting_group_id: sg_maintenance
      sorting_weight: 61

  # Diagnostic: end the current wake immediately and enter deep sleep.
  # Flips power_source to "battery" first so wired devices honor it too.
  - platform: template
    name: "Force Sleep"
    id: button_force_sleep
    web_server:
      sorting_group_id: sg_power
      sorting_weight: 38
    icon: mdi:power-sleep
    entity_category: "diagnostic"
    on_press:
      - lambda: |-
          ESP_LOGW("Apollo", "Force Sleep triggered via web UI");
          if (id(power_source).current_option() != "battery") {
            auto call = id(power_source).make_call();
            call.set_option("battery");
            call.perform();
          }
      - script.execute: prepare_and_sleep

  # Trigger an immediate publish_mqtt_data run from the web UI
  - platform: template
    name: "Publish Now"
    id: button_publish_now
    web_server:
      sorting_group_id: sg_maintenance
      sorting_weight: 62
    icon: mdi:publish
    entity_category: "diagnostic"
    on_press:
      - lambda: 'ESP_LOGW("Apollo", "Publish Now triggered via web UI");'
      - script.execute: publish_mqtt_data

packages:
  core: !include Core_MQTT.yaml
