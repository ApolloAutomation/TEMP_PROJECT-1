esphome:
  name: "apollo-temp-pro-1-eth"
  friendly_name: Apollo TEMP_PRO-1 ETH
  comment: Apollo TEMP_PRO-1 ETH
  name_add_mac_suffix: true
  platformio_options:
    board_build.flash_mode: dio

  project:
    name: "ApolloAutomation.TEMP_PRO-1-ETH"
    version: "${version}"

  min_version: 2025.2.0

  # ---------------------------------------------------------------------------
  # Battery fix (ported from the mqtt_toy branch). The GPIO7 "accessory rail"
  # powers the W5500 ethernet PHY and the I2C sensors. On stock firmware that
  # rail stays energized through deep sleep (~7mA), which is the dominant
  # battery drain on this hardware. Here we cut it during sleep and hold the
  # pin LOW so it can't float back on.
  #
  # The HA-API sleep/wake cycle in Core.yaml is left completely untouched:
  # accessory_power is still switched on in api.on_client_connected, values
  # are reported, and deep_sleep.enter runs exactly as before. These two
  # handlers only bracket that cycle — cut power on the way down, release the
  # hold on the way up.
  # ---------------------------------------------------------------------------
  on_shutdown:
    # Priority 300 runs AFTER ESPHome's ethernet teardown (priority 250), so
    # the W5500 PHY is shut down gracefully while it still has power. Cutting
    # the rail before teardown caused a watchdog hang on the mqtt_toy branch.
    - priority: 300
      then:
        - lambda: |-
            gpio_set_direction(GPIO_NUM_7, GPIO_MODE_OUTPUT);
            gpio_set_level(GPIO_NUM_7, 0);
            gpio_hold_en(GPIO_NUM_7);
            gpio_deep_sleep_hold_en();
            ESP_LOGW("Apollo", "on_shutdown: accessory power OFF, GPIO7 held LOW for deep sleep");
  on_boot:
    # Priority 1200 runs very early — before the accessory_power switch (setup
    # priority 1100) and sensor setup — so releasing the hold lets the rail be
    # driven normally for this wake. No-op on a cold/first boot.
    - priority: 1200
      then:
        - lambda: |-
            gpio_hold_dis(GPIO_NUM_7);
            esp_sleep_wakeup_cause_t wc = esp_sleep_get_wakeup_cause();
            const char *cause;
            if (wc == ESP_SLEEP_WAKEUP_TIMER)     cause = "deep sleep timer";
            else if (wc == ESP_SLEEP_WAKEUP_EXT0) cause = "button press";
            else                                  cause = "power-on / other";
            ESP_LOGW("Apollo", "Wake cause: %s — GPIO7 hold released", cause);

dashboard_import:
  package_import_url: github://ApolloAutomation/TEMP_PROJECT-1/Integrations/ESPHome/TEMP_PRO-1_ETH.yaml
  import_full_config: false

ota:
  - platform: esphome
    id: ota_esphome
  - platform: http_request
    id: ota_managed

http_request:
  verify_ssl: true

safe_mode:

update:
  - platform: http_request
    id: update_http_request
    name: Firmware Update
    source: https://apolloautomation.github.io/TEMP_PROJECT-1/firmware-e/manifest.json

logger:

ethernet:  
  type: W5500  
  clk_pin: GPIO10  
  mosi_pin: GPIO12 
  miso_pin: GPIO11
  cs_pin: GPIO9
  interrupt_pin: GPIO13
  reset_pin: GPIO14

script:
  - id: statusCheck
    then:
      - if:
          condition:
            - lambda: 'return id(ink_ha_connected).state;'
          then:
            - logger.log: "Apollo Automation: Connected To HA"
            - light.turn_on: 
                id: rgb_light
                brightness: 100%
                red: 0%
                green: 0%
                blue: 100%
      - delay: 5s
      - light.turn_off: rgb_light

select:
  - platform: template
    id: firmware_selector
    name: Firmware Type
    icon: "mdi:test-tube"
    entity_category: config
    optimistic: true
    restore_value: true
    options:
      - "WiFi"
      - "Ethernet"
    initial_option: "Ethernet"
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(firmware_selector).current_option() == "Ethernet";'
            then:
              - logger.log: "OTA updates set to use ethernet firmware"
              - lambda: id(update_http_request).set_source_url("https://apolloautomation.github.io/TEMP_PROJECT-1/firmware-e/manifest.json");
              - component.update: update_http_request
            else:
              - logger.log: "OTA updates set to use wifi firmware"
              - lambda: id(update_http_request).set_source_url("https://apolloautomation.github.io/TEMP_PROJECT-1/firmware-w/manifest.json");
              - component.update: update_http_request


packages:
  core: !include Core.yaml
