esphome:
  name: "apollo-temp-pro-1-eth"
  friendly_name: Apollo TEMP_PRO-1 ETH
  comment: Apollo TEMP_PRO-1 ETH
  name_add_mac_suffix: true
  platformio_options:
    board_build.flash_mode: dio

  project:
    name: "ApolloAutomation.TEMP_PRO-1-ETH"
    version: "${version}"

  min_version: 2025.2.0

dashboard_import:
  package_import_url: github://ApolloAutomation/TEMP_PROJECT-1/Integrations/ESPHome/TEMP_PRO-1_ETH.yaml
  import_full_config: false

ota:
  - platform: esphome
    id: ota_esphome
    on_error:
      then:
        - lambda: |-
            id(last_ota_error_code) = x;
            char buf[24];
            snprintf(buf, sizeof(buf), "Error %d", x);
            id(last_ota_error).publish_state(buf);
    on_end:
      then:
        - lambda: |-
            // Successful OTA clears any previously latched error before the
            // post-OTA reboot persists it.
            id(last_ota_error_code) = -1;
  - platform: http_request
    id: ota_managed
    on_error:
      then:
        - lambda: |-
            id(last_ota_error_code) = x;
            char buf[24];
            snprintf(buf, sizeof(buf), "Error %d", x);
            id(last_ota_error).publish_state(buf);
    on_end:
      then:
        - lambda: |-
            // Successful OTA clears any previously latched error before the
            // post-OTA reboot persists it.
            id(last_ota_error_code) = -1;

http_request:
  verify_ssl: true

safe_mode:

update:
  - platform: http_request
    id: update_http_request
    name: Firmware Update
    source: https://apolloautomation.github.io/TEMP_PROJECT-1/firmware-e/manifest.json

logger:

ethernet:  
  type: W5500  
  clk_pin: GPIO10  
  mosi_pin: GPIO12 
  miso_pin: GPIO11
  cs_pin: GPIO9
  interrupt_pin: GPIO13
  reset_pin: GPIO14

script:
  - id: statusCheck
    then:
      - if:
          condition:
            - lambda: 'return id(ink_ha_connected).state;'
          then:
            - logger.log: "Apollo Automation: Connected To HA"
            - if:
                condition:
                  switch.is_on: status_led_enabled
                then:
                  - light.turn_on:
                      id: rgb_light
                      brightness: !lambda 'return id(status_led_brightness).state / 100.0;'
                      red: 0%
                      green: 0%
                      blue: 100%
      - delay: 5s
      - light.turn_off: rgb_light

select:
  - platform: template
    id: firmware_selector
    name: Firmware Type
    icon: "mdi:test-tube"
    entity_category: config
    optimistic: true
    restore_value: true
    options:
      - "WiFi"
      - "Ethernet"
    initial_option: "Ethernet"
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(firmware_selector).current_option() == "Ethernet";'
            then:
              - logger.log: "OTA updates set to use ethernet firmware"
              - lambda: id(update_http_request).set_source_url("https://apolloautomation.github.io/TEMP_PROJECT-1/firmware-e/manifest.json");
              - component.update: update_http_request
            else:
              - logger.log: "OTA updates set to use wifi firmware"
              - lambda: id(update_http_request).set_source_url("https://apolloautomation.github.io/TEMP_PROJECT-1/firmware-w/manifest.json");
              - component.update: update_http_request


# Ethernet diagnostics: commercial installs run cross-subnet where mDNS is
# often blocked; the raw IP is the only usable handle for the web UI.
text_sensor:
  - platform: ethernet_info
    ip_address:
      name: "Ethernet IP Address"
      id: ethernet_ip_address
      entity_category: diagnostic
      disabled_by_default: true
    mac_address:
      name: "Ethernet MAC Address"
      id: ethernet_mac_address
      entity_category: diagnostic
      disabled_by_default: true

packages:
  core: !include Core.yaml
